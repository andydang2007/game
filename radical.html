<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSLE: 汉字连击快线</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Nunito', "Chalkboard SE", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-desert-top: #f59e0b; 
            --bg-desert-bottom: #ca8a04; 
            --key-bg: #92400e; 
            --key-border: #713f12; 
            --text-main: #fef3c7; 
            --defense-line: #f43f5e; 
        }

        body { margin: 0; padding: 0; height: 100vh; background: linear-gradient(180deg, var(--bg-desert-top) 0%, var(--bg-desert-bottom) 100%); display: flex; flex-direction: column; overflow: hidden; color: var(--text-main); }
        
        /* 简单背景沙尘粒子 */
        #sand-storm { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; background-image: radial-gradient(white 1px, transparent 1px); background-size: 50px 50px; animation: windScroll 20s linear infinite; }
        @keyframes windScroll { from { background-position: 0 0; } to { background-position: 500px 500px; } }

        /* 顶部状态栏 */
        #header { width: 100%; max-width: 800px; display: flex; justify-content: space-between; padding: 15px 25px; background: rgba(0,0,0,0.2); z-index: 10; border-bottom: 3px solid rgba(255,255,255,0.1); margin: 0 auto; flex: none; font-weight: 900; font-size: 20px;}
        .score-box { color: #facc15; }
        .lives-box { color: #f43f5e; font-size: 24px; letter-spacing: 2px; }

        /* ======== 中间游乐区 (主战场) ======== */
        #play-area { flex: 1; width: 100%; max-width: 800px; margin: 0 auto; position: relative; overflow: hidden; z-index: 5; border-bottom: 4px solid var(--key-border); }
        
        /* 屏幕最右侧的防线 */
        #defense-wall { position: absolute; top: 0; right: 0; bottom: 0; width: 10px; background: var(--defense-line); box-shadow: -5px 0 15px rgba(244, 63, 94, 0.7); z-index: 6; }
        #play-area.hurt { animation: screenFlash 0.15s; }
        @keyframes screenFlash { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(244, 63, 94, 0.3); } }

        /* ======== 战车与图片样式 ======== */
        .tank-vehicle { position: absolute; left: -250px; transition: left 0.05s linear; z-index: 7; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        
        /* 图片容器，用来包裹图片和汉字 */
        .vehicle-wrapper { position: relative; display: inline-block; }
        
        /* 真实战车图片 */
        .vehicle-img { height: 120px; /* 控制战车图片大小，可根据你的图微调 */ object-fit: contain; transition: transform 0.1s; }
        
        /* 目标大汉字：绝对定位，叠在图片上 */
        .target-char { position: absolute; top: 15%; /* 调整这个百分比，让字正好坐在车厢上 */ left: 0; width: 100%; text-align: center; font-size: 50px; color: #fff; font-weight: 900; text-shadow: 0px 4px 6px rgba(0,0,0,0.8), 0px 0px 10px rgba(0,0,0,0.5); z-index: 10; }

        /* 受击红光闪烁特效 */
        .vehicle-img.hurt { filter: drop-shadow(0 0 15px #f43f5e) brightness(1.5); animation: shakeTank 0.2s; }
        @keyframes shakeTank { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* 爆胎死亡消失动画 (最后状态) */
        .tank-vehicle.exploded { animation: deadBlink 0.4s forwards; }
        @keyframes deadBlink { 
            0% { opacity: 1; transform: scale(1); filter: brightness(2); } 
            50% { opacity: 0; transform: scale(1.2); }
            100% { opacity: 0; } 
        }

        /* ======== 底部操作键盘 ======== */
        /* 强制在底部 */
        #keyboard { width: 100%; max-width: 800px; margin: 0 auto; background: rgba(0,0,0,0.5); padding: 15px 15px 25px 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; z-index: 10; flex: none; }
        
        .key-btn { aspect-ratio: 1/1; border-radius: 12px; background: var(--key-bg); color: var(--text-main); font-size: 36px; font-weight: 900; border: none; border-bottom: 6px solid var(--key-border); cursor: pointer; transition: 0.1s; outline: none; display: flex; align-items: center; justify-content: center;}
        .key-btn:active { transform: translateY(6px); border-bottom-width: 0; }
        .key-btn.wrong { background: #f43f5e; border-color: #be123c; animation: shakeBtn 0.2s; }
        @keyframes shakeBtn { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }

        /* UI 覆盖层 */
        .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center; padding: 20px; }
        .overlay h1 { font-size: 50px; margin: 0 0 20px 0; color: #facc15; text-shadow: 0 6px 0 #ca8a04; }
        .overlay p { font-size: 20px; color: #cbd5e1; margin-bottom: 40px; font-weight: 900; }
        .btn-start { background: #3b82f6; color: white; font-size: 26px; font-weight: 900; padding: 15px 40px; border-radius: 30px; border: 4px solid #93c5fd; box-shadow: 0 8px 0 #2563eb; cursor: pointer; transition: 0.1s; }
        .btn-start:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
    </style>
</head>
<body>

<div id="sand-storm"></div>

<div id="header">
    <div class="score-box">⭐️ <span id="score">0</span></div>
    <div class="lives-box" id="lives">❤️❤️❤️</div>
</div>

<div id="play-area">
    <div id="defense-wall"></div>
    </div>

<div id="keyboard">
    </div>

<div id="start-screen" class="overlay">
    <h1 id="loading-msg">题库加载中...</h1>
    <p>正在连接 Google Sheet 题库</p>
</div>

<div id="game-over-screen" class="overlay" style="display:none;">
    <h1>Game Over</h1>
    <p>防线失守！得分: <span id="final-score" style="color:#facc15; font-size:36px;">0</span></p>
    <button class="btn-start" style="background:#10b981; border-color:#6ee7b7; box-shadow: 0 8px 0 #059669;" onclick="startGame()">再来一局 🔄</button>
</div>

<script>
    // 🌟 你的真实题库链接 (注意一定要确保表格里加了 "PARTS" 或 "部件" 这一列！)
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6wi8MMQvvVS7HukVf43huxpW1EOWZhfJpNQGi-2RAz0K37y2bYyZi2bTbbVhw2d5NlUfjxggCIvA3/pub?gid=266851979&single=true&output=csv";

    // 全局题库
    let dictionary = [];
    const distractors = ["扌", "亻", "心", "月", "虫", "门", "广", "走", "雨", "艹", "口", "氵", "日"];

    let score = 0;
    let lives = 3;
    let isPlaying = false;
    let activeVehicles = []; 
    let spawnTimer = null;
    let gameLoopRef = null;
    let lastTime = 0; 

    const playArea = document.getElementById('play-area');
    const keyboard = document.getElementById('keyboard');

    // ========== 1. 加载 Google Sheet 数据 ==========
    window.onload = function() {
        Papa.parse(SHEET_URL + "&t=" + Date.now(), {
            download: true, 
            header: true, 
            skipEmptyLines: 'greedy',
            transformHeader: h => h.replace(/^\uFEFF/, '').trim().toUpperCase(),
            complete: function(results) {
                results.data.forEach(row => {
                    let targetWord = row['ANSWER'] || row['CORRECT ANSWER'] || ""; 
                    let partsStr = row['PARTS'] || row['部件'] || ""; 
                    
                    if (targetWord && partsStr) {
                        dictionary.push({
                            word: targetWord.trim(),
                            parts: partsStr.split(/[,，]/).map(p => p.trim()) // 支持中英文逗号
                        });
                    }
                });

                const startScreen = document.getElementById('start-screen');
                if (dictionary.length > 0) {
                    startScreen.innerHTML = `
                        <h1>大漠狂沙特快</h1>
                        <p>已加载 <b>${dictionary.length}</b> 个装甲汉字！<br><br>看准目标，按顺序打出偏旁部首。<br>每打中一次，战车破损减速一挡！</p>
                        <button class="btn-start" onclick="startGame()">全军出击 🚀</button>
                    `;
                } else {
                    startScreen.innerHTML = `<h1>数据加载失败</h1><p>请检查表格中是否添加了【PARTS】或【部件】列，并用逗号隔开。</p>`;
                }
            }
        });
    };

    // 音效
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'hit') {
            osc.type = 'square'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'explode') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';
        
        // 保留防线，清除多余战车
        playArea.innerHTML = '<div id="defense-wall"></div>';
        activeVehicles = [];
        score = 0;
        lives = 3;
        updateUI();
        
        isPlaying = true;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        spawnTimer = setTimeout(spawnVehicleLoop, 1000); 
        lastTime = performance.now();
        gameLoopRef = requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = "❤️".repeat(lives) + "🖤".repeat(3-lives);
    }

    function spawnVehicleLoop() {
        if (!isPlaying) return;
        spawnVehicle();
        let interval = 3000 + Math.random() * 2500; // 随机出兵间隔
        spawnTimer = setTimeout(spawnVehicleLoop, interval);
    }

    // 🌟 获取图片路径的辅助函数：完美适配你的命名规则
    function getImagePath(totalParts, currentHits) {
        // totalParts: 比如 3个部件就是 3轮车
        // currentHits: 0(出场) -> 1 -> 2 -> 3(爆破)
        // 对应图片: 3l1.png -> 3l2.png -> 3l3.png -> 3l4.png
        let stateNum = currentHits + 1;
        return `redicalfiles/${totalParts}l${stateNum}.png`;
    }

    function spawnVehicle() {
        const wordData = dictionary[Math.floor(Math.random() * dictionary.length)];
        const totalP = wordData.parts.length;
        let lanePos = 20 + Math.random() * (playArea.clientHeight - 180); 

        const el = document.createElement('div');
        el.className = 'tank-vehicle';
        
        // 初始图片状态
        const initialImgSrc = getImagePath(totalP, 0);

        // 🌟 将汉字绝对定位覆盖在真实的 PNG 图片上
        el.innerHTML = `
            <div class="vehicle-wrapper">
                <img src="${initialImgSrc}" class="vehicle-img" id="img-${Date.now()}" onerror="this.src=''; this.alt='缺图:${totalP}l1'">
                <div class="target-char">${wordData.word}</div>
            </div>
        `;
        el.style.top = lanePos + 'px';
        playArea.appendChild(el);
        
        const base_speed_on_start = 1.2 + Math.random() * 0.6; // 初始全速

        activeVehicles.push({
            id: Date.now(),
            el: el,
            imgEl: el.querySelector('.vehicle-img'), // 用于切换 SRC 的图片元素
            x: -200, 
            totalParts: totalP,
            targetParts: [...wordData.parts], 
            hits: 0, // 当前被打了几下
            baseSpeed: base_speed_on_start, 
            currentSpeed: base_speed_on_start 
        });

        renderKeyboardPool();
    }

    function gameLoop(currentTime) {
        if (!isPlaying) return;
        let delta = (currentTime - lastTime) / 16.67; 
        lastTime = currentTime;

        let defenseWallX = playArea.clientWidth; 

        for (let i = activeVehicles.length - 1; i >= 0; i--) {
            let v = activeVehicles[i];
            
            // 四挡减速逻辑：依据剩余部件计算速度
            let partsRemaining = v.totalParts - v.hits;
            v.currentSpeed = v.baseSpeed * (partsRemaining / v.totalParts);
            
            v.x += v.currentSpeed * delta;
            v.el.style.left = v.x + 'px';
            
            // 防线碰撞检测 (右侧判定)
            if (v.x >= defenseWallX - 120) { 
                v.el.remove();
                activeVehicles.splice(i, 1);
                lives--;
                updateUI();
                playArea.classList.add('hurt');
                setTimeout(() => playArea.classList.remove('hurt'), 150);
                if (lives <= 0) gameOver();
            }
        }
        gameLoopRef = requestAnimationFrame(gameLoop);
    }

    // 处理键盘点击
    function handleKeyPress(char, btnElement) {
        if (!isPlaying) return;
        
        let targetVehicleIndex = -1;
        let maxX = -999;
        
        // 寻找符合按键、且冲得最前面的战车
        for (let i = 0; i < activeVehicles.length; i++) {
            let v = activeVehicles[i];
            if (v.targetParts[v.hits] === char) {
                if (v.x > maxX) {
                    maxX = v.x;
                    targetVehicleIndex = i;
                }
            }
        }
        
        if (targetVehicleIndex !== -1) {
            playSound('hit');
            let v = activeVehicles[targetVehicleIndex];
            
            v.hits++; // 增加受击次数

            // 🌟 核心：切换战损图片！
            let newImgSrc = getImagePath(v.totalParts, v.hits);
            v.imgEl.src = newImgSrc;
            
            // 受击闪光动画
            v.imgEl.classList.add('hurt');
            setTimeout(() => v.imgEl.classList.remove('hurt'), 150);
            
            score += 10;
            updateUI();
            
            // 检查是否打满
            if (v.hits >= v.totalParts) {
                setTimeout(() => killVehicle(v.id), 200); // 稍微延迟，展示最后爆炸形态(3l4等)
            } else {
                renderKeyboardPool();
            }
        } else {
            playSound('wrong');
            btnElement.classList.add('wrong');
            setTimeout(() => btnElement.classList.remove('wrong'), 200);
        }
    }

    function killVehicle(vehicleId) {
        let index = activeVehicles.findIndex(v => v.id === vehicleId);
        if(index === -1) return;
        let v = activeVehicles[index];

        playSound('explode');
        
        // 播放整体消失特效
        v.el.classList.add('exploded');
        activeVehicles.splice(index, 1);
        
        score += 20;
        updateUI();
        
        // 彻底移除DOM节点
        setTimeout(() => {
            v.el.remove();
            if (activeVehicles.length === 0) renderKeyboardPool();
        }, 400);
    }

    // 动态渲染底部按键 (仅包含场上战车需要的部件 + 干扰项)
    function renderKeyboardPool() {
        let targetRadicals = [];
        activeVehicles.forEach(v => {
            if(v.targetParts[v.hits]) {
                targetRadicals.push(v.targetParts[v.hits]);
            }
        });
        
        let keys = [...new Set(targetRadicals)];
        let availableDistractors = [...distractors].sort(() => 0.5 - Math.random());
        
        // 填满 8 个槽位
        while (keys.length < 8) {
            let dis = availableDistractors.pop();
            if(!keys.includes(dis)) keys.push(dis);
        }
        keys.sort(() => 0.5 - Math.random());

        keyboard.innerHTML = keys.map(k => `
            <button class="key-btn" onclick="handleKeyPress('${k}', this)">${k}</button>
        `).join('');
    }

    function gameOver() {
        isPlaying = false;
        clearTimeout(spawnTimer);
        cancelAnimationFrame(gameLoopRef);
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over-screen').style.display = 'flex';
    }
</script>
</body>
</html>
