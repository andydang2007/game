<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>偏旁消除战</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Nunito', "Chalkboard SE", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; height: 100vh; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; color: white; }
        
        #game-container { width: 100%; max-width: 500px; height: 100%; max-height: 850px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        /* 顶部状态栏 */
        #header { display: flex; justify-content: space-between; padding: 15px 20px; font-size: 24px; font-weight: 900; background: rgba(255,255,255,0.05); z-index: 10; border-bottom: 2px solid rgba(255,255,255,0.1); flex: none; }
        .score-text { color: #38bdf8; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .lives-text { color: #f43f5e; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* 游戏掉落区 */
        #play-area { flex: 1; position: relative; overflow: hidden; }

        /* 下落的怪物方块 */
        .monster { position: absolute; width: 140px; left: 50%; margin-left: -70px; background: #fff; border-radius: 16px; padding: 10px; text-align: center; box-shadow: 0 8px 0 #cbd5e1, 0 15px 20px rgba(0,0,0,0.3); border: 4px solid #e2e8f0; transition: transform 0.1s; }
        .monster .hint { font-size: 16px; color: #64748b; font-weight: 900; margin-bottom: 4px; }
        .monster .equation { font-size: 26px; color: #0f172a; font-weight: 900; }
        .monster .equation span { color: #f43f5e; } /* 问号标红 */
        
        /* 消除动画 */
        .monster.explode { transform: scale(1.3); opacity: 0; transition: all 0.2s ease-out; }

        /* 底部控制台 (炮台) */
        #controls { display: flex; gap: 10px; padding: 20px 15px 30px 15px; background: #1e293b; border-top: 4px solid #334155; z-index: 10; flex: none; }
        .btn-radical { flex: 1; aspect-ratio: 1/1; border-radius: 20px; font-size: 40px; font-weight: 900; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 0 rgba(0,0,0,0.3); transition: 0.1s; outline: none; }
        .btn-radical:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
        
        /* 四个炮台的颜色 */
        #btn-shui { background: #38bdf8; color: white; border: 3px solid #7dd3fc; } /* 氵 */
        #btn-shou { background: #a855f7; color: white; border: 3px solid #d8b4fe; } /* 扌 */
        #btn-mu   { background: #10b981; color: white; border: 3px solid #6ee7b7; } /* 木 */
        #btn-kou  { background: #f59e0b; color: white; border: 3px solid #fcd34d; } /* 口 */

        /* 开始/结束屏幕 */
        .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center; padding: 20px; }
        .overlay h1 { font-size: 46px; margin: 0 0 20px 0; color: #facc15; text-shadow: 0 4px 0 #ca8a04; }
        .overlay p { font-size: 20px; color: #cbd5e1; margin-bottom: 40px; line-height: 1.5; }
        .btn-start { background: #3b82f6; color: white; font-size: 26px; font-weight: 900; padding: 15px 40px; border-radius: 30px; border: 4px solid #93c5fd; box-shadow: 0 8px 0 #2563eb; cursor: pointer; transition: 0.1s; }
        .btn-start:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="score-text">⭐️ <span id="score">0</span></div>
        <div class="lives-text">❤️ <span id="lives">3</span></div>
    </div>
    
    <div id="play-area"></div>
    
    <div id="controls">
        <button class="btn-radical" id="btn-shui" onclick="shoot('氵')">氵</button>
        <button class="btn-radical" id="btn-shou" onclick="shoot('扌')">扌</button>
        <button class="btn-radical" id="btn-mu" onclick="shoot('木')">木</button>
        <button class="btn-radical" id="btn-kou" onclick="shoot('口')">口</button>
    </div>

    <div id="start-screen" class="overlay">
        <h1>偏旁消除战</h1>
        <p>看准掉下来的字根，<br>按下正确的偏旁大炮，合成汉字！<br><br>💡 只有20个字，但速度会越来越快哦！</p>
        <button class="btn-start" onclick="startGame()">开始战斗 🚀</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <h1>Game Over</h1>
        <p style="font-size:24px;">你的得分: <span id="final-score" style="color:#38bdf8; font-weight:900; font-size:36px;">0</span></p>
        <button class="btn-start" style="background:#10b981; border-color:#6ee7b7; box-shadow: 0 8px 0 #059669;" onclick="startGame()">再玩一次 🔄</button>
    </div>
</div>

<script>
    // 💡 极简题库：仅仅 20 个围绕这四个偏旁的生字！
    const dictionary = [
        { r: "氵", b: "青", res: "清", h: "清洁" },
        { r: "氵", b: "包", res: "泡", h: "水泡" },
        { r: "氵", b: "主", res: "注", h: "注意" },
        { r: "氵", b: "工", res: "江", h: "长江" },
        { r: "氵", b: "每", res: "海", h: "海洋" },
        
        { r: "扌", b: "包", res: "抱", h: "拥抱" },
        { r: "扌", b: "巴", res: "把", h: "一把" },
        { r: "扌", b: "白", res: "拍", h: "拍手" },
        { r: "扌", b: "丁", res: "打", h: "打球" },
        { r: "扌", b: "立", res: "拉", h: "拉手" },
        
        { r: "木", b: "寸", res: "村", h: "村子" },
        { r: "木", b: "交", res: "校", h: "学校" },
        { r: "木", b: "几", res: "机", h: "飞机" },
        { r: "木", b: "白", res: "柏", h: "柏树" },
        { r: "木", b: "公", res: "松", h: "松树" },
        
        { r: "口", b: "巴", res: "吧", h: "好吧" },
        { r: "口", b: "马", res: "吗", h: "好吗" },
        { r: "口", b: "交", res: "咬", h: "咬人" },
        { r: "口", b: "乞", res: "吃", h: "吃饭" },
        { r: "口", b: "斤", res: "听", h: "听话" }
    ];

    let score = 0;
    let lives = 3;
    let isPlaying = false;
    let activeMonsters = [];
    let spawnTimer = null;
    let animationFrame = null;
    let baseSpeed = 1; // 初始下落速度
    let spawnInterval = 2500; // 初始生成间隔(毫秒)

    const playArea = document.getElementById('play-area');
    
    // --- 音效生成器 (纯代码，无需下载音频文件) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'hit') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'miss' || type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';
        playArea.innerHTML = '';
        activeMonsters = [];
        score = 0;
        lives = 3;
        baseSpeed = 1.2;
        spawnInterval = 2500;
        updateUI();
        
        isPlaying = true;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        spawnMonster(); // 立刻生成第一个
        scheduleNextSpawn();
        animationLoop();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = lives;
    }

    function scheduleNextSpawn() {
        if (!isPlaying) return;
        spawnTimer = setTimeout(() => {
            spawnMonster();
            scheduleNextSpawn();
        }, spawnInterval);
    }

    function spawnMonster() {
        if (!isPlaying) return;
        
        // 随机抽取一道题
        const word = dictionary[Math.floor(Math.random() * dictionary.length)];
        
        const el = document.createElement('div');
        el.className = 'monster';
        el.innerHTML = `
            <div class="hint">${word.h}</div>
            <div class="equation"><span>[?]</span> + ${word.b}</div>
        `;
        
        // 随机水平位置 (稍微偏移，避免都在正中间)
        const offset = (Math.random() - 0.5) * 160; 
        el.style.transform = `translateX(${offset}px)`;
        
        // 初始高度
        let yPos = -100;
        el.style.top = yPos + 'px';
        
        playArea.appendChild(el);
        
        activeMonsters.push({
            el: el,
            y: yPos,
            radical: word.r,
            result: word.res
        });

        // 难度递增：每生成一个，速度变快一点，间隔变短一点
        baseSpeed += 0.02;
        if(spawnInterval > 800) spawnInterval -= 20; 
    }

    function animationLoop() {
        if (!isPlaying) return;
        
        const areaHeight = playArea.clientHeight;
        
        for (let i = activeMonsters.length - 1; i >= 0; i--) {
            let m = activeMonsters[i];
            m.y += baseSpeed;
            m.el.style.top = m.y + 'px';
            
            // 如果掉到底部没被消除
            if (m.y > areaHeight - 80) {
                playSound('miss');
                m.el.remove();
                activeMonsters.splice(i, 1);
                lives--;
                updateUI();
                
                // 屏幕闪红提示受伤
                playArea.style.backgroundColor = "rgba(244, 63, 94, 0.3)";
                setTimeout(() => playArea.style.backgroundColor = "transparent", 100);

                if (lives <= 0) gameOver();
            }
        }
        
        animationFrame = requestAnimationFrame(animationLoop);
    }

    // 玩家点击底部炮台
    function shoot(radicalShot) {
        if (!isPlaying) return;
        
        // 寻找最下面（Y坐标最大）且匹配的怪物
        let targetIndex = -1;
        let maxY = -999;
        
        for (let i = 0; i < activeMonsters.length; i++) {
            if (activeMonsters[i].radical === radicalShot) {
                if (activeMonsters[i].y > maxY) {
                    maxY = activeMonsters[i].y;
                    targetIndex = i;
                }
            }
        }
        
        if (targetIndex !== -1) {
            // 命中！
            playSound('hit');
            let target = activeMonsters[targetIndex];
            
            // 变成合成后的汉字并爆炸
            target.el.innerHTML = `<div class="equation" style="font-size:40px; color:#10b981;">${target.result}</div>`;
            target.el.classList.add('explode');
            
            // 从数组中移除，但保留DOM播放完动画
            activeMonsters.splice(targetIndex, 1);
            score += 10;
            updateUI();
            
            setTimeout(() => target.el.remove(), 200);
        } else {
            // 打错了，播放错误音效
            playSound('wrong');
        }
    }

    function gameOver() {
        isPlaying = false;
        clearTimeout(spawnTimer);
        cancelAnimationFrame(animationFrame);
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over-screen').style.display = 'flex';
    }
</script>

</body>
</html>
