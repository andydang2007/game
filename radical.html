ter;padding:24px}.overlay h1{margin:0 0 10px;color:#fff;font-size:clamp(34px,6vw,68px);text-shadow:0 0 12px var(--c)}.overlay p{margin:0 0 16px;color:#e2e8f0;font-size:clamp(16px,3vw,20px);font-weight:800}.ver{margin:0 0 18px;color:#a7f3d0;font-size:18px;font-weight:900}.switches{display:flex;gap:14px;justify-content:center;align-items:center;margin:8px 0 18px;flex-wrap:wrap}.toggle{width:clamp(54px,9vw,74px);height:clamp(54px,9vw,74px);border-radius:50%;border:2px solid rgba(34,197,94,.8);background:rgba(34,197,94,.18);color:#fff;font-size:clamp(26px,5vw,38px);display:flex;align-items:center;justify-content:center}.btn{border:none;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;padding:16px 40px;font-size:clamp(20px,4vw,26px);font-weight:900;border-radius:999px;cursor:pointer;margin:10px}.pink{background:linear-gradient(135deg,#d946ef,#f43f5e)}#replay{display:none}@media (max-width:720px){:root{--kh:clamp(145px,30vh,210px)}#piano{gap:3px}.rad{font-size:clamp(16px,5vw,34px)}.note-label{font-size:clamp(8px,2vw,11px)}}

<script>
const GAME_VERSION="v1.15.3",SHEET_URL="https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";
const KEY_COUNT=12,GAME_TIME=60,MAX_GAP_MS=900,PENTA=[{label:"低5",freq:196},{label:"低6",freq:220},{label:"1",freq:261.63},{label:"2",freq:293.66},{label:"3",freq:329.63},{label:"5",freq:392},{label:"6",freq:440},{label:"高1",freq:523.25},{label:"高2",freq:587.33},{label:"高3",freq:659.25},{label:"高5",freq:783.99},{label:"高6",freq:880}],distractors=["扌","亻","心","忄","月","虫","门","广","走","雨","艹","口","氵","日","木","女","讠","辶","土","火","宀","贝","王","纟","石","禾","目","竹","页","刂"];

window.addEventListener("load",()=>{setVH();initKeys();initControls();loadDict()});window.addEventListener("resize",()=>{setVH();calcTrack();activeChars.forEach(renderChar)});window.addEventListener("orientationchange",()=>setTimeout(()=>{setVH();calcTrack();activeChars.forEach(renderChar)},300));document.addEventListener("pointerup",()=>{stopAllNotes();releaseKeys()});document.addEventListener("pointercancel",()=>{stopAllNotes();releaseKeys()});

function syncIcons(){const speed={slow:"🐢",normal:"🚶",fast:"⚡"},inst={piano:"🎹",bell:"🔔",pluck:"🪕",organ:"🎛️"};["speed","live-speed"].forEach(id=>{let e=document.getElementById(id);if(e)e.textContent=speed[remixSpeed]});["inst","live-inst"].forEach(id=>{let e=document.getElementById(id);if(e)e.textContent=inst[replayInstrument]})}

function showFail(t){document.getElementById("stitle").textContent="加载失败";document.getElementById("stext").textContent=t}
function loadDict(){document.getElementById("ver").textContent=`Version ${GAME_VERSION}`;if(typeof Papa==="undefined"){showFail("PapaParse 加载失败。请联网，或用本地服务器打开。");return}Papa.parse(SHEET_URL+"&t="+Date.now(),{download:true,header:true,skipEmptyLines:"greedy",transformHeader:h=>String(h||"").replace(/^\uFEFF/,"").trim().toUpperCase(),complete:r=>{dictionary=r.data.filter(x=>x["QUESTION"]||x["ANSWER"]||x["CORRECT ANSWER"]).map(x=>{let word=String(x["QUESTION"]||x["ANSWER"]||x["CORRECT ANSWER"]||"").trim(),parts=String(x["PARTS"]||x["部件"]||"").split(/[,，、|/]/).map(p=>p.trim()).filter(Boolean);return word&&parts.length?{word,parts}:null}).filter(Boolean);if(dictionary.length){document.getElementById("stitle").textContent="汉字节奏大师";document.getElementById("stext").innerHTML=`已加载 ${dictionary.length} 个汉字<br>循环 Remix 版`;let b=document.createElement("button");b.className="btn";b.textContent="🚀";b.onclick=startGame;document.getElementById("start").appendChild(b)}else showFail("题库为空。请检查 Question / Parts 列。")},error:e=>{console.error(e);showFail("Google Sheet 加载失败。本地双击 file:// 打开可能会被浏览器拦截，请用本地服务器或部署到网页。")}})}
function initKeys(){piano.innerHTML="";for(let i=0;i<KEY_COUNT;i++){let k=document.createElement("div");k.className="key";k.innerHTML=`<div class="rad"></div><div class="note-label">${PENTA[i].label}</div>`;k.addEventListener("pointerdown",e=>{e.preventDefault();pressKey(i,k)});["pointerup","pointercancel","pointerleave"].forEach(ev=>k.addEventListener(ev,e=>{e.preventDefault();k.classList.remove("pressed");stopSustainNote(`key-${i}`)}));piano.appendChild(k)}}
function startGame(){ensureAudio();document.getElementById("start").style.display="none";piano.style.display="flex";piano.classList.remove("hide");player.style.display="none";game.classList.remove("replay");score=0;timeLeft=GAME_TIME;isPlaying=true;activeChars=[];rawNotes=[];processed=[];document.getElementById("score").textContent=score;document.getElementById("timer").textContent=timeLeft;calcTrack();initSlots();clock=setInterval(()=>{timeLeft--;document.getElementById("timer").textContent=timeLeft;if(timeLeft<=0)endGame()},1000);spawnChar();anim=requestAnimationFrame(loop)}

function loop(){if(!isPlaying)return;activeChars.forEach(renderChar);anim=requestAnimationFrame(loop)}
function spawnChar(){let d=dictionary[Math.floor(Math.random()*dictionary.length)];if(!d)return;let el=document.createElement("div");el.className="char";let s=document.createElement("span");s.textContent=d.word;el.appendChild(s);let pr=document.createElement("div");pr.className="prog";d.parts.forEach(()=>{let dot=document.createElement("div");dot.className="dot";pr.appendChild(dot)});el.appendChild(pr);arena.appendChild(el);let c={id:idCounter++,el,word:d.word,parts:d.parts.map((char,idx)=>({char,idx,partId:`${idCounter}-${idx}-${char}-${Math.random()}`})),nextPartIndex:0,visualHitCount:0,dead:false};activeChars=[c];resetFor(c);renderChar(c)}
function resetFor(c){slots=Array(KEY_COUNT).fill(null);let avoid=c.parts.map(p=>p.char);for(let i=0;i<KEY_COUNT;i++)slots[i]={kind:"distractor",char:randDis(avoid)};let idxs=Array.from({length:KEY_COUNT},(_,i)=>i);shuffle(idxs);c.parts.slice(0,KEY_COUNT).forEach((p,n)=>slots[idxs[n]]={kind:"part",char:p.char,partIndex:p.idx,target:c});renderKeys()}
function calcTrack(){let r=arena.getBoundingClientRect();if(!r.width||!r.height)return;svg.innerHTML="";geom=[];svg.setAttribute("viewBox",`0 0 ${r.width} ${r.height}`);let defs=document.createElementNS("http://www.w3.org/2000/svg","defs"),g=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");g.id="rainbowLine";g.setAttribute("x1","0%");g.setAttribute("y1","0%");g.setAttribute("x2","100%");g.setAttribute("y2","0%");[["0%","#ff00ff"],["18%","#00f3ff"],["36%","#22c55e"],["55%","#facc15"],["75%","#ff7a00"],["100%","#ff00ff"]].forEach(([o,c])=>{let st=document.createElementNS("http://www.w3.org/2000/svg","stop");st.setAttribute("offset",o);st.setAttribute("stop-color",c);g.appendChild(st)});defs.appendChild(g);svg.appendChild(defs);let farY=r.height*.18,cx=r.width/2,w=r.width/KEY_COUNT;for(let i=0;i<KEY_COUNT;i++){let nl=i*w,nr=(i+1)*w,nc=nl+w/2,fc=cx+(i-(KEY_COUNT-1)/2)*5;let path=document.createElementNS("http://www.w3.org/2000/svg","path");path.setAttribute("d",`M ${nl} ${r.height} L ${fc-5} ${farY} L ${fc+5} ${farY} L ${nr} ${r.height} Z`);path.setAttribute("class","fill");svg.appendChild(path);[[nl,fc-5],[nr,fc+5]].forEach(([x1,x2])=>{let e=document.createElementNS("http://www.w3.org/2000/svg","line");e.setAttribute("x1",x1);e.setAttribute("y1",r.height);e.setAttribute("x2",x2);e.setAttribute("y2",farY);e.setAttribute("class","edge");svg.appendChild(e)});let line=document.createElementNS("http://www.w3.org/2000/svg","line");line.setAttribute("x1",nc);line.setAttribute("y1",r.height);line.setAttribute("x2",fc);line.setAttribute("y2",farY);line.setAttribute("class","line");line.setAttribute("stroke","url(#rainbowLine)");svg.appendChild(line);for(let rr=1;rr<=10;rr++){let t=rr/11,y=farY+(r.height-farY)*t,ww=10+w*t*.9,x=fc+(nc-fc)*t;let rung=document.createElementNS("http://www.w3.org/2000/svg","line");rung.setAttribute("x1",x-ww/2);rung.setAttribute("y1",y);rung.setAttribute("x2",x+ww/2);rung.setAttribute("y2",y);rung.setAttribute("class","rung");rung.setAttribute("stroke","url(#rainbowLine)");svg.appendChild(rung)}geom.push({nearX:nc,nearY:r.height,farX:fc,farY})}}
function targetPt(){let r=arena.getBoundingClientRect();return{x:r.width/2,y:r.height*.10}}function keyPt(i){let k=piano.children[i],ar=arena.getBoundingClientRect(),kr=k.getBoundingClientRect();return{x:kr.left+kr.width/2-ar.left,y:ar.height+4}}function lanePt(i,z){let l=geom[i];if(!l)return{x:arena.clientWidth/2,y:arena.clientHeight/2};let t=1-z;return{x:l.farX+(l.nearX-l.farX)*t,y:l.farY+(l.nearY-l.farY)*t}}
function renderChar(c){if(!c||c.dead)return;let p=targetPt();c.el.style.left=`${p.x}px`;c.el.style.top=`${p.y}px`;c.el.style.fontSize=`clamp(50px,8vw,100px)`;c.el.style.transform="translate(-50%,-50%)";c.el.querySelectorAll(".dot").forEach((d,i)=>d.className=i<c.visualHitCount?"dot done":"dot next")}
function initSlots(){slots=Array(KEY_COUNT).fill(null);for(let i=0;i<KEY_COUNT;i++)slots[i]={kind:"distractor",char:distractors[Math.floor(Math.random()*distractors.length)]};renderKeys()}function renderKeys(){for(let i=0;i<KEY_COUNT;i++){let k=piano.children[i],r=k?.querySelector(".rad");if(r)r.textContent=slots[i]?slots[i].char:"";k?.classList.toggle("used",slots[i]?.kind==="used")}}
function pressKey(i,k){if(!isPlaying)return;let slot=slots[i];if(!slot)return;k.classList.add("pressed");startSustainNote(`key-${i}`,PENTA[i].freq);if(slot.kind==="part"){let c=slot.target,ex=c?.parts[c.nextPartIndex];if(!c||c.dead||!ex||slot.char!==ex.char)return;rawNotes.push({absTime:Date.now(),index:i,freq:PENTA[i].freq});score+=50;document.getElementById("score").textContent=score;c.nextPartIndex++;c.visualHitCount++;c.el.classList.add("ok");setTimeout(()=>c.el&&c.el.classList.remove("ok"),150);shootNote(i);slots[i]={kind:"used",char:""};renderKeys();renderChar(c);if(c.nextPartIndex>=c.parts.length){score+=200;document.getElementById("score").textContent=score;c.dead=true;c.el.classList.add("done");activeChars=[];initSlots();setTimeout(()=>c.el&&c.el.remove(),220);setTimeout(()=>isPlaying&&spawnChar(),120)}}}
function shootNote(i){let notes=["♪","♫","♬","♩"],colors=["#00f3ff","#ff00ff","#facc15","#22c55e"],a=keyPt(i),b=targetPt(),el=document.createElement("div");el.className="flynote";el.textContent=notes[Math.floor(Math.random()*notes.length)];el.style.color=colors[Math.floor(Math.random()*colors.length)];arena.appendChild(el);let f=0,total=42;function step(){f++;let t=f/total,e=1-Math.pow(1-t,3),arc=Math.sin(t*Math.PI)*-34,x=a.x+(b.x-a.x)*e,y=a.y+(b.y-a.y)*e+arc;el.style.left=`${x}px`;el.style.top=`${y}px`;el.style.transform=`translate(-50%,-50%) rotate(${t*300}deg) scale(${.78+e*.72})`;el.style.opacity=`${Math.max(0,1-t*.08)}`;if(f<total)requestAnimationFrame(step);else{el.remove();ring(b)}}step()}function ring(p){let r=document.createElement("div");r.className="ring";r.style.left=`${p.x}px`;r.style.top=`${p.y}px`;arena.appendChild(r);setTimeout(()=>r.remove(),420)}
function settings(){let map={slow:{bpm:96,mult:1.7},normal:{bpm:112,mult:2.2},fast:{bpm:132,mult:2.8}},s=map[remixSpeed]||map.normal;return{drumStyle:"electro",bassStyle:"warm",bpm:s.bpm,speedMultiplier:s.mult,quantizeStepMs:(60000/s.bpm)/2,instrument:replayInstrument}}
function processNotes(s){if(!rawNotes.length){processed=[];return}processed=[];let cut=0,last=-s.quantizeStepMs;for(let i=0;i<rawNotes.length;i++){if(i>0){let gap=rawNotes[i].absTime-rawNotes[i-1].absTime;if(gap>MAX_GAP_MS)cut+=gap-MAX_GAP_MS}let compact=rawNotes[i].absTime-rawNotes[0].absTime-cut,q=Math.round((compact/s.speedMultiplier)/s.quantizeStepMs)*s.quantizeStepMs;if(q<=last)q=last+s.quantizeStepMs;last=q;processed.push({relTime:q,index:rawNotes[i].index,freq:rawNotes[i].freq})}if(processed.length>=2)processed.push({relTime:last+s.quantizeStepMs,index:7,freq:PENTA[7].freq})}
function ensureAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume().catch(()=>{})}function startSustainNote(id,freq){ensureAudio();if(activeNotes.has(id))stopSustainNote(id);let now=audioCtx.currentTime,out=audioCtx.createGain();out.gain.setValueAtTime(0,now);out.gain.linearRampToValueAtTime(.25,now+.02);out.gain.exponentialRampToValueAtTime(.07,now+.3);out.connect(audioCtx.destination);let oscs=[];[{r:1,a:1,t:"sine"},{r:2,a:.3,t:"triangle"},{r:3,a:.1,t:"sine"}].forEach(h=>{let osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type=h.t;osc.frequency.value=freq*h.r;g.gain.setValueAtTime(h.a,now);g.gain.exponentialRampToValueAtTime(.01,now+(h.r===1?.7:.2));osc.connect(g);g.connect(out);osc.start(now);oscs.push({osc,g})});activeNotes.set(id,{output:out,oscs})}function stopSustainNote(id){if(!audioCtx)return;let n=activeNotes.get(id);if(!n)return;let now=audioCtx.currentTime;try{n.output.gain.cancelScheduledValues(now);n.output.gain.setValueAtTime(n.output.gain.value||.06,now);n.output.gain.exponentialRampToValueAtTime(.001,now+.1);n.oscs.forEach(o=>o.osc.stop(now+.2));setTimeout(()=>{try{n.output.disconnect()}catch(e){}},300)}catch(e){}activeNotes.delete(id)}function stopAllNotes(){Array.from(activeNotes.keys()).forEach(stopSustainNote)}function releaseKeys(){document.querySelectorAll(".key.pressed").forEach(k=>k.classList.remove("pressed"))}
function playReplay(){let s=settings();processNotes(s);if(!processed.length){alert("刚才没有击中汉字哦，重开一局吧！");return}ensureAudio();document.getElementById("replay").style.display="none";piano.style.display="flex";piano.classList.add("hide");player.style.display="flex";game.classList.add("replay");player.querySelectorAll(".bar").forEach(b=>b.classList.add("on"));calcTrack();startOrbLoop();let loopLen=processed[processed.length-1].relTime+900;replayState={active:true,pos:0,nextNote:0,nextBeat:0,lastFrame:performance.now(),loopLen};document.getElementById("pfill").style.width="0%";requestAnimationFrame(replayLoop)}
function replayLoop(now){if(!replayState||!replayState.active)return;let s=settings(),dt=now-replayState.lastFrame;replayState.lastFrame=now;let sp={slow:.78,normal:1,fast:1.22}[remixSpeed]||1;replayState.pos+=dt*sp;if(replayState.pos>=replayState.loopLen){replayState.pos=0;replayState.nextNote=0;replayState.nextBeat=0}document.getElementById("pfill").style.width=`${Math.min(100,replayState.pos/replayState.loopLen*100)}%`;while(replayState.nextNote<processed.length&&processed[replayState.nextNote].relTime<=replayState.pos){let n=processed[replayState.nextNote++];playInst(n.freq,.3,.15,s.instrument);flash(n.index);spawnOrb(n.index)}let beatMs=60000/s.bpm;if(replayState.pos>=replayState.nextBeat){playBeat(Math.floor(replayState.nextBeat/beatMs),s);replayState.nextBeat+=beatMs}requestAnimationFrame(replayLoop)}
function endReplay(){if(!replayState)return;replayState.active=false;player.querySelectorAll(".bar").forEach(b=>b.classList.remove("on"));game.classList.remove("replay");stopOrbLoop();document.getElementById("replay").style.display="flex"}
function flash(i){let k=piano.children[i];if(!k)return;k.classList.add("flash");setTimeout(()=>k.classList.remove("flash"),160)}function spawnOrb(i){let el=document.createElement("div");el.className="orb";arena.appendChild(el);orbs.push({el,laneIndex:i,z:.04,life:0,duration:80})}function startOrbLoop(){stopOrbLoop();function loop(){orbs.forEach(o=>{o.life++;o.z+=.014;let p=lanePt(o.laneIndex,Math.min(.995,o.z)),sc=.7+o.z*.7;o.el.style.left=`${p.x}px`;o.el.style.top=`${p.y}px`;o.el.style.transform=`translate(-50%,-50%) scale(${sc})`;o.el.style.opacity=o.z<.9?1:Math.max(0,(.995-o.z)/.095)});orbs=orbs.filter(o=>{if(o.life<o.duration&&o.z<.995)return true;o.el.remove();return false});orbAnim=requestAnimationFrame(loop)}orbAnim=requestAnimationFrame(loop)}function stopOrbLoop(){if(orbAnim){cancelAnimationFrame(orbAnim);orbAnim=null}orbs.forEach(o=>o.el.remove());orbs=[]}
function playBeat(bi,s){if(bi%2===0)playBass([130.81,196,220,174.61][Math.floor(bi/4)%4]);if(bi%4===0)kick();else if(bi%4===2)snare();else hat()}function playInst(freq,dur,vol,inst){let t=audioCtx.currentTime;if(inst==="bell")return bell(freq,t,.8,vol*.7);if(inst==="pluck")return pluck(freq,t,.38,vol);if(inst==="organ")return organ(freq,t,.42,vol*.75);return pianoNote(freq,t,dur,vol)}function pianoNote(freq,t,dur,vol){[{r:1,a:1},{r:2,a:.32},{r:3,a:.12}].forEach(h=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.setValueAtTime(freq*h.r,t);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(vol*h.a,t+.012);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+.04)})}function bell(freq,t,dur,vol){[{r:1,a:1},{r:2.01,a:.45},{r:3.9,a:.18}].forEach(h=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.setValueAtTime(freq*h.r,t);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(vol*h.a,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+.05)})}function pluck(freq,t,dur,vol){let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="triangle";o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(vol,t+.008);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+.04)}function organ(freq,t,dur,vol){[1,2].forEach((r,i)=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="square";o.frequency.setValueAtTime(freq*r,t);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(vol*(i?.25:.55),t+.02);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+.04)})}function playBass(freq){let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="triangle";o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.065,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.8);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.84)}function kick(){let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.setValueAtTime(105,t);o.frequency.exponentialRampToValueAtTime(48,t+.11);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.09,t+.008);g.gain.exponentialRampToValueAtTime(.001,t+.16);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.18)}function snare(){let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="triangle";o.frequency.setValueAtTime(220,t);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.04,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+.09);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.1)}function hat(){let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="square";o.frequency.setValueAtTime(2200,t);g.gain.setValueAtTime(.001,t);g.gain.linearRampToValueAtTime(.012,t+.004);g.gain.exponentialRampToValueAtTime(.001,t+.035);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.045)}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}function randDis(avoid){let s=distractors.filter(d=>!avoid.includes(d));return s.length?s[Math.floor(Math.random()*s.length)]:distractors[0]}
