<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PSLE 汉字连击快线 · 编曲大师版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

:root {
  --vh: 1vh;
  --keyboard-height: clamp(160px, 28vh, 220px);
  --neon-cyan: #00f3ff;
  --neon-pink: #ff00ff;
  --neon-yellow: #facc15;
  --bg-deep: #050510;
}

html, body {
  margin: 0; width: 100%; height: 100%; overflow: hidden;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background: radial-gradient(ellipse at 50% 30%, #1e1b4b 0%, var(--bg-deep) 100%);
}
body { touch-action: manipulation; }

#game { position: relative; width: 100vw; height: calc(var(--vh) * 100); overflow: hidden; perspective: 1000px; }

#hud { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 90; display: flex; justify-content: space-between; pointer-events: none; }
.hud-box {
  background: rgba(15, 23, 42, 0.8); border: 2px solid rgba(0, 243, 255, 0.6);
  backdrop-filter: blur(8px); border-radius: 12px; padding: 10px 20px;
  font-size: clamp(16px, 2.5vw, 24px); font-weight: 900; color: #fff;
  text-shadow: 0 0 10px var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
}
.timer-box { border-color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); }

#arena { position: absolute; left: 0; right: 0; top: 0; bottom: var(--keyboard-height); overflow: hidden; z-index: 5; }

#depth-fog {
  position: absolute; inset: 0; pointer-events: none; z-index: 6;
  background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
  background-size: 50px 50px; transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
  opacity: 0.6;
}

#track-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 8; pointer-events: none; filter: drop-shadow(0 0 12px rgba(0,243,255,0.3)); }
.track-fill { fill: rgba(0, 243, 255, 0.02); stroke: rgba(0, 243, 255, 0.1); stroke-width: 1; }
.track-line { stroke: var(--neon-cyan); stroke-width: 2; opacity: 0.5; }

#miss-line {
  position: absolute; left: 0; right: 0; bottom: var(--keyboard-height); height: 8px; z-index: 70;
  background: linear-gradient(90deg, transparent, var(--neon-pink), transparent); box-shadow: 0 0 25px var(--neon-pink); pointer-events: none;
}

.depth-character {
  position: absolute; z-index: 40; background: transparent; color: #fff; font-weight: 900; line-height: 1;
  text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px var(--neon-cyan); font-size: 60px;
  transform-origin: center center; will-change: left, top, transform, opacity; transition: transform 0.05s ease-out;
}
.depth-character.correct { color: #a7f3d0; text-shadow: 0 0 15px #4ade80, 0 0 30px #22c55e; }
.depth-character.complete { animation: completeExplosion 0.4s ease-out forwards; }
@keyframes completeExplosion { 0% { opacity: 1; filter: brightness(1); } 50% { opacity: 1; filter: brightness(3) drop-shadow(0 0 40px #facc15); color: #fef08a; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(3); filter: brightness(4) blur(4px); } }

.progress { position: absolute; left: 50%; bottom: -15px; transform: translateX(-50%); display: flex; gap: 6px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 2px solid var(--neon-cyan); box-shadow: 0 0 5px var(--neon-cyan); transition: all 0.2s; }
.dot.done { background: #10b981; border-color: #a7f3d0; box-shadow: 0 0 10px #10b981; }
.dot.next { background: #fef08a; border-color: #facc15; box-shadow: 0 0 15px #facc15; animation: pulseDot 0.6s alternate infinite; }
@keyframes pulseDot { from { transform: scale(1); } to { transform: scale(1.4); } }

#piano-wrap {
  position: absolute; left: 0; right: 0; bottom: 0; height: var(--keyboard-height); z-index: 100;
  padding: 10px; background: #0a0a0a; border-top: 3px solid var(--neon-cyan); box-shadow: 0 -10px 40px rgba(0,243,255,0.15);
}
#piano { display: flex; width: 100%; height: 100%; gap: 6px; }

.white-key {
  flex: 1; position: relative; border-radius: 0 0 12px 12px; border: 1px solid #333; border-bottom: 12px solid #222;
  background: linear-gradient(180deg, #e2e8f0 0%, #cbd5e1 100%); cursor: pointer; transform-origin: top center;
  transition: transform 0.05s, background 0.05s, border-bottom-width 0.05s; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2); overflow: hidden;
}
.white-key.pressed { transform: rotateX(10deg); border-bottom-width: 2px; background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%); box-shadow: inset 0 20px 20px rgba(0,0,0,0.3); }
.white-key.wrong { background: #ffe4e6; border-color: #e11d48; border-bottom-color: #9f1239; animation: wrongShake 0.2s both; }
@keyframes wrongShake { 0%, 100% { transform: rotateX(10deg) translateX(0); } 20%, 60% { transform: rotateX(10deg) translateX(-4px); } 40%, 80% { transform: rotateX(10deg) translateX(4px); } }

.key-radical { position: absolute; left: 50%; top: 55%; transform: translate(-50%, -50%); font-size: clamp(24px, 4vw, 48px); font-weight: 900; color: #0f172a; pointer-events: none; }
.key-radical.pop { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
.key-note { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); font-size: 14px; font-weight: bold; color: #64748b; pointer-events: none; }

.hit-token { position: absolute; z-index: 95; width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 3px solid var(--neon-cyan); color: #000; font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon-cyan); pointer-events: none; }

.overlay { position: absolute; inset: 0; z-index: 300; background: rgba(5, 5, 16, 0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
.overlay h1 { margin: 0 0 10px; color: #fff; font-size: clamp(36px, 6vw, 68px); text-shadow: 0 0 20px var(--neon-cyan); }
.overlay p { margin: 0 0 30px; color: #e2e8f0; font-size: 20px; font-weight: 800; }
.btn { border: none; background: linear-gradient(135deg, #0ea5e9, #6366f1); color: #fff; padding: 16px 40px; font-size: 26px; font-weight: 900; border-radius: 999px; cursor: pointer; box-shadow: 0 0 20px rgba(99, 102, 241, 0.6); transition: transform 0.1s; margin: 10px; }
.btn:active { transform: scale(0.95); }
.btn-pink { background: linear-gradient(135deg, #d946ef, #f43f5e); box-shadow: 0 0 20px rgba(244, 63, 94, 0.6); }

#replay-screen { display: none; }
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <div class="hud-box">⭐ 得分: <span id="score">0</span></div>
    <div class="hud-box timer-box">⏳ 时间: <span id="timer">180</span>s</div>
  </div>
  <div id="arena"><div id="depth-fog"></div><svg id="track-svg"></svg></div>
  <div id="miss-line"></div>
  <div id="piano-wrap"><div id="piano"></div></div>
  
  <div id="start-screen" class="overlay">
    <h1 id="start-title">题库同步中...</h1>
    <p id="start-text">必须等待云端数据就绪，请稍候</p>
  </div>

  <div id="replay-screen" class="overlay">
    <h1>编曲完成！</h1>
    <p>点击下方，聆听属于 Valerie 的汉字电子单曲</p>
    <button class="btn btn-pink" id="btn-replay">🎹 播放我的音乐</button>
    <button class="btn" onclick="location.reload()">🔄 再来一局</button>
  </div>
</div>

<script>
// --- 系统配置 ---
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";
const KEY_COUNT = 12; // 12键 iPad版
const MAX_ACTIVE_CHARS = 4; // 同屏最多 4 个字
const GAME_TIME = 180;

const PENTA_KEYS = [
  { label: "低5", freq: 196.00 }, { label: "低6", freq: 220.00 }, { label: "1", freq: 261.63 },
  { label: "2", freq: 293.66 }, { label: "3", freq: 329.63 }, { label: "5", freq: 392.00 },
  { label: "6", freq: 440.00 }, { label: "高1", freq: 523.25 }, { label: "高2", freq: 587.33 },
  { label: "高3", freq: 659.25 }, { label: "高5", freq: 783.99 }, { label: "高6", freq: 880.00 }
];
const distractors = ["扌", "亻", "心", "忄", "月", "虫", "门", "广", "走", "雨", "艹", "口", "氵", "日", "木", "女", "讠", "辶", "土", "火", "宀", "贝", "王", "纟", "石", "禾", "目", "竹", "页", "刂"];

// --- 游戏变量 ---
let dictionary = []; let activeChars = []; 
let keyboardSlots = Array(KEY_COUNT).fill(null); // 键盘上现在的按键状态
let pendingParts = []; // 核心排队系统：等候上键盘的部首

let score = 0; let timeLeft = GAME_TIME; let isPlaying = false; 
let lastFrameTime = 0; let lastSpawnTime = 0; let animationRef = null; let clockTimer = null;
let idCounter = 1; let hitTokens = []; let trackGeometry = [];
let audioCtx = null; let activeNotes = new Map();
let recordedNotes = []; let gameStartTime = 0;

const arena = document.getElementById("arena");
const trackSvg = document.getElementById("track-svg");
const piano = document.getElementById("piano");

window.addEventListener("load", () => {
  setViewportHeight();
  initPianoDOM();
  
  // 第一步：严格等待题库下载
  Papa.parse(SHEET_URL + "&t=" + Date.now(), {
    download: true, header: true, skipEmptyLines: "greedy",
    transformHeader: h => String(h || "").trim().toUpperCase(),
    complete: results => {
      dictionary = results.data.filter(row => row["QUESTION"] || row["ANSWER"]).map(row => {
        const word = (row["QUESTION"] || row["ANSWER"]).trim();
        const parts = (row["PARTS"] || row["部件"] || "").split(/[,，、|/]/).map(p => p.trim()).filter(Boolean);
        return parts.length ? { word, parts } : null;
      }).filter(Boolean);

      if (dictionary.length) {
        document.getElementById("start-title").textContent = "PSLE 汉字节奏大师";
        document.getElementById("start-text").innerHTML = `题库就绪（${dictionary.length}字）<br>后台弹夹系统已加载，局部替换，绝不闪烁！`;
        const btn = document.createElement("button"); btn.className = "btn"; btn.textContent = "🚀 启动";
        btn.addEventListener("click", startGame); document.getElementById("start-screen").appendChild(btn);
      }
    }
  });
});

window.addEventListener("resize", () => { setViewportHeight(); calculateTrack(); });
function setViewportHeight() { document.documentElement.style.setProperty("--vh", `${window.innerHeight * 0.01}px`); }

function initPianoDOM() {
  piano.innerHTML = "";
  for (let i = 0; i < KEY_COUNT; i++) {
    const btn = document.createElement("div"); btn.className = "white-key";
    btn.innerHTML = `<div class="key-radical"></div><div class="key-note">${PENTA_KEYS[i].label}</div>`;
    btn.addEventListener("pointerdown", e => { e.preventDefault(); handleKeyPress(i, btn); });
    btn.addEventListener("pointerup", e => { e.preventDefault(); btn.classList.remove("pressed"); stopSustainNote(`key-${i}`); });
    btn.addEventListener("pointercancel", e => { e.preventDefault(); btn.classList.remove("pressed"); stopSustainNote(`key-${i}`); });
    btn.addEventListener("pointerleave", e => { e.preventDefault(); btn.classList.remove("pressed"); stopSustainNote(`key-${i}`); });
    piano.appendChild(btn);
  }
}

function startGame() {
  ensureAudio(); 
  document.getElementById("start-screen").style.display = "none";
  score = 0; timeLeft = GAME_TIME; isPlaying = true; 
  activeChars = []; pendingParts = []; hitTokens = []; keyboardSlots.fill(null);
  gameStartTime = Date.now(); lastFrameTime = performance.now(); lastSpawnTime = 0;
  
  document.getElementById("score").textContent = score;
  document.getElementById("timer").textContent = timeLeft;
  
  calculateTrack();
  tryFillKeyboard(); // 游戏开始时用干扰项填满键盘
  
  clockTimer = setInterval(() => {
    timeLeft--; document.getElementById("timer").textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);
  animationRef = requestAnimationFrame(gameLoop);
}

function endGame() {
  isPlaying = false; clearInterval(clockTimer); cancelAnimationFrame(animationRef);
  activeChars.forEach(c => c.el.remove()); activeChars = [];
  document.getElementById("replay-screen").style.display = "flex";
  document.getElementById("btn-replay").onclick = () => playRecording();
}

function gameLoop(now) {
  if (!isPlaying) return;
  const dt = Math.min(32, now - lastFrameTime) / 16.67; lastFrameTime = now;

  // 出字频率控制
  if (activeChars.length < MAX_ACTIVE_CHARS && now - lastSpawnTime > 1500) {
    spawnCharacter(); lastSpawnTime = now;
  }

  updateCharacters(dt, now);
  updateHitTokens(dt);
  animationRef = requestAnimationFrame(gameLoop);
}

function spawnCharacter() {
  const data = dictionary[Math.floor(Math.random() * dictionary.length)];
  const el = document.createElement("div"); el.className = "depth-character";
  const wordSpan = document.createElement("span"); wordSpan.textContent = data.word; el.appendChild(wordSpan);
  const progress = document.createElement("div"); progress.className = "progress";
  data.parts.forEach(() => { const dot = document.createElement("div"); dot.className = "dot"; progress.appendChild(dot); });
  el.appendChild(progress); arena.appendChild(el);

  const c = {
    id: idCounter++, el, word: data.word, parts: [...data.parts],
    expectedIndex: 0, visualIndex: 0,
    laneIndex: Math.floor(Math.random() * KEY_COUNT), 
    z: 0.05, baseSpeed: 0.0015 + Math.random() * 0.0005, slowUntil: 0, dead: false
  };
  activeChars.push(c);
  
  // 核心改动：新字的部首全部加入“后台排队”，绝不强制洗牌
  c.parts.forEach((p, index) => {
    pendingParts.push({ char: p, target: c, partIndex: index });
  });
  
  // 尝试把排队的部首塞进键盘（前提是键盘上有无用的干扰项或空位）
  tryFillKeyboard();
}

// 核心改动：局部替换系统（一个换一个）
function tryFillKeyboard() {
  const keys = piano.children;
  for (let i = 0; i < KEY_COUNT; i++) {
    const slot = keyboardSlots[i];
    // 只有当按键是空的，或者是“无用的干扰项”时，才能被新部首替换！
    if (!slot || slot.kind === "distractor") {
      if (pendingParts.length > 0) {
        const nextPart = pendingParts.shift(); // 从排队区拉取第一个
        keyboardSlots[i] = { kind: "part", char: nextPart.char, target: nextPart.target, partIndex: nextPart.partIndex };
      } else if (!slot) {
        // 排队区没东西，而且按键空着，就塞个新的干扰项
        keyboardSlots[i] = { kind: "distractor", char: distractors[Math.floor(Math.random() * distractors.length)] };
      }
      // 只更新这一个键的文字，带轻微动画
      const keyEl = keys[i].querySelector(".key-radical");
      keyEl.textContent = keyboardSlots[i].char;
      keyEl.classList.remove("pop"); void keyEl.offsetWidth; keyEl.classList.add("pop");
    }
  }
}

// 角色如果挂掉或者消失，必须清空它残留在键盘和排队区里的部件
function cleanupDeadCharacter(charObj) {
  pendingParts = pendingParts.filter(p => p.target !== charObj); // 清除排队
  for (let i = 0; i < KEY_COUNT; i++) {
    if (keyboardSlots[i] && keyboardSlots[i].target === charObj) {
      keyboardSlots[i] = null; // 腾出空位
    }
  }
  tryFillKeyboard(); // 立刻补上新部件或干扰项
}

// 数学修复：完全正确的近大远小坐标系（z=0在远方，z=1在面前）
function calculateTrack() {
  const rect = arena.getBoundingClientRect(); trackSvg.innerHTML = ""; trackGeometry = [];
  const farY = -rect.height * 0.4; // 消失点
  const centerX = rect.width / 2;
  const laneW = rect.width / KEY_COUNT;

  for (let i = 0; i < KEY_COUNT; i++) {
    const nearLeft = i * laneW; const nearRight = (i + 1) * laneW; const nearCenterX = nearLeft + laneW / 2;
    const farCenterX = centerX + (i - (KEY_COUNT - 1) / 2) * 8; 
    
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${nearLeft} ${rect.height} L ${farCenterX - 2} ${farY} L ${farCenterX + 2} ${farY} L ${nearRight} ${rect.height} Z`);
    path.setAttribute("class", "track-fill"); trackSvg.appendChild(path);
    
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", nearCenterX); line.setAttribute("y1", rect.height); line.setAttribute("x2", farCenterX); line.setAttribute("y2", farY);
    line.setAttribute("class", "track-line"); trackSvg.appendChild(line);

    trackGeometry.push({ nearX: nearCenterX, nearY: rect.height, farX: farCenterX, farY: farY });
  }
}

function getPointOnLane(laneIndex, z) {
  const lane = trackGeometry[laneIndex]; 
  // z从0.05飞向1。z越大，越靠近nearX(面前)。数学修正完成！
  return { 
    x: lane.farX + (lane.nearX - lane.farX) * z, 
    y: lane.farY + (lane.nearY - lane.farY) * z 
  };
}

function updateCharacters(dt, now) {
  for (let i = activeChars.length - 1; i >= 0; i--) {
    const c = activeChars[i]; if (c.dead) continue;
    
    const speed = now < c.slowUntil ? c.baseSpeed * 0.2 : c.baseSpeed;
    c.z += speed * dt; // 向前飞

    if (c.z >= 1) { // 越界漏掉了
      c.dead = true; c.el.remove(); 
      activeChars.splice(i, 1);
      cleanupDeadCharacter(c); // 清理键盘遗留
      continue;
    }

    const pt = getPointOnLane(c.laneIndex, c.z);
    c.el.style.left = `${pt.x}px`; c.el.style.top = `${pt.y}px`;
    
    // 近大远小，缩放控制
    const scale = 0.2 + c.z * 1.6; 
    c.el.style.transform = `translate(-50%, -50%) scale(${scale})`;
    c.el.style.opacity = c.z < 0.2 ? c.z * 5 : 1;

    c.el.querySelectorAll(".dot").forEach((dot, idx) => {
      dot.className = idx < c.visualIndex ? "dot done" : (idx === c.visualIndex ? "dot next" : "dot");
    });
  }
}

function handleKeyPress(index, btnElement) {
  if (!isPlaying) return;
  const slot = keyboardSlots[index]; if (!slot) return;
  
  btnElement.classList.add("pressed");
  startSustainNote(`key-${index}`, PENTA_KEYS[index].freq);
  recordedNotes.push({ time: Date.now() - gameStartTime, index: index, freq: PENTA_KEYS[index].freq });

  // 必须是正确目标，且顺序也是正确的
  if (slot.kind === "part" && !slot.target.dead && slot.partIndex === slot.target.expectedIndex) {
    score += 50; document.getElementById("score").textContent = score;
    const c = slot.target;
    c.expectedIndex++; 
    
    const rect = btnElement.getBoundingClientRect(); const arenaRect = arena.getBoundingClientRect();
    launchHitToken(slot.char, rect.left + rect.width/2 - arenaRect.left, arenaRect.height, c);
    
    // 核心改动：击中后，清空【这一个】按键，并立刻从排队区抽取新的补上
    keyboardSlots[index] = null;
    tryFillKeyboard();
    
  } else {
    btnElement.classList.remove("wrong"); void btnElement.offsetWidth; btnElement.classList.add("wrong");
    playBadTone();
  }
}

function launchHitToken(char, x, y, targetChar) {
  const el = document.createElement("div"); el.className = "hit-token"; el.textContent = char;
  arena.appendChild(el);
  hitTokens.push({ el, x, y, z: 1.0, target: targetChar, dead: false, arrived: false });
}

function updateHitTokens(dt) {
  hitTokens.forEach(t => {
    if (t.dead || t.target.dead) { t.dead = true; t.el.remove(); return; }
    t.z -= 0.08 * dt; // 子弹向深处飞去
    if (t.z < t.target.z) t.z = t.target.z;

    const targetPt = getPointOnLane(t.target.laneIndex, t.target.z);
    const blend = (1.0 - t.z) / (1.0 - t.target.z + 0.001); // 混合系数
    t.x = t.x + (targetPt.x - t.x) * blend * 0.2; 
    t.y = t.y + (targetPt.y - t.y) * blend * 0.5;
    
    t.el.style.left = `${t.x}px`; t.el.style.top = `${t.y}px`; 
    t.el.style.transform = `translate(-50%, -50%) scale(${0.4 + t.z * 0.6})`;

    if (!t.arrived && t.z <= t.target.z + 0.02) {
      t.arrived = true; t.dead = true; t.el.remove();
      hitTarget(t.target);
    }
  });
  hitTokens = hitTokens.filter(t => !t.dead);
}

function hitTarget(c) {
  c.visualIndex++; c.slowUntil = performance.now() + 1000;
  c.el.classList.remove("correct"); void c.el.offsetWidth; c.el.classList.add("correct");
  
  if (c.visualIndex >= c.parts.length) {
    score += 200; document.getElementById("score").textContent = score;
    c.dead = true; c.el.classList.add("complete"); playCompleteSound();
    activeChars = activeChars.filter(char => char !== c);
    setTimeout(() => c.el.remove(), 400);
  } else {
    playBounceTone();
  }
}

// --- 音频系统 (无损原声) ---
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === "suspended") audioCtx.resume(); }

function startSustainNote(noteId, freq) {
  ensureAudio(); if (activeNotes.has(noteId)) stopSustainNote(noteId);
  const now = audioCtx.currentTime; const output = audioCtx.createGain();
  output.gain.setValueAtTime(0, now); output.gain.linearRampToValueAtTime(0.4, now + 0.02); output.gain.exponentialRampToValueAtTime(0.1, now + 0.3);
  output.connect(audioCtx.destination);

  const oscs = [];
  [{r:1, a:1, t:'sine'}, {r:2, a:0.5, t:'triangle'}, {r:3, a:0.2, t:'sine'}].forEach(h => {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.type = h.t; osc.frequency.value = freq * h.r;
    g.gain.setValueAtTime(h.a, now); g.gain.exponentialRampToValueAtTime(0.01, now + (h.r===1 ? 1 : 0.3));
    osc.connect(g); g.connect(output); osc.start(now); oscs.push({osc, g});
  });
  activeNotes.set(noteId, { output, oscs });
}

function stopSustainNote(noteId) {
  if (!audioCtx) return; const note = activeNotes.get(noteId); if (!note) return;
  const now = audioCtx.currentTime;
  note.output.gain.cancelScheduledValues(now); note.output.gain.setValueAtTime(note.output.gain.value, now); note.output.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  note.oscs.forEach(o => o.osc.stop(now + 0.2));
  setTimeout(() => note.output.disconnect(), 300);
  activeNotes.delete(noteId);
}

function playBadTone() { playSimpleTone(150, 0.15, 0.1, "sawtooth"); }
function playBounceTone() { playSimpleTone(800, 0.1, 0.05, "sine"); }
function playCompleteSound() { [523.25, 659.25, 1046.50].forEach((f, i) => setTimeout(() => playSimpleTone(f, 0.3, 0.1, "sine"), i*50)); }
function playSimpleTone(freq, duration, vol, type) {
  ensureAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); const now = audioCtx.currentTime;
  osc.type = type; osc.frequency.value = freq; gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(vol, now + 0.02); gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
  osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + duration + 0.1);
}

function playBackgroundPad(durationMs) {
  ensureAudio(); const now = audioCtx.currentTime; const dur = durationMs / 1000;
  [261.63, 329.63, 392.00].forEach(f => {
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = f / 2;
    gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.1, now + 2); gain.gain.setValueAtTime(0.1, now + dur - 2); gain.gain.linearRampToValueAtTime(0, now + dur);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + dur + 0.1);
  });
}

function playRecording() {
  if (recordedNotes.length === 0) return alert("刚刚没有按对任何字哦，再来一把！");
  document.getElementById("replay-screen").style.display = "none";
  
  const totalMs = recordedNotes[recordedNotes.length - 1].time + 2000;
  playBackgroundPad(totalMs);

  recordedNotes.forEach(note => {
    setTimeout(() => {
      startSustainNote(`replay-${note.index}`, note.freq);
      const btn = piano.children[note.index]; btn.classList.add("pressed");
      setTimeout(() => { btn.classList.remove("pressed"); stopSustainNote(`replay-${note.index}`); }, 200);
    }, note.time);
  });

  setTimeout(() => document.getElementById("replay-screen").style.display = "flex", totalMs);
}
</script>
