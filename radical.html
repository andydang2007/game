<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PSLE 汉字连击快线 · 轨道钢琴版</title>

https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js</script>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --vh: 1vh;
  --keyboard-height: clamp(170px, 32vh, 260px);
  --purple: #4c1d95;
  --green: #22c55e;
  --pink: #fb7185;
  --track-base: rgba(255,255,255,0.38);
  --track-soft: rgba(255,255,255,0.18);
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background:
    radial-gradient(ellipse at 50% 14%, rgba(255,255,255,0.62), transparent 34%),
    radial-gradient(ellipse at 50% 5%, rgba(56,189,248,0.28), transparent 42%),
    linear-gradient(180deg, #60a5fa 0%, #bfdbfe 48%, #fef3c7 100%);
}

body {
  touch-action: manipulation;
}

#game {
  position: relative;
  width: 100vw;
  height: calc(var(--vh) * 100);
  overflow: hidden;
}

#hud {
  position: absolute;
  top: max(8px, env(safe-area-inset-top));
  left: 10px;
  z-index: 90;
  pointer-events: none;
}

.hud-box {
  background: rgba(255,255,255,0.68);
  border: 2px solid rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  border-radius: 16px;
  padding: 7px 12px;
  font-size: clamp(14px, 2.4vw, 20px);
  font-weight: 900;
  color: var(--purple);
  box-shadow: 0 5px 14px rgba(76,29,149,0.14);
}

#arena {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: var(--keyboard-height);
  overflow: hidden;
  z-index: 5;
}

#depth-fog {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
  background:
    radial-gradient(ellipse at 50% 2%, rgba(76,29,149,0.24), transparent 46%),
    linear-gradient(180deg, rgba(255,255,255,0.22), transparent 62%);
}

#track-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 8;
  pointer-events: none;
}

.track-fill {
  fill: rgba(255,255,255,0.06);
  stroke: rgba(255,255,255,0.16);
  stroke-width: 1;
}

.track-fill.hint-fill {
  fill: rgba(34,197,94,0.08);
  stroke: rgba(34,197,94,0.20);
}

.track-line {
  stroke: var(--track-base);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 12 18;
  animation: trackDash 1.25s linear infinite;
}

.track-line.hint {
  stroke: rgba(34,197,94,0.55);
  stroke-width: 5;
  filter: drop-shadow(0 0 8px rgba(34,197,94,0.35));
}

.track-rung {
  stroke: rgba(255,255,255,0.22);
  stroke-width: 2;
  animation: rungPulse 1.8s ease-in-out infinite;
}

.track-rung.hint {
  stroke: rgba(167,243,208,0.38);
}

@keyframes trackDash {
  from {
    stroke-dashoffset: 0;
  }
  to {
    stroke-dashoffset: -30;
  }
}

@keyframes rungPulse {
  0%, 100% {
    opacity: 0.28;
  }
  50% {
    opacity: 0.7;
  }
}

#miss-line {
  position: absolute;
  left: 0;
  right: 0;
  bottom: var(--keyboard-height);
  height: 4px;
  z-index: 70;
  background: linear-gradient(90deg, transparent, rgba(251,113,133,0.45), transparent);
  pointer-events: none;
}

.depth-character {
  position: absolute;
  z-index: 40;
  background: transparent;
  border: none;
  box-shadow: none;
  color: #4c1d95;
  font-weight: 900;
  line-height: 1;
  text-shadow:
    0 4px 0 rgba(255,255,255,0.88),
    0 10px 20px rgba(76,29,149,0.30);
  transform-origin: center center;
  will-change: left, top, transform, opacity, font-size;
}

.depth-character.correct {
  filter: brightness(1.14) drop-shadow(0 0 10px rgba(34,197,94,0.45));
}

.depth-character.complete {
  animation: completeFade 0.28s ease-out forwards;
}

@keyframes completeFade {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  55% {
    opacity: 1;
    filter: brightness(1.25);
    transform: translate(-50%, -50%) scale(1.08);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.22);
  }
}

.progress {
  position: absolute;
  left: 50%;
  bottom: -24px;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.82);
  border: 2px solid rgba(124,58,237,0.68);
}

.dot.done {
  background: var(--green);
  border-color: #16a34a;
}

.dot.next {
  background: #fef9c3;
  border-color: #facc15;
}

#piano-wrap {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--keyboard-height);
  z-index: 100;
  padding:
    clamp(8px, 1.5vh, 12px)
    max(8px, env(safe-area-inset-left))
    max(10px, env(safe-area-inset-bottom));
  background:
    linear-gradient(180deg, rgba(15,23,42,0.24), rgba(15,23,42,0) 22%),
    linear-gradient(180deg, rgba(248,250,252,0.96), rgba(203,213,225,0.98));
  border-top: 4px solid rgba(255,255,255,0.92);
  box-shadow: 0 -8px 24px rgba(76,29,149,0.18);
}

#piano {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 1180px;
  margin: 0 auto;
  border-radius: 14px;
  background: linear-gradient(180deg, #1e293b, #020617);
  padding: 3px;
  box-shadow:
    0 10px 20px rgba(15,23,42,0.22),
    inset 0 2px 8px rgba(255,255,255,0.12);
}

.white-key {
  position: absolute;
  bottom: 3px;
  height: calc(100% - 6px);
  border: 1.5px solid #cbd5e1;
  border-bottom: 9px solid #94a3b8;
  border-radius: 0 0 15px 15px;
  background:
    linear-gradient(180deg, #ffffff 0%, #f8fafc 58%, #dbeafe 100%);
  color: #4c1d95;
  cursor: pointer;
  overflow: hidden;
  box-shadow:
    inset 0 -12px 18px rgba(15,23,42,0.07),
    inset 0 6px 9px rgba(255,255,255,0.82);
  transition: transform 0.07s, border-bottom-width 0.07s, filter 0.07s;
}

/* 一开始不做紫色提示，所以 required 不加明显颜色 */
.white-key.required {
  border-color: #cbd5e1;
}

.white-key.hint {
  border-color: #22c55e;
  box-shadow:
    inset 0 -12px 18px rgba(15,23,42,0.07),
    inset 0 6px 9px rgba(255,255,255,0.82),
    0 0 14px rgba(34,197,94,0.34);
}

.white-key.used {
  opacity: 0.55;
}

.white-key.pressed {
  transform: translateY(5px);
  border-bottom-width: 2px;
  filter: brightness(0.96);
}

.white-key.wrong {
  background: #ffe4e6;
  border-color: #fb7185;
  animation: wrongShake 0.18s linear;
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.black-key {
  position: absolute;
  top: 3px;
  height: 48%;
  width: 7.2%;
  border: 2px solid #020617;
  border-bottom: 7px solid #020617;
  border-radius: 0 0 10px 10px;
  background:
    linear-gradient(180deg, #475569 0%, #111827 58%, #020617 100%);
  color: white;
  z-index: 8;
  cursor: pointer;
  box-shadow:
    0 6px 10px rgba(15,23,42,0.42),
    inset 0 -8px 12px rgba(0,0,0,0.42),
    inset 0 4px 5px rgba(255,255,255,0.13);
  transition: transform 0.07s, border-bottom-width 0.07s, filter 0.07s;
}

.black-key.pressed {
  transform: translateY(5px);
  border-bottom-width: 2px;
  filter: brightness(1.18);
}

.key-radical {
  position: absolute;
  left: 50%;
  top: 68%;
  transform: translate(-50%, -50%);
  font-size: clamp(30px, 5.8vw, 56px);
  font-weight: 900;
  z-index: 12;
  line-height: 1;
}

.key-note {
  position: absolute;
  left: 50%;
  bottom: clamp(5px, 1vh, 9px);
  transform: translateX(-50%);
  font-size: clamp(9px, 1.8vw, 13px);
  font-weight: 900;
  color: #64748b;
  z-index: 12;
}

.black-key .key-note {
  color: #cbd5e1;
  font-size: clamp(8px, 1.4vw, 11px);
}

.hit-token {
  position: absolute;
  z-index: 95;
  min-width: 48px;
  height: 48px;
  padding: 0 9px;
  border-radius: 16px;
  background: rgba(255,255,255,0.95);
  border: 3px solid #4ade80;
  color: #5b21b6;
  font-size: 28px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 16px rgba(34,197,94,0.52),
    0 6px 16px rgba(76,29,149,0.20);
  pointer-events: none;
}

.impact-ring {
  position: absolute;
  z-index: 120;
  width: 28px;
  height: 28px;
  border: 3px solid rgba(34,197,94,0.62);
  border-radius: 999px;
  transform: translate(-50%, -50%) scale(0.35);
  pointer-events: none;
  animation: impactRing 0.34s ease-out forwards;
}

@keyframes impactRing {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(0.35);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(2.2);
  }
}

.overlay {
  position: absolute;
  inset: 0;
  z-index: 300;
  background: rgba(76,29,149,0.90);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

.overlay h1 {
  margin: 0 0 10px;
  color: #fef9c3;
  font-size: clamp(32px, 8vw, 60px);
  line-height: 1.05;
  text-shadow: 0 5px 0 rgba(124,58,237,0.8);
}

.version-label {
  margin: 0 0 18px;
  color: #a7f3d0;
  font-size: 18px;
  font-weight: 900;
}

.overlay p {
  margin: 0 0 26px;
  max-width: 760px;
  color: #ede9fe;
  font-size: clamp(16px, 3vw, 22px);
  font-weight: 800;
  line-height: 1.45;
}

.btn {
  border: 3px solid #a7f3d0;
  background: #34d399;
  color: #064e3b;
  padding: 13px 32px;
  font-size: 24px;
  font-weight: 900;
  border-radius: 999px;
  box-shadow: 0 8px 0 #10b981;
  cursor: pointer;
}

.btn:active {
  transform: translateY(7px);
  box-shadow: 0 1px 0 #10b981;
}

@media (orientation: landscape) and (max-height: 760px) {
  :root {
    --keyboard-height: clamp(158px, 36vh, 230px);
  }

  .hud-box {
    padding: 5px 9px;
    font-size: clamp(12px, 2vw, 16px);
  }

  .black-key {
    height: 44%;
  }

  .key-radical {
    top: 70%;
    font-size: clamp(30px, 6vh, 48px);
  }

  .progress {
    bottom: -18px;
  }

  .dot {
    width: 8px;
    height: 8px;
  }
}

@media (max-width: 700px) {
  :root {
    --keyboard-height: clamp(168px, 34vh, 240px);
  }

  .hit-token {
    min-width: 42px;
    height: 42px;
    font-size: 24px;
  }

  .key-radical {
    font-size: clamp(32px, 8vw, 52px);
  }
}
</style>
</head>

<body>
<div id="game">
  <div id="hud">
    <div class="hud-box">⭐ <span id="score">0</span></div>
  </div>

  <div id="arena">
    <div id="depth-fog"></div>
    <svg id="track-svg"></svg>
  </div>

  <div id="miss-line"></div>

  <div id="piano-wrap">
    <div id="piano"></div>
  </div>

  <div id="start-screen" class="overlay">
    <h1 id="start-title">题库加载中...</h1>
    <div class="version-label" id="version-label">Version v1.9.0</div>
    <p id="start-text">正在连接 Google Sheet [HYPY] 分页</p>
  </div>
</div>

<script>
const GAME_VERSION = "v1.9.0";

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";

const KEY_COUNT = 8;
const HINT_AFTER_PROGRESS = 0.5;

const WHITE_KEYS = [
  { label: "C", freq: 261.63 },
  { label: "D", freq: 293.66 },
  { label: "E", freq: 329.63 },
  { label: "F", freq: 349.23 },
  { label: "G", freq: 392.00 },
  { label: "A", freq: 440.00 },
  { label: "B", freq: 493.88 },
  { label: "C", freq: 523.25 }
];

const BLACK_KEYS = [
  { afterWhite: 0, label: "C#", freq: 277.18 },
  { afterWhite: 1, label: "D#", freq: 311.13 },
  { afterWhite: 3, label: "F#", freq: 369.99 },
  { afterWhite: 4, label: "G#", freq: 415.30 },
  { afterWhite: 5, label: "A#", freq: 466.16 }
];

const distractors = [
  "扌", "亻", "心", "忄", "月", "虫", "门", "广",
  "走", "雨", "艹", "口", "氵", "日", "木", "女",
  "讠", "辶", "土", "火", "宀", "贝", "王", "纟",
  "石", "禾", "目", "竹", "页", "刂"
];

const arena = document.getElementById("arena");
const trackSvg = document.getElementById("track-svg");
const piano = document.getElementById("piano");
const startScreen = document.getElementById("start-screen");
const scoreEl = document.getElementById("score");

let dictionary = [];
let score = 0;

let isPlaying = false;
let character = null;
let hitTokens = [];
let keyboardSlots = [];

let keyCenters = [];
let trackGeometry = [];

let animationRef = null;
let spawnTimer = null;
let lastFrameTime = 0;
let idCounter = 1;

let audioCtx = null;
let activeNotes = new Map();

window.addEventListener("load", () => {
  setViewportHeight();
  loadDictionary();
});

window.addEventListener("resize", () => {
  setViewportHeight();
  handleResize();
});

window.addEventListener("orientationchange", () => {
  setTimeout(() => {
    setViewportHeight();
    handleResize();
  }, 300);
});

function setViewportHeight() {
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty("--vh", `${vh}px`);
}

function loadDictionary() {
  document.getElementById("version-label").textContent = `Version ${GAME_VERSION}`;

  Papa.parse(SHEET_URL + "&t=" + Date.now(), {
    download: true,
    header: true,
    skipEmptyLines: "greedy",
    transformHeader: h => normalizeHeader(h),
    complete: results => {
      dictionary = [];

      results.data.forEach(row => {
        const word =
          cleanCell(row["QUESTION"]) ||
          cleanCell(row["ANSWER"]) ||
          cleanCell(row["CORRECT ANSWER"]);

        const partsStr =
          cleanCell(row["PARTS"]) ||
          cleanCell(row["部件"]);

        if (!word || !partsStr) return;

        const parts = partsStr
          .split(/[,，、|/]/)
          .map(p => p.trim())
          .filter(Boolean);

        if (!parts.length) return;

        dictionary.push({ word, parts });
      });

      if (dictionary.length) {
        showReadyScreen();
      } else {
        showLoadError("没有找到有效题目。请检查 Question / Parts 列。");
      }
    },
    error: err => {
      console.error(err);
      showLoadError("Google Sheet 加载失败，请检查网络或表格权限。");
    }
  });
}

function normalizeHeader(h) {
  return String(h || "")
    .replace(/^\uFEFF/, "")
    .trim()
    .toUpperCase();
}

function cleanCell(value) {
  return String(value || "").trim();
}

function showReadyScreen() {
  document.getElementById("start-title").textContent = "汉字连击 · 轨道钢琴版";
  document.getElementById("start-text").innerHTML =
    `已加载 <b>${dictionary.length}</b> 个汉字。<br><br>` +
    `v1.9.0：轨道动画升级、下一个字更快出现、长按琴键支持长音。`;

  const oldBtn = document.getElementById("start-btn");
  if (oldBtn) oldBtn.remove();

  const btn = document.createElement("button");
  btn.id = "start-btn";
  btn.className = "btn";
  btn.textContent = "开始";
  btn.addEventListener("click", startGame);
  startScreen.appendChild(btn);
}

function showLoadError(message) {
  document.getElementById("start-title").textContent = "数据加载失败";
  document.getElementById("start-text").textContent = message;
}

function startGame() {
  if (!dictionary.length) return;

  ensureAudio();
  clearTimers();
  clearScene();

  score = 0;
  isPlaying = true;
  lastFrameTime = performance.now();

  startScreen.style.display = "none";

  initKeyboardSlots();
  renderPiano();

  requestAnimationFrame(() => {
    calculateKeyCenters();
    renderTracks();
    spawnCharacter();
    updateHUD();
    animationRef = requestAnimationFrame(gameLoop);
  });
}

function clearTimers() {
  if (spawnTimer) clearTimeout(spawnTimer);
  if (animationRef) cancelAnimationFrame(animationRef);
  spawnTimer = null;
  animationRef = null;
}

function clearScene() {
  if (character?.el) character.el.remove();
  hitTokens.forEach(t => t.el.remove());

  character = null;
  hitTokens = [];
  keyboardSlots = [];
  keyCenters = [];
  trackGeometry = [];

  stopAllNotes();

  piano.innerHTML = "";
  trackSvg.innerHTML = "";
}

function initKeyboardSlots() {
  keyboardSlots = Array.from({ length: KEY_COUNT }, (_, i) => ({
    kind: "distractor",
    char: randomDistractorAvoiding([]),
    noteIndex: i
  }));
}

function spawnCharacter() {
  if (!isPlaying || character) return;

  const data = dictionary[Math.floor(Math.random() * dictionary.length)];
  if (!data) {
    scheduleNextCharacter(80);
    return;
  }

  const el = document.createElement("div");
  el.className = "depth-character";

  const wordSpan = document.createElement("span");
  wordSpan.textContent = data.word;
  el.appendChild(wordSpan);

  const progress = document.createElement("div");
  progress.className = "progress";

  data.parts.forEach(() => {
    const dot = document.createElement("div");
    dot.className = "dot";
    progress.appendChild(dot);
  });

  el.appendChild(progress);
  arena.appendChild(el);

  character = {
    id: nextId(),
    el,
    word: data.word,
    parts: [...data.parts],
    nextPartIndex: 0,

    laneIndex: Math.floor(Math.random() * KEY_COUNT),
    laneOffset: randomBetween(-0.04, 0.04),

    z: 0.985,
    baseSpeed: -0.00040,
    zVelocity: -0.00040,

    slowUntil: 0,
    scaleKick: 0,
    dead: false,
    completed: false
  };

  placePartsForCharacter();
  renderPiano();
  renderTracks();
  renderCharacter();
}

function placePartsForCharacter() {
  if (!character) return;

  initKeyboardSlots();

  const parts = character.parts.slice(0, KEY_COUNT);
  const indices = Array.from({ length: KEY_COUNT }, (_, i) => i);
  shuffle(indices);

  for (let i = 0; i < parts.length; i++) {
    const slotIndex = indices[i];
    keyboardSlots[slotIndex] = {
      kind: "part",
      char: parts[i],
      partIndex: i,
      noteIndex: slotIndex
    };
  }

  for (let i = 0; i < KEY_COUNT; i++) {
    if (!keyboardSlots[i] || keyboardSlots[i].kind !== "part") {
      keyboardSlots[i] = {
        kind: "distractor",
        char: randomDistractorAvoiding(parts),
        noteIndex: i
      };
    }
  }
}

function getTravelProgress() {
  if (!character) return 0;
  return clamp((0.985 - character.z) / 0.965, 0, 1);
}

function shouldShowHint() {
  return getTravelProgress() >= HINT_AFTER_PROGRESS;
}

function getHintSlotIndices() {
  if (!character || !shouldShowHint()) return new Set();

  const remaining = new Set();

  keyboardSlots.forEach((slot, index) => {
    if (
      slot.kind === "part" &&
      slot.partIndex >= character.nextPartIndex
    ) {
      remaining.add(index);
    }
  });

  return remaining;
}

function renderPiano() {
  piano.innerHTML = "";

  const whiteWidth = 100 / KEY_COUNT;
  const hintSlots = getHintSlotIndices();

  keyboardSlots.forEach((slot, index) => {
    const keyInfo = WHITE_KEYS[index];

    const btn = document.createElement("button");
    btn.className = "white-key";

    if (slot.kind === "part") btn.classList.add("required");
    if (hintSlots.has(index)) btn.classList.add("hint");
    if (slot.kind === "used") btn.classList.add("used");

    btn.style.left = `${index * whiteWidth}%`;
    btn.style.width = `${whiteWidth}%`;

    const radicalSpan = document.createElement("div");
    radicalSpan.className = "key-radical";
    radicalSpan.textContent = slot.char || "";

    const noteSpan = document.createElement("div");
    noteSpan.className = "key-note";
    noteSpan.textContent = keyInfo.label;

    btn.appendChild(radicalSpan);
    btn.appendChild(noteSpan);

    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      handleWhiteKeyDown(index, btn);
    });

    btn.addEventListener("pointerup", e => {
      e.preventDefault();
      handleKeyRelease(`white-${index}`, btn);
    });

    btn.addEventListener("pointercancel", e => {
      e.preventDefault();
      handleKeyRelease(`white-${index}`, btn);
    });

    btn.addEventListener("pointerleave", e => {
      e.preventDefault();
      handleKeyRelease(`white-${index}`, btn);
    });

    piano.appendChild(btn);
  });

  BLACK_KEYS.forEach((black, blackIndex) => {
    const btn = document.createElement("button");
    btn.className = "black-key";

    const leftPercent = ((black.afterWhite + 1) * whiteWidth) - 3.6;
    btn.style.left = `${leftPercent}%`;

    const noteSpan = document.createElement("div");
    noteSpan.className = "key-note";
    noteSpan.textContent = black.label;
    btn.appendChild(noteSpan);

    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      pressVisual(btn);
      startSustainNote(`black-${blackIndex}`, black.freq);
    });

    btn.addEventListener("pointerup", e => {
      e.preventDefault();
      handleKeyRelease(`black-${blackIndex}`, btn);
    });

    btn.addEventListener("pointercancel", e => {
      e.preventDefault();
      handleKeyRelease(`black-${blackIndex}`, btn);
    });

    btn.addEventListener("pointerleave", e => {
      e.preventDefault();
      handleKeyRelease(`black-${blackIndex}`, btn);
    });

    piano.appendChild(btn);
  });

  requestAnimationFrame(() => {
    calculateKeyCenters();
    renderTracks();
  });
}

function handleWhiteKeyDown(slotIndex, buttonElement) {
  if (!isPlaying || !character) return;

  const slot = keyboardSlots[slotIndex];
  if (!slot) return;

  pressVisual(buttonElement);
  startSustainNote(`white-${slotIndex}`, WHITE_KEYS[slotIndex].freq);

  if (slot.kind !== "part" || slot.partIndex !== character.nextPartIndex) {
    buttonElement.classList.add("wrong");
    setTimeout(() => buttonElement.classList.remove("wrong"), 180);
    playBadTone();
    return;
  }

  score += 100;

  const arenaRect = arena.getBoundingClientRect();
  const keyRect = buttonElement.getBoundingClientRect();

  const startX = keyRect.left + keyRect.width / 2 - arenaRect.left;
  const startY = arena.clientHeight + 4;

  launchHitToken(slot.char, startX, startY, character, slot.partIndex, slotIndex);

  keyboardSlots[slotIndex] = {
    kind: "used",
    char: "",
    noteIndex: slotIndex
  };

  updateHUD();
  renderPiano();
}

function handleKeyRelease(noteId, buttonElement) {
  stopSustainNote(noteId);
  buttonElement.classList.remove("pressed");
}

function calculateKeyCenters() {
  keyCenters = [];

  const arenaRect = arena.getBoundingClientRect();
  const whiteKeys = piano.querySelectorAll(".white-key");

  whiteKeys.forEach(key => {
    const rect = key.getBoundingClientRect();

    keyCenters.push({
      x: rect.left + rect.width / 2 - arenaRect.left,
      y: arenaRect.height + 8
    });
  });
}

function getFarPoint() {
  return {
    x: arena.clientWidth / 2,
    y: Math.max(-arena.clientHeight * 0.62, -320)
  };
}

function renderTracks() {
  if (!keyCenters.length) return;

  const far = getFarPoint();
  const hintSlots = getHintSlotIndices();

  trackSvg.innerHTML = "";
  trackSvg.setAttribute("viewBox", `0 0 ${arena.clientWidth} ${arena.clientHeight}`);

  trackGeometry = [];

  for (let i = 0; i < KEY_COUNT; i++) {
    const base = keyCenters[i];
    const isHint = hintSlots.has(i);

    const laneWidthNear = Math.min(96, arena.clientWidth / KEY_COUNT * 0.82);
    const nearLeft = base.x - laneWidthNear / 2;
    const nearRight = base.x + laneWidthNear / 2;

    const farOffset = (i - (KEY_COUNT - 1) / 2) * 3.2;
    const farX = far.x + farOffset;
    const farY = far.y;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute(
      "d",
      `M ${nearLeft} ${arena.clientHeight}
       L ${farX - 12} ${farY}
       L ${farX + 12} ${farY}
       L ${nearRight} ${arena.clientHeight}
       Z`
    );
    path.setAttribute("class", isHint ? "track-fill hint-fill" : "track-fill");
    trackSvg.appendChild(path);

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", base.x);
    line.setAttribute("y1", arena.clientHeight);
    line.setAttribute("x2", farX);
    line.setAttribute("y2", farY);
    line.setAttribute("class", isHint ? "track-line hint" : "track-line");
    trackSvg.appendChild(line);

    for (let r = 1; r <= 9; r++) {
      const t = r / 10;
      const y = farY + (arena.clientHeight - farY) * t;
      const width = 12 + t * laneWidthNear;
      const x = farX + (base.x - farX) * t;

      const rung = document.createElementNS("http://www.w3.org/2000/svg", "line");
      rung.setAttribute("x1", x - width / 2);
      rung.setAttribute("y1", y);
      rung.setAttribute("x2", x + width / 2);
      rung.setAttribute("y2", y);
      rung.setAttribute("class", isHint ? "track-rung hint" : "track-rung");
      rung.style.animationDelay = `${r * -0.14}s`;
      trackSvg.appendChild(rung);
    }

    trackGeometry[i] = {
      nearX: base.x,
      nearY: arena.clientHeight,
      farX,
      farY
    };
  }
}

function getPointOnLane(laneIndex, z, offset = 0) {
  const lane = trackGeometry[laneIndex] || trackGeometry[0];
  if (!lane) return { x: arena.clientWidth / 2, y: arena.clientHeight / 2 };

  const t = 1 - z;
  const x = lane.farX + (lane.nearX - lane.farX) * t;
  const y = lane.farY + (lane.nearY - lane.farY) * t;
  const laneWidth = 12 + t * 72;

  return { x: x + offset * laneWidth, y };
}

function renderCharacter() {
  if (!character || character.dead) return;

  const point = getPointOnLane(character.laneIndex, character.z, character.laneOffset);
  const closeness = 1 - character.z;

  const scale = 0.24 + closeness * 1.38 + character.scaleKick;
  const opacity = 0.28 + closeness * 0.72;
  const fontSize = clamp(54 + closeness * 64, 42, 118);

  character.el.style.left = `${point.x}px`;
  character.el.style.top = `${point.y}px`;
  character.el.style.opacity = opacity;
  character.el.style.fontSize = `${fontSize}px`;
  character.el.style.transform = `translate(-50%, -50%) scale(${scale})`;
  character.el.style.zIndex = String(35 + Math.floor(closeness * 45));

  const dots = character.el.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("done", i < character.nextPartIndex);
    dot.classList.toggle("next", i === character.nextPartIndex);
  });
}

function launchHitToken(char, x, y, target, partIndex, laneIndex) {
  const el = document.createElement("div");
  el.className = "hit-token";
  el.textContent = char;

  const token = {
    id: nextId(),
    el,
    char,
    partIndex,
    laneIndex,
    target,
    z: 0.02,
    x,
    y,
    dead: false,
    arrived: false
  };

  arena.appendChild(el);
  hitTokens.push(token);
  renderHitToken(token);
}

function renderHitToken(t) {
  t.el.style.left = `${t.x}px`;
  t.el.style.top = `${t.y}px`;
  const scale = 1.02 - t.z * 0.45;
  t.el.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

function gameLoop(now) {
  if (!isPlaying) return;

  const rawDelta = Math.min(32, now - lastFrameTime);
  lastFrameTime = now;
  const dt = rawDelta / 16.67;

  updateCharacter(dt, now);
  updateHitTokens(dt);
  cleanupDeadObjects();

  animationRef = requestAnimationFrame(gameLoop);
}

function updateCharacter(dt, now) {
  if (!character || character.dead || character.completed) return;

  const oldShouldHint = shouldShowHint();

  const slowed = now < character.slowUntil;
  const speed = slowed ? character.baseSpeed * 0.28 : character.baseSpeed;

  character.z += speed * dt;
  character.scaleKick *= Math.pow(0.9, dt);

  if (character.z <= 0.02) {
    missCharacter();
    return;
  }

  renderCharacter();

  if (oldShouldHint !== shouldShowHint()) {
    renderPiano();
    renderTracks();
  }
}

function updateHitTokens(dt) {
  hitTokens.forEach(t => {
    if (t.dead || !t.target || t.target.dead) {
      t.dead = true;
      return;
    }

    t.z += 0.045 * dt;
    if (t.z > t.target.z) t.z = t.target.z;

    const targetPoint = getPointOnLane(t.target.laneIndex, t.target.z, t.target.laneOffset);
    const lanePoint = getPointOnLane(t.laneIndex, t.z, 0);

    const blend = Math.min(1, t.z / Math.max(0.001, t.target.z));
    t.x = lanePoint.x + (targetPoint.x - lanePoint.x) * blend;
    t.y = lanePoint.y + (targetPoint.y - lanePoint.y) * blend;

    if (!t.arrived && (distance(t.x, t.y, targetPoint.x, targetPoint.y) < 32 || t.z >= t.target.z - 0.01)) {
      t.arrived = true;
      tokenHitsCharacter(t, t.target);
    }

    renderHitToken(t);
  });
}

function tokenHitsCharacter(token, c) {
  token.dead = true;

  c.nextPartIndex++;
  c.slowUntil = performance.now() + 3200;
  c.scaleKick = 0.05;

  c.el.classList.add("correct");
  setTimeout(() => c.el?.classList.remove("correct"), 150);

  const point = getPointOnLane(c.laneIndex, c.z, c.laneOffset);
  createImpactRing(point.x, point.y);
  playBounceTone();

  if (c.nextPartIndex >= c.parts.length) {
    completeCharacter(c);
  } else {
    refillUsedSlot(token.laneIndex);
    renderPiano();
    renderTracks();
  }

  renderCharacter();
  updateHUD();
}

function refillUsedSlot(slotIndex) {
  const pending = findPendingPartNotVisible();

  if (pending) {
    keyboardSlots[slotIndex] = {
      kind: "part",
      char: pending.char,
      partIndex: pending.partIndex,
      noteIndex: slotIndex
    };
  } else {
    keyboardSlots[slotIndex] = {
      kind: "distractor",
      char: randomDistractorAvoiding(getVisibleParts()),
      noteIndex: slotIndex
    };
  }
}

function findPendingPartNotVisible() {
  if (!character) return null;

  for (let i = character.nextPartIndex; i < character.parts.length; i++) {
    const visible = keyboardSlots.some(slot =>
      slot.kind === "part" &&
      slot.partIndex === i
    );

    if (!visible) {
      return {
        partIndex: i,
        char: character.parts[i]
      };
    }
  }

  return null;
}

function getVisibleParts() {
  return keyboardSlots
    .filter(slot => slot.kind === "part")
    .map(slot => slot.char);
}

function createImpactRing(x, y) {
  const ring = document.createElement("div");
  ring.className = "impact-ring";
  ring.style.left = `${x}px`;
  ring.style.top = `${y}px`;
  arena.appendChild(ring);
  setTimeout(() => ring.remove(), 360);
}

function completeCharacter(c) {
  c.completed = true;
  score += 300;

  clearKeyboardParts();
  renderPiano();
  renderTracks();

  c.el.classList.add("complete");
  playCompleteSound();

  setTimeout(() => {
    if (character?.el) character.el.remove();
    character = null;
    scheduleNextCharacter(80);
  }, 280);

  updateHUD();
}

function missCharacter() {
  if (!character) return;

  character.dead = true;
  clearKeyboardParts();
  renderPiano();
  renderTracks();

  character.el.style.transition = "opacity 0.18s, transform 0.18s";
  character.el.style.opacity = "0";

  setTimeout(() => {
    if (character?.el) character.el.remove();
    character = null;
    scheduleNextCharacter(80);
  }, 180);
}

function clearKeyboardParts() {
  for (let i = 0; i < KEY_COUNT; i++) {
    keyboardSlots[i] = {
      kind: "distractor",
      char: randomDistractorAvoiding([]),
      noteIndex: i
    };
  }
}

function scheduleNextCharacter(delay) {
  clearTimeout(spawnTimer);
  spawnTimer = setTimeout(() => {
    if (isPlaying && !character) spawnCharacter();
  }, delay);
}

function cleanupDeadObjects() {
  hitTokens = hitTokens.filter(t => {
    if (!t.dead) return true;
    t.el.remove();
    return false;
  });
}

function updateHUD() {
  scoreEl.textContent = score;
}

function pressVisual(el) {
  el.classList.add("pressed");
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume().catch(() => {});
  }
}

function startSustainNote(noteId, freq) {
  ensureAudio();

  if (activeNotes.has(noteId)) return;

  const now = audioCtx.currentTime;
  const output = audioCtx.createGain();
  output.gain.setValueAtTime(0.001, now);
  output.gain.linearRampToValueAtTime(0.12, now + 0.025);
  output.connect(audioCtx.destination);

  const oscillators = [];

  const harmonics = [
    { ratio: 1, amp: 1.0 },
    { ratio: 2, amp: 0.35 },
    { ratio: 3, amp: 0.16 }
  ];

  harmonics.forEach(h => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(freq * h.ratio, now);

    gain.gain.setValueAtTime(0.001, now);
    gain.gain.linearRampToValueAtTime(0.18 * h.amp, now + 0.03);

    osc.connect(gain);
    gain.connect(output);

    osc.start(now);
    oscillators.push({ osc, gain });
  });

  activeNotes.set(noteId, {
    output,
    oscillators
  });
}

function stopSustainNote(noteId) {
  if (!audioCtx) return;

  const note = activeNotes.get(noteId);
  if (!note) return;

  const now = audioCtx.currentTime;

  try {
    note.output.gain.cancelScheduledValues(now);
    note.output.gain.setValueAtTime(note.output.gain.value || 0.08, now);
    note.output.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

    note.oscillators.forEach(({ osc }) => {
      osc.stop(now + 0.24);
    });

    setTimeout(() => {
      try {
        note.output.disconnect();
      } catch (e) {}
    }, 280);
  } catch (e) {}

  activeNotes.delete(noteId);
}

function stopAllNotes() {
  Array.from(activeNotes.keys()).forEach(key => stopSustainNote(key));
}

function playBadTone() {
  playSimpleTone(180, 0.15, 0.07, "sawtooth");
}

function playBounceTone() {
  playSimpleTone(392, 0.1, 0.07, "triangle");
}

function playCompleteSound() {
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    setTimeout(() => playSimpleTone(freq, 0.13, 0.08, "sine"), i * 70);
  });
}

function playSimpleTone(freq, duration, volume, wave) {
  ensureAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const now = audioCtx.currentTime;

  osc.type = wave || "sine";
  osc.frequency.setValueAtTime(freq, now);

  gain.gain.setValueAtTime(0.001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.018);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + duration + 0.03);
}

function handleResize() {
  if (!isPlaying) return;

  calculateKeyCenters();
  renderTracks();
  renderCharacter();
}

function randomDistractorAvoiding(avoidList) {
  const safe = distractors.filter(d => !avoidList.includes(d));
  const pool = safe.length ? safe : distractors;
  return pool[Math.floor(Math.random() * pool.length)];
}

function nextId() {
  return idCounter++;
}

function randomBetween(min, max) {
  return min + Math.random() * (max - min);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function distance(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
</script>
