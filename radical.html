<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PSLE 汉字连击快线 · 钢琴杂耍版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --purple: #5b21b6;
  --green: #22c55e;
  --pink: #fb7185;
  --yellow: #facc15;
  --glass: rgba(255,255,255,0.72);
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Nunito", "Microsoft YaHei", "PingFang SC", sans-serif;
  background: linear-gradient(180deg, #93c5fd 0%, #bfdbfe 45%, #fef3c7 100%);
}

body {
  touch-action: manipulation;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#cloud-layer {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.35;
  background-image:
    radial-gradient(circle at 14% 18%, rgba(255,255,255,0.95) 0 28px, transparent 29px),
    radial-gradient(circle at 25% 15%, rgba(255,255,255,0.75) 0 42px, transparent 43px),
    radial-gradient(circle at 70% 24%, rgba(255,255,255,0.85) 0 36px, transparent 37px),
    radial-gradient(circle at 83% 21%, rgba(255,255,255,0.72) 0 48px, transparent 49px);
  animation: cloudMove 18s linear infinite;
}

@keyframes cloudMove {
  from { background-position: 0 0; }
  to { background-position: 260px 0; }
}

#hud {
  position: absolute;
  top: 10px;
  left: 12px;
  right: 12px;
  z-index: 60;
  display: flex;
  justify-content: space-between;
  gap: 8px;
  pointer-events: none;
}

.hud-box {
  background: var(--glass);
  backdrop-filter: blur(6px);
  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 18px;
  padding: 8px 12px;
  font-size: clamp(14px, 3vw, 22px);
  font-weight: 900;
  color: var(--purple);
  box-shadow: 0 6px 16px rgba(76,29,149,0.14);
}

#lives {
  color: #e11d48;
  letter-spacing: 2px;
}

#arena {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 154px;
  z-index: 5;
  overflow: hidden;
}

#danger-line {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 154px;
  height: 5px;
  z-index: 50;
  background: rgba(251,113,133,0.85);
  box-shadow: 0 -4px 14px rgba(251,113,133,0.45);
}

#song-panel {
  position: absolute;
  left: 50%;
  top: 62px;
  transform: translateX(-50%);
  z-index: 55;
  background: rgba(255,255,255,0.66);
  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 999px;
  padding: 7px 16px;
  color: #4c1d95;
  font-weight: 900;
  font-size: clamp(13px, 2.5vw, 18px);
  pointer-events: none;
  box-shadow: 0 6px 16px rgba(76,29,149,0.12);
}

.falling-character {
  position: absolute;
  z-index: 20;
  width: 96px;
  height: 96px;
  border-radius: 28px;
  background: rgba(255,255,255,0.92);
  border: 4px solid rgba(196,181,253,0.96);
  color: #4c1d95;
  font-size: 54px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 10px 0 rgba(124,58,237,0.16),
    0 16px 26px rgba(76,29,149,0.2);
  transform: translate(-50%, -50%);
  will-change: left, top, transform;
}

.falling-character.hit {
  filter: brightness(1.16);
}

.falling-character.complete {
  animation: completePop 0.42s ease-out forwards;
}

@keyframes completePop {
  0% { opacity: 1; }
  50% { opacity: 1; filter: brightness(1.45); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.65) rotate(35deg); }
}

.progress {
  position: absolute;
  bottom: -27px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
}

.dot {
  width: 11px;
  height: 11px;
  border-radius: 99px;
  background: rgba(255,255,255,0.78);
  border: 2px solid rgba(124,58,237,0.7);
}

.dot.done {
  background: var(--green);
  border-color: #16a34a;
}

#piano {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 154px;
  z-index: 80;
  display: grid;
  grid-template-columns: repeat(8, minmax(0, 1fr));
  gap: 2px;
  padding: 8px 10px 12px;
  background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(226,232,240,0.94));
  border-top: 4px solid rgba(255,255,255,0.95);
  box-shadow: 0 -8px 20px rgba(76,29,149,0.13);
}

.piano-key {
  position: relative;
  border: 2px solid #cbd5e1;
  border-bottom: 8px solid #94a3b8;
  border-radius: 0 0 18px 18px;
  background: linear-gradient(180deg, #ffffff 0%, #f8fafc 72%, #e2e8f0 100%);
  color: #4c1d95;
  cursor: pointer;
  overflow: hidden;
  box-shadow: inset 0 -10px 18px rgba(15,23,42,0.06);
  transition: transform 0.07s, border-bottom-width 0.07s, filter 0.07s;
}

.piano-key:active,
.piano-key.pressed {
  transform: translateY(5px);
  border-bottom-width: 2px;
  filter: brightness(0.96);
}

.piano-key.required {
  border-color: #c4b5fd;
}

.piano-key.song-next {
  border-color: #86efac;
  box-shadow:
    inset 0 -10px 18px rgba(15,23,42,0.06),
    0 0 18px rgba(34,197,94,0.36);
}

.piano-key.empty-key {
  opacity: 0.45;
}

.piano-key.wrong {
  background: #ffe4e6;
  border-color: #fb7185;
  animation: wrongShake 0.2s linear;
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-7px); }
  75% { transform: translateX(7px); }
}

.key-radical {
  position: absolute;
  left: 50%;
  top: 47%;
  transform: translate(-50%, -50%);
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 900;
}

.key-note {
  position: absolute;
  left: 50%;
  bottom: 10px;
  transform: translateX(-50%);
  font-size: 13px;
  font-weight: 900;
  color: #64748b;
}

.hit-token {
  position: absolute;
  z-index: 100;
  min-width: 58px;
  height: 58px;
  padding: 0 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.95);
  border: 3px solid #4ade80;
  color: #5b21b6;
  font-size: 34px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 22px rgba(34,197,94,0.65),
    0 8px 20px rgba(76,29,149,0.22);
  pointer-events: none;
}

.particle {
  position: absolute;
  z-index: 120;
  pointer-events: none;
  font-size: 18px;
  font-weight: 900;
}

.float-text {
  position: absolute;
  z-index: 130;
  pointer-events: none;
  font-size: 28px;
  font-weight: 900;
  color: #fef9c3;
  text-shadow: 0 4px 10px rgba(76,29,149,0.55);
  animation: floatUp 0.75s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 0; transform: translate(-50%, 0) scale(0.85); }
  20% { opacity: 1; transform: translate(-50%, -8px) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -48px) scale(1.05); }
}

.center-msg {
  position: absolute;
  z-index: 140;
  left: 50%;
  top: 42%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  font-size: clamp(30px, 7vw, 60px);
  font-weight: 900;
  color: #fef9c3;
  text-shadow: 0 5px 14px rgba(76,29,149,0.55);
  animation: centerPulse 0.75s ease-out forwards;
}

.center-msg.good {
  color: #22c55e;
}

.center-msg.bad {
  color: #fb7185;
}

@keyframes centerPulse {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.75); }
  25% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -65%) scale(1.05); }
}

.overlay {
  position: absolute;
  inset: 0;
  z-index: 220;
  background: rgba(76,29,149,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

.overlay h1 {
  margin: 0 0 10px;
  color: #fef9c3;
  font-size: clamp(34px, 8vw, 62px);
  line-height: 1.05;
  text-shadow: 0 5px 0 rgba(124,58,237,0.8);
}

.version-label {
  margin: 0 0 18px;
  color: #a7f3d0;
  font-size: 18px;
  font-weight: 900;
}

.overlay p {
  margin: 0 0 28px;
  max-width: 760px;
  color: #ede9fe;
  font-size: clamp(17px, 3vw, 22px);
  font-weight: 800;
  line-height: 1.45;
}

.btn {
  border: 3px solid #a7f3d0;
  background: #34d399;
  color: #064e3b;
  padding: 13px 32px;
  font-size: 24px;
  font-weight: 900;
  border-radius: 999px;
  box-shadow: 0 8px 0 #10b981;
  cursor: pointer;
}

.btn:active {
  transform: translateY(7px);
  box-shadow: 0 1px 0 #10b981;
}

#damage-flash {
  position: absolute;
  inset: 0;
  z-index: 170;
  pointer-events: none;
  opacity: 0;
  background: rgba(251,113,133,0.3);
}

#damage-flash.show {
  animation: flash 0.18s ease-out;
}

@keyframes flash {
  0%, 100% { opacity: 0; }
  45% { opacity: 1; }
}

@media (max-width: 650px) {
  #arena {
    bottom: 140px;
  }

  #danger-line {
    bottom: 140px;
  }

  #piano {
    height: 140px;
    padding: 7px 7px 10px;
  }

  .falling-character {
    width: 82px;
    height: 82px;
    font-size: 46px;
    border-radius: 24px;
  }

  .hit-token {
    min-width: 52px;
    height: 52px;
    font-size: 30px;
  }

  .key-note {
    bottom: 7px;
    font-size: 11px;
  }
}
</style>
</head>

<body>
<div id="game">
  <div id="cloud-layer"></div>

  <div id="hud">
    <div class="hud-box">⭐ <span id="score">0</span></div>
    <div class="hud-box">🎵 <span id="song-name">Twinkle</span> <span id="song-progress">0/0</span></div>
    <div class="hud-box">🔥 Combo <span id="combo">0</span></div>
    <div class="hud-box" id="lives">❤️❤️❤️</div>
  </div>

  <div id="song-panel">按正确部件，像弹钢琴一样把汉字顶在空中 🎹</div>

  <div id="arena"></div>
  <div id="danger-line"></div>
  <div id="piano"></div>
  <div id="damage-flash"></div>

  <div id="start-screen" class="overlay">
    <h1 id="start-title">题库加载中...</h1>
    <div class="version-label" id="version-label">Version v1.3.0</div>
    <p id="start-text">正在连接 Google Sheet [HYPY] 分页</p>
  </div>

  <div id="game-over-screen" class="overlay" style="display:none;">
    <h1>Game Over</h1>
    <div class="version-label">Version v1.3.0</div>
    <p>
      最终得分：<span id="final-score" style="color:#facc15;font-size:36px;">0</span><br>
      你弹到了第 <span id="final-song-progress" style="color:#a7f3d0;">0</span> 个音符。
    </p>
    <button id="restart-btn" class="btn">再来一局 🔄</button>
  </div>
</div>

<script>
const GAME_VERSION = "v1.3.0";

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";

const START_LIVES = 3;
const MAX_CHARACTERS = 4;
const KEY_COUNT = 8;

const PIANO_KEYS = [
  { note: "C4", label: "C", freq: 261.63 },
  { note: "D4", label: "D", freq: 293.66 },
  { note: "E4", label: "E", freq: 329.63 },
  { note: "F4", label: "F", freq: 349.23 },
  { note: "G4", label: "G", freq: 392.00 },
  { note: "A4", label: "A", freq: 440.00 },
  { note: "B4", label: "B", freq: 493.88 },
  { note: "C5", label: "C", freq: 523.25 }
];

const NOTE_TO_KEY_INDEX = {
  C4: 0,
  D4: 1,
  E4: 2,
  F4: 3,
  G4: 4,
  A4: 5,
  B4: 6,
  C5: 7
};

const PRELOADED_SONG = {
  name: "Twinkle",
  notes: [
    "C4","C4","G4","G4","A4","A4","G4",
    "F4","F4","E4","E4","D4","D4","C4",
    "G4","G4","F4","F4","E4","E4","D4",
    "G4","G4","F4","F4","E4","E4","D4",
    "C4","C4","G4","G4","A4","A4","G4",
    "F4","F4","E4","E4","D4","D4","C4"
  ]
};

const distractors = [
  "扌", "亻", "心", "忄", "月", "虫", "门", "广",
  "走", "雨", "艹", "口", "氵", "日", "木", "女",
  "讠", "辶", "土", "火", "宀", "贝", "王", "纟"
];

const arena = document.getElementById("arena");
const piano = document.getElementById("piano");
const startScreen = document.getElementById("start-screen");
const gameOverScreen = document.getElementById("game-over-screen");
const restartBtn = document.getElementById("restart-btn");
const damageFlash = document.getElementById("damage-flash");

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const livesEl = document.getElementById("lives");
const songNameEl = document.getElementById("song-name");
const songProgressEl = document.getElementById("song-progress");
const finalScoreEl = document.getElementById("final-score");
const finalSongProgressEl = document.getElementById("final-song-progress");

let dictionary = [];
let score = 0;
let lives = START_LIVES;
let combo = 0;
let wrongStreak = 0;
let songIndex = 0;

let isPlaying = false;
let characters = [];
let hitTokens = [];
let particles = [];

let keyboardSlots = [];
let animationRef = null;
let spawnTimer = null;
let lastFrameTime = 0;
let idCounter = 1;

let audioCtx = null;
let slowMotionUntil = 0;
let timeScale = 1;

window.addEventListener("load", loadDictionary);
restartBtn.addEventListener("click", startGame);

function loadDictionary() {
  document.getElementById("version-label").textContent = `Version ${GAME_VERSION}`;

  Papa.parse(SHEET_URL + "&t=" + Date.now(), {
    download: true,
    header: true,
    skipEmptyLines: "greedy",
    transformHeader: h => normalizeHeader(h),
    complete: results => {
      dictionary = [];

      results.data.forEach(row => {
        const word =
          cleanCell(row["QUESTION"]) ||
          cleanCell(row["ANSWER"]) ||
          cleanCell(row["CORRECT ANSWER"]);

        const partsStr =
          cleanCell(row["PARTS"]) ||
          cleanCell(row["部件"]);

        if (!word || !partsStr) return;

        const parts = partsStr
          .split(/[,，、|/]/)
          .map(p => p.trim())
          .filter(Boolean);

        if (parts.length === 0) return;

        dictionary.push({ word, parts });
      });

      if (dictionary.length > 0) {
        showReadyScreen();
      } else {
        showLoadError("没有找到有效题目。请检查 Question / Parts 列。");
      }
    },
    error: err => {
      console.error(err);
      showLoadError("Google Sheet 加载失败，请检查网络或表格权限。");
    }
  });
}

function normalizeHeader(h) {
  return String(h || "")
    .replace(/^\uFEFF/, "")
    .trim()
    .toUpperCase();
}

function cleanCell(value) {
  return String(value || "").trim();
}

function showReadyScreen() {
  document.getElementById("start-title").textContent = "汉字连击 · 钢琴杂耍版";
  document.getElementById("start-text").innerHTML =
    `已加载 <b>${dictionary.length}</b> 个汉字。<br><br>` +
    `汉字从天空落下。<br>` +
    `底部钢琴键显示部件。<br>` +
    `每个汉字出现时，它的部件会尽量全部显示在键盘上。<br>` +
    `按对部件后，汉字会像杂耍球一样在空中弹起旋转。<br><br>` +
    `预载歌曲：<b>Twinkle Twinkle Little Star</b>。`;

  const oldBtn = document.getElementById("start-btn");
  if (oldBtn) oldBtn.remove();

  const btn = document.createElement("button");
  btn.id = "start-btn";
  btn.className = "btn";
  btn.textContent = "开始弹奏 🚀";
  btn.addEventListener("click", startGame);
  startScreen.appendChild(btn);
}

function showLoadError(message) {
  document.getElementById("start-title").textContent = "数据加载失败";
  document.getElementById("start-text").textContent = message;
}

function startGame() {
  if (!dictionary.length) return;

  ensureAudio();
  clearTimers();
  clearScene();

  score = 0;
  lives = START_LIVES;
  combo = 0;
  wrongStreak = 0;
  songIndex = 0;

  isPlaying = true;
  lastFrameTime = performance.now();
  slowMotionUntil = 0;
  timeScale = 1;

  startScreen.style.display = "none";
  gameOverScreen.style.display = "none";

  initKeyboardSlots();
  updateHUD();
  renderPianoKeyboard();

  spawnCharacter();
  setTimeout(() => {
    if (isPlaying) spawnCharacter();
  }, 950);

  scheduleCharacterSpawn();

  animationRef = requestAnimationFrame(gameLoop);
}

function clearTimers() {
  if (spawnTimer) clearTimeout(spawnTimer);
  if (animationRef) cancelAnimationFrame(animationRef);

  spawnTimer = null;
  animationRef = null;
}

function clearScene() {
  characters.forEach(c => c.el.remove());
  hitTokens.forEach(t => t.el.remove());
  particles.forEach(p => p.el.remove());

  characters = [];
  hitTokens = [];
  particles = [];
  keyboardSlots = [];

  arena.innerHTML = "";
  piano.innerHTML = "";
}

function initKeyboardSlots() {
  keyboardSlots = Array.from({ length: KEY_COUNT }, (_, i) => ({
    kind: "distractor",
    char: randomDistractorAvoiding([]),
    noteIndex: i
  }));
}

function scheduleCharacterSpawn() {
  if (!isPlaying) return;

  const delay = getSpawnDelay();

  spawnTimer = setTimeout(() => {
    if (!isPlaying) return;

    if (characters.length < MAX_CHARACTERS) {
      spawnCharacter();
    }

    scheduleCharacterSpawn();
  }, delay);
}

function getSpawnDelay() {
  const base = 2800;
  const difficulty = Math.min(score / 8000, 0.34);
  return Math.max(1650, base * (1 - difficulty) + randomBetween(-350, 450));
}

function spawnCharacter() {
  if (characters.length >= MAX_CHARACTERS) return;

  const data = dictionary[Math.floor(Math.random() * dictionary.length)];
  if (!data || !data.word || !data.parts.length) return;

  const el = document.createElement("div");
  el.className = "falling-character";

  const wordSpan = document.createElement("span");
  wordSpan.textContent = data.word;
  el.appendChild(wordSpan);

  const progress = document.createElement("div");
  progress.className = "progress";

  data.parts.forEach(() => {
    const dot = document.createElement("div");
    dot.className = "dot";
    progress.appendChild(dot);
  });

  el.appendChild(progress);
  arena.appendChild(el);

  const c = {
    id: nextId(),
    el,
    word: data.word,
    parts: [...data.parts],
    hitParts: new Set(),
    x: randomBetween(70, window.innerWidth - 70),
    y: -80,
    vx: randomBetween(-0.25, 0.25),
    vy: randomBetween(0.34, 0.52),
    gravity: 0.0032,
    rotation: randomBetween(-8, 8),
    rotationVelocity: randomBetween(-0.25, 0.25),
    scale: 1,
    completed: false,
    breached: false,
    dead: false,
    juggledUntil: 0
  };

  characters.push(c);
  renderCharacter(c);

  placeAllPartsForCharacter(c);
  refillOpenSlots();
  renderPianoKeyboard();
}

function placeAllPartsForCharacter(c) {
  for (let i = 0; i < c.parts.length; i++) {
    if (isPartAlreadyOnKeyboard(c.id, i)) continue;

    const slotIndex = findFreeKeyboardSlot();
    if (slotIndex === -1) break;

    keyboardSlots[slotIndex] = {
      kind: "part",
      char: c.parts[i],
      ownerId: c.id,
      partIndex: i,
      noteIndex: slotIndex
    };
  }
}

function isPartAlreadyOnKeyboard(ownerId, partIndex) {
  return keyboardSlots.some(slot =>
    slot &&
    slot.kind === "part" &&
    slot.ownerId === ownerId &&
    slot.partIndex === partIndex
  );
}

function findFreeKeyboardSlot() {
  let idx = keyboardSlots.findIndex(slot => !slot || slot.kind === "empty");
  if (idx !== -1) return idx;

  idx = keyboardSlots.findIndex(slot => slot.kind === "distractor");
  if (idx !== -1) return idx;

  return -1;
}

function refillOpenSlots() {
  for (let i = 0; i < KEY_COUNT; i++) {
    if (!keyboardSlots[i] || keyboardSlots[i].kind === "empty") {
      fillSingleSlot(i);
    }
  }
}

function fillSingleSlot(slotIndex) {
  const pending = findPendingPartNotOnKeyboard();

  if (pending) {
    keyboardSlots[slotIndex] = {
      kind: "part",
      char: pending.char,
      ownerId: pending.ownerId,
      partIndex: pending.partIndex,
      noteIndex: slotIndex
    };
    return;
  }

  keyboardSlots[slotIndex] = {
    kind: "distractor",
    char: randomDistractorAvoiding(getVisibleRequiredChars()),
    noteIndex: slotIndex
  };
}

function findPendingPartNotOnKeyboard() {
  for (const c of characters) {
    if (c.completed || c.dead) continue;

    for (let i = 0; i < c.parts.length; i++) {
      if (c.hitParts.has(i)) continue;
      if (isPartAlreadyOnKeyboard(c.id, i)) continue;

      return {
        ownerId: c.id,
        partIndex: i,
        char: c.parts[i]
      };
    }
  }

  return null;
}

function getVisibleRequiredChars() {
  return keyboardSlots
    .filter(slot => slot && slot.kind === "part")
    .map(slot => slot.char);
}

function removeSlotsForCharacter(characterId) {
  for (let i = 0; i < keyboardSlots.length; i++) {
    const slot = keyboardSlots[i];

    if (slot && slot.kind === "part" && slot.ownerId === characterId) {
      keyboardSlots[i] = { kind: "empty", char: "", noteIndex: i };
      fillSingleSlot(i);
    }
  }

  renderPianoKeyboard();
}

function renderCharacter(c) {
  c.el.style.left = `${c.x}px`;
  c.el.style.top = `${c.y}px`;
  c.el.style.transform =
    `translate(-50%, -50%) rotate(${c.rotation}deg) scale(${c.scale})`;

  const dots = c.el.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("done", c.hitParts.has(i));
  });
}

function renderPianoKeyboard() {
  piano.innerHTML = "";

  const currentSongNote = getCurrentSongNote();
  const songKeyIndex = NOTE_TO_KEY_INDEX[currentSongNote] ?? 0;

  keyboardSlots.forEach((slot, index) => {
    const keyInfo = PIANO_KEYS[index];

    const btn = document.createElement("button");
    btn.className = "piano-key";

    if (slot.kind === "part") btn.classList.add("required");
    if (index === songKeyIndex && slot.kind === "part") btn.classList.add("song-next");
    if (slot.kind === "empty") btn.classList.add("empty-key");

    btn.dataset.index = String(index);

    const radicalSpan = document.createElement("div");
    radicalSpan.className = "key-radical";
    radicalSpan.textContent = slot.char || " ";

    const noteSpan = document.createElement("div");
    noteSpan.className = "key-note";
    noteSpan.textContent = keyInfo.label;

    btn.appendChild(radicalSpan);
    btn.appendChild(noteSpan);

    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      handlePianoPress(index, btn);
    });

    piano.appendChild(btn);
  });
}

function getCurrentSongNote() {
  return PRELOADED_SONG.notes[songIndex % PRELOADED_SONG.notes.length];
}

function handlePianoPress(slotIndex, buttonElement) {
  if (!isPlaying) return;

  const slot = keyboardSlots[slotIndex];
  if (!slot) return;

  pressVisual(buttonElement);
  playPianoKey(slotIndex);

  if (slot.kind !== "part") {
    handleWrongPress(buttonElement);
    return;
  }

  const target = characters.find(c =>
    c.id === slot.ownerId &&
    !c.completed &&
    !c.dead &&
    !c.hitParts.has(slot.partIndex)
  );

  if (!target) {
    handleWrongPress(buttonElement);
    return;
  }

  wrongStreak = 0;
  combo++;

  const gain = 100 + combo * 10;
  score += gain;

  const rect = buttonElement.getBoundingClientRect();
  const arenaRect = arena.getBoundingClientRect();

  const startX = rect.left + rect.width / 2 - arenaRect.left;
  const startY = rect.top + rect.height / 2 - arenaRect.top;

  launchHitToken(slot.char, startX, startY, target, slot.partIndex);

  keyboardSlots[slotIndex] = { kind: "empty", char: "", noteIndex: slotIndex };
  fillSingleSlot(slotIndex);
  renderPianoKeyboard();

  showFloatingText(`+${gain}`, startX, startY - 24);
  showCenterMessage(`Combo ${combo}`, "good");
  triggerSlowMotion(150);

  songIndex++;

  updateHUD();
}

function handleWrongPress(buttonElement) {
  wrongStreak++;
  combo = 0;
  score = Math.max(0, score - 20);

  buttonElement.classList.add("wrong");
  setTimeout(() => buttonElement.classList.remove("wrong"), 220);

  showCenterMessage("-20", "bad");
  playBadTone();

  if (wrongStreak >= 4) {
    wrongStreak = 0;
    loseLife();
  }

  updateHUD();
}

function launchHitToken(char, x, y, target, partIndex) {
  const el = document.createElement("div");
  el.className = "hit-token";
  el.textContent = char;

  const token = {
    id: nextId(),
    el,
    char,
    partIndex,
    x,
    y,
    target,
    rotation: 0,
    arrived: false,
    dead: false
  };

  arena.appendChild(el);
  hitTokens.push(token);
  renderHitToken(token);
}

function renderHitToken(t) {
  t.el.style.left = `${t.x}px`;
  t.el.style.top = `${t.y}px`;
  t.el.style.transform = `translate(-50%, -50%) rotate(${t.rotation}deg)`;
}

function gameLoop(now) {
  if (!isPlaying) return;

  const rawDelta = Math.min(32, now - lastFrameTime);
  lastFrameTime = now;

  timeScale = now < slowMotionUntil ? 0.52 : 1;
  const dt = (rawDelta / 16.67) * timeScale;

  updateCharacters(dt, now);
  updateHitTokens(dt);
  updateParticles(dt);
  cleanupDeadObjects();

  animationRef = requestAnimationFrame(gameLoop);
}

function updateCharacters(dt, now) {
  const dangerY = arena.clientHeight - 22;
  const juggleCeiling = Math.max(96, arena.clientHeight * 0.18);
  const juggleFloor = Math.max(170, arena.clientHeight * 0.66);

  characters.forEach(c => {
    if (c.completed || c.dead) return;

    c.x += c.vx * dt;
    c.y += c.vy * dt;

    c.vy += c.gravity * dt;
    c.vx *= Math.pow(0.996, dt);

    c.rotation += c.rotationVelocity * dt;
    c.rotationVelocity *= Math.pow(0.985, dt);

    c.scale += (1 - c.scale) * 0.13 * dt;

    if (c.x < 54) {
      c.x = 54;
      c.vx = Math.abs(c.vx) * 0.7;
    }

    if (c.x > window.innerWidth - 54) {
      c.x = window.innerWidth - 54;
      c.vx = -Math.abs(c.vx) * 0.7;
    }

    if (now < c.juggledUntil) {
      if (c.y < juggleCeiling) {
        c.y = juggleCeiling;
        c.vy = Math.abs(c.vy) * 0.45;
      }

      if (c.y > juggleFloor) {
        c.y = juggleFloor;
        c.vy = -Math.abs(c.vy) * 0.58;
      }
    }

    if (!c.breached && c.y > dangerY) {
      c.breached = true;
      c.dead = true;
      loseLife();
      removeSlotsForCharacter(c.id);
    }

    renderCharacter(c);
  });
}

function updateHitTokens(dt) {
  hitTokens.forEach(t => {
    if (t.dead || !t.target || t.target.completed || t.target.dead) {
      t.dead = true;
      return;
    }

    t.x += (t.target.x - t.x) * 0.25 * dt;
    t.y += (t.target.y - t.y) * 0.25 * dt;
    t.rotation += 18 * dt;

    const d = distance(t.x, t.y, t.target.x, t.target.y);

    if (d < 30 && !t.arrived) {
      t.arrived = true;
      tokenHitsCharacter(t, t.target);
    }

    renderHitToken(t);
  });
}

function tokenHitsCharacter(token, c) {
  token.dead = true;

  c.hitParts.add(token.partIndex);
  c.el.classList.add("hit");
  setTimeout(() => c.el.classList.remove("hit"), 150);

  const now = performance.now();

  c.juggledUntil = now + 1800;

  const centerX = window.innerWidth / 2;
  const pushToCenter = (centerX - c.x) * 0.018;

  c.vy = -7.6 - Math.min(combo * 0.08, 1.6);
  c.vx += clamp(pushToCenter + randomBetween(-0.9, 0.9), -2.4, 2.4);
  c.rotationVelocity += randomBetween(-14, 14);
  c.scale = 1.1;

  const safeTop = Math.max(100, arena.clientHeight * 0.2);
  const safeBottom = Math.max(180, arena.clientHeight * 0.62);

  if (c.y < safeTop) {
    c.y = safeTop;
    c.vy = Math.abs(c.vy) * 0.35;
  }

  if (c.y > safeBottom) {
    c.y = safeBottom;
  }

  score += 50;

  showFloatingText("+50", c.x, c.y - 45);
  particleBurst(c.x, c.y, 16);

  if (c.hitParts.size >= c.parts.length) {
    completeCharacter(c);
  }

  renderCharacter(c);
  updateHUD();
}

function completeCharacter(c) {
  if (c.completed) return;

  c.completed = true;
  score += 300 + combo * 20;

  showCenterMessage("完成！", "good");
  particleBurst(c.x, c.y, 30);
  playCompleteSound();

  removeSlotsForCharacter(c.id);

  c.el.classList.add("complete");

  setTimeout(() => {
    c.el.remove();
    characters = characters.filter(item => item.id !== c.id);

    if (isPlaying && characters.length < MAX_CHARACTERS) {
      spawnCharacter();
    }
  }, 430);
}

function cleanupDeadObjects() {
  characters = characters.filter(c => {
    if (!c.dead) return true;
    c.el.remove();
    return false;
  });

  hitTokens = hitTokens.filter(t => {
    if (!t.dead) return true;
    t.el.remove();
    return false;
  });

  particles = particles.filter(p => {
    if (!p.dead) return true;
    p.el.remove();
    return false;
  });
}

function loseLife() {
  if (!isPlaying) return;

  lives--;
  combo = 0;

  damageFlash.classList.remove("show");
  void damageFlash.offsetWidth;
  damageFlash.classList.add("show");

  playDamageTone();
  updateHUD();

  if (lives <= 0) {
    gameOver();
  }
}

function updateHUD() {
  scoreEl.textContent = score;
  comboEl.textContent = combo;
  livesEl.textContent =
    "❤️".repeat(Math.max(0, lives)) +
    "🖤".repeat(Math.max(0, START_LIVES - lives));

  songNameEl.textContent = PRELOADED_SONG.name;
  songProgressEl.textContent =
    `${songIndex % PRELOADED_SONG.notes.length}/${PRELOADED_SONG.notes.length}`;
}

function gameOver() {
  if (!isPlaying) return;

  isPlaying = false;
  clearTimers();

  finalScoreEl.textContent = score;
  finalSongProgressEl.textContent = songIndex;

  gameOverScreen.style.display = "flex";
}

function particleBurst(x, y, count) {
  const icons = ["✨", "⭐", "💫", "✦"];

  for (let i = 0; i < count; i++) {
    const el = document.createElement("div");
    el.className = "particle";
    el.textContent = icons[Math.floor(Math.random() * icons.length)];

    const p = {
      el,
      x,
      y,
      vx: randomBetween(-5.5, 5.5),
      vy: randomBetween(-7, 3),
      gravity: randomBetween(0.18, 0.34),
      life: randomBetween(24, 42),
      age: 0,
      rotation: randomBetween(0, 360),
      rotationVelocity: randomBetween(-14, 14),
      dead: false
    };

    arena.appendChild(el);
    particles.push(p);
  }
}

function updateParticles(dt) {
  particles.forEach(p => {
    if (p.dead) return;

    p.age += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.rotation += p.rotationVelocity * dt;

    const opacity = Math.max(0, 1 - p.age / p.life);

    p.el.style.left = `${p.x}px`;
    p.el.style.top = `${p.y}px`;
    p.el.style.opacity = opacity;
    p.el.style.transform =
      `translate(-50%, -50%) rotate(${p.rotation}deg) scale(${0.8 + opacity * 0.6})`;

    if (p.age >= p.life) p.dead = true;
  });
}

function showFloatingText(text, x, y) {
  const el = document.createElement("div");
  el.className = "float-text";
  el.textContent = text;
  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
  arena.appendChild(el);
  setTimeout(() => el.remove(), 780);
}

function showCenterMessage(text, type) {
  const el = document.createElement("div");
  el.className = `center-msg ${type || ""}`;
  el.textContent = text;
  arena.appendChild(el);
  setTimeout(() => el.remove(), 780);
}

function triggerSlowMotion(ms) {
  slowMotionUntil = performance.now() + ms;
}

function pressVisual(buttonElement) {
  buttonElement.classList.add("pressed");
  setTimeout(() => buttonElement.classList.remove("pressed"), 110);
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume().catch(() => {});
  }
}

function playPianoKey(keyIndex) {
  ensureAudio();

  const freq = PIANO_KEYS[keyIndex].freq;
  const now = audioCtx.currentTime;

  const harmonics = [
    { ratio: 1, amp: 0.42 },
    { ratio: 2, amp: 0.18 },
    { ratio: 3, amp: 0.08 }
  ];

  harmonics.forEach(h => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(freq * h.ratio, now);

    gain.gain.setValueAtTime(0.001, now);
    gain.gain.linearRampToValueAtTime(h.amp * 0.18, now + 0.018);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.72);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.75);
  });
}

function playBadTone() {
  playSimpleTone(180, 0.18, 0.08, "sawtooth");
}

function playDamageTone() {
  playSimpleTone(110, 0.26, 0.12, "triangle");
}

function playCompleteSound() {
  const notes = [523.25, 659.25, 783.99];
  notes.forEach((freq, i) => {
    setTimeout(() => playSimpleTone(freq, 0.14, 0.08, "sine"), i * 70);
  });
}

function playSimpleTone(freq, duration, volume, wave) {
  ensureAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const now = audioCtx.currentTime;

  osc.type = wave || "sine";
  osc.frequency.setValueAtTime(freq, now);

  gain.gain.setValueAtTime(0.001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.018);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + duration + 0.03);
}

function randomDistractorAvoiding(avoidList) {
  const safe = distractors.filter(d => !avoidList.includes(d));
  const pool = safe.length ? safe : distractors;
  return pool[Math.floor(Math.random() * pool.length)];
}

function nextId() {
  return idCounter++;
}

function randomBetween(min, max) {
  return min + Math.random() * (max - min);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function distance(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

window.addEventListener("resize", () => {
  characters.forEach(c => {
    c.x = Math.max(60, Math.min(window.innerWidth - 60, c.x));
    renderCharacter(c);
  });
});
</script>
