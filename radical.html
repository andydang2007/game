<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PSLE 汉字连击快线 · 3D轨道钢琴版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --purple: #5b21b6;
  --deep-purple: #3b0764;
  --green: #22c55e;
  --pink: #fb7185;
  --yellow: #facc15;
  --glass: rgba(255,255,255,0.72);
  --keyboard-height: 176px;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Microsoft YaHei", "PingFang SC", "Nunito", sans-serif;
  background:
    radial-gradient(circle at 50% 24%, rgba(255,255,255,0.45), transparent 24%),
    linear-gradient(180deg, #7dd3fc 0%, #bfdbfe 42%, #fef3c7 100%);
}

body {
  touch-action: manipulation;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

#cloud-layer {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.32;
  background-image:
    radial-gradient(circle at 14% 18%, rgba(255,255,255,0.95) 0 28px, transparent 29px),
    radial-gradient(circle at 25% 15%, rgba(255,255,255,0.75) 0 42px, transparent 43px),
    radial-gradient(circle at 70% 24%, rgba(255,255,255,0.85) 0 36px, transparent 37px),
    radial-gradient(circle at 83% 21%, rgba(255,255,255,0.72) 0 48px, transparent 49px);
  animation: cloudMove 18s linear infinite;
}

@keyframes cloudMove {
  from { background-position: 0 0; }
  to { background-position: 260px 0; }
}

#hud {
  position: absolute;
  top: 10px;
  left: 12px;
  right: 12px;
  z-index: 80;
  display: flex;
  justify-content: space-between;
  gap: 8px;
  pointer-events: none;
}

.hud-box {
  background: var(--glass);
  backdrop-filter: blur(6px);
  border: 2px solid rgba(255,255,255,0.9);
  border-radius: 18px;
  padding: 8px 12px;
  font-size: clamp(14px, 3vw, 22px);
  font-weight: 900;
  color: var(--purple);
  box-shadow: 0 6px 16px rgba(76,29,149,0.14);
}

#arena {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: var(--keyboard-height);
  z-index: 5;
  overflow: hidden;
  perspective: 850px;
  perspective-origin: 50% 36%;
}

#track-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 8;
  pointer-events: none;
}

.track-line {
  stroke: rgba(91, 33, 182, 0.22);
  stroke-width: 3;
  fill: none;
}

.track-line.required-track {
  stroke: rgba(34, 197, 94, 0.68);
  stroke-width: 5;
  filter: drop-shadow(0 0 8px rgba(34,197,94,0.45));
}

.track-fill {
  fill: rgba(255,255,255,0.08);
  stroke: rgba(255,255,255,0.24);
  stroke-width: 1;
}

#horizon-dot {
  position: absolute;
  z-index: 10;
  width: 14px;
  height: 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.88);
  border: 3px solid rgba(91,33,182,0.36);
  box-shadow: 0 0 18px rgba(255,255,255,0.85);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

#miss-line {
  position: absolute;
  left: 0;
  right: 0;
  bottom: var(--keyboard-height);
  height: 6px;
  z-index: 60;
  background: rgba(251,113,133,0.9);
  box-shadow: 0 -4px 16px rgba(251,113,133,0.5);
  pointer-events: none;
}

#miss-label {
  position: absolute;
  left: 50%;
  bottom: calc(var(--keyboard-height) + 9px);
  transform: translateX(-50%);
  z-index: 61;
  background: rgba(251,113,133,0.92);
  color: white;
  font-size: 13px;
  font-weight: 900;
  padding: 4px 12px;
  border-radius: 999px;
  pointer-events: none;
}

#guide-panel {
  position: absolute;
  left: 50%;
  top: 62px;
  transform: translateX(-50%);
  z-index: 70;
  background: rgba(255,255,255,0.68);
  border: 2px solid rgba(255,255,255,0.92);
  border-radius: 999px;
  padding: 7px 16px;
  color: #4c1d95;
  font-weight: 900;
  font-size: clamp(13px, 2.5vw, 18px);
  pointer-events: none;
  box-shadow: 0 6px 16px rgba(76,29,149,0.12);
}

.depth-character {
  position: absolute;
  z-index: 30;
  min-width: 86px;
  min-height: 86px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  box-shadow: none;
  color: #4c1d95;
  font-weight: 900;
  line-height: 1;
  text-shadow:
    0 4px 0 rgba(255,255,255,0.88),
    0 10px 20px rgba(76,29,149,0.36);
  transform-style: preserve-3d;
  will-change: left, top, transform, opacity, filter;
}

.depth-character.hit {
  filter: brightness(1.22) drop-shadow(0 0 16px rgba(34,197,94,0.8));
}

.depth-character.complete {
  animation: completePop 0.42s ease-out forwards;
}

@keyframes completePop {
  0% { opacity: 1; }
  55% { opacity: 1; filter: brightness(1.5) drop-shadow(0 0 20px rgba(250,204,21,0.9)); }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) rotateX(420deg) rotateY(360deg) rotateZ(35deg) scale(2.2);
  }
}

.progress {
  position: absolute;
  bottom: -24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
}

.dot {
  width: 11px;
  height: 11px;
  border-radius: 99px;
  background: rgba(255,255,255,0.82);
  border: 2px solid rgba(124,58,237,0.7);
}

.dot.done {
  background: var(--green);
  border-color: #16a34a;
}

#piano-wrap {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--keyboard-height);
  z-index: 100;
  background:
    linear-gradient(180deg, rgba(15,23,42,0.22), rgba(15,23,42,0) 20%),
    linear-gradient(180deg, rgba(255,255,255,0.88), rgba(226,232,240,0.96));
  border-top: 4px solid rgba(255,255,255,0.95);
  box-shadow: 0 -8px 24px rgba(76,29,149,0.18);
  padding: 12px 12px 14px;
}

#piano {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 1100px;
  margin: 0 auto;
}

.white-key {
  position: absolute;
  bottom: 0;
  height: 100%;
  border: 2px solid #cbd5e1;
  border-bottom: 9px solid #94a3b8;
  border-radius: 0 0 18px 18px;
  background:
    linear-gradient(180deg, #ffffff 0%, #f8fafc 70%, #e2e8f0 100%);
  color: #4c1d95;
  cursor: pointer;
  overflow: hidden;
  box-shadow:
    inset 0 -12px 18px rgba(15,23,42,0.06),
    0 2px 2px rgba(15,23,42,0.08);
  transition: transform 0.07s, border-bottom-width 0.07s, filter 0.07s;
}

.white-key.required {
  border-color: #a78bfa;
}

.white-key.required::after {
  content: "";
  position: absolute;
  inset: 5px;
  border-radius: 0 0 14px 14px;
  border: 3px solid rgba(34,197,94,0.24);
  pointer-events: none;
}

.white-key.pressed {
  transform: translateY(6px);
  border-bottom-width: 2px;
  filter: brightness(0.96);
}

.white-key.wrong {
  background: #ffe4e6;
  border-color: #fb7185;
  animation: wrongShake 0.2s linear;
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-7px); }
  75% { transform: translateX(7px); }
}

.black-key {
  position: absolute;
  top: 0;
  height: 60%;
  width: 7.5%;
  border: 2px solid #020617;
  border-bottom: 7px solid #020617;
  border-radius: 0 0 12px 12px;
  background:
    linear-gradient(180deg, #334155 0%, #0f172a 70%, #020617 100%);
  color: #f8fafc;
  z-index: 5;
  cursor: pointer;
  box-shadow:
    0 6px 10px rgba(15,23,42,0.35),
    inset 0 -8px 12px rgba(0,0,0,0.38);
  transition: transform 0.07s, border-bottom-width 0.07s, filter 0.07s;
}

.black-key.pressed {
  transform: translateY(5px);
  border-bottom-width: 2px;
  filter: brightness(1.2);
}

.key-radical {
  position: absolute;
  left: 50%;
  top: 45%;
  transform: translate(-50%, -50%);
  font-size: clamp(28px, 5.2vw, 44px);
  font-weight: 900;
  z-index: 3;
}

.key-note {
  position: absolute;
  left: 50%;
  bottom: 10px;
  transform: translateX(-50%);
  font-size: 13px;
  font-weight: 900;
  color: #64748b;
  z-index: 3;
}

.black-key .key-note {
  color: #cbd5e1;
  bottom: 8px;
  font-size: 11px;
}

.hit-token {
  position: absolute;
  z-index: 90;
  min-width: 56px;
  height: 56px;
  padding: 0 10px;
  border-radius: 18px;
  background: rgba(255,255,255,0.95);
  border: 3px solid #4ade80;
  color: #5b21b6;
  font-size: 32px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 22px rgba(34,197,94,0.65),
    0 8px 20px rgba(76,29,149,0.22);
  pointer-events: none;
  transform-style: preserve-3d;
}

.particle {
  position: absolute;
  z-index: 120;
  pointer-events: none;
  font-size: 18px;
  font-weight: 900;
}

.float-text {
  position: absolute;
  z-index: 130;
  pointer-events: none;
  font-size: 28px;
  font-weight: 900;
  color: #fef9c3;
  text-shadow: 0 4px 10px rgba(76,29,149,0.55);
  animation: floatUp 0.75s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 0; transform: translate(-50%, 0) scale(0.85); }
  20% { opacity: 1; transform: translate(-50%, -8px) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -48px) scale(1.05); }
}

.center-msg {
  position: absolute;
  z-index: 140;
  left: 50%;
  top: 42%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  font-size: clamp(30px, 7vw, 60px);
  font-weight: 900;
  color: #fef9c3;
  text-shadow: 0 5px 14px rgba(76,29,149,0.55);
  animation: centerPulse 0.75s ease-out forwards;
}

.center-msg.good {
  color: #22c55e;
}

.center-msg.bad {
  color: #fb7185;
}

@keyframes centerPulse {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.75); }
  25% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -65%) scale(1.05); }
}

.overlay {
  position: absolute;
  inset: 0;
  z-index: 300;
  background: rgba(76,29,149,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

.overlay h1 {
  margin: 0 0 10px;
  color: #fef9c3;
  font-size: clamp(34px, 8vw, 62px);
  line-height: 1.05;
  text-shadow: 0 5px 0 rgba(124,58,237,0.8);
}

.version-label {
  margin: 0 0 18px;
  color: #a7f3d0;
  font-size: 18px;
  font-weight: 900;
}

.overlay p {
  margin: 0 0 28px;
  max-width: 820px;
  color: #ede9fe;
  font-size: clamp(17px, 3vw, 22px);
  font-weight: 800;
  line-height: 1.45;
}

.btn {
  border: 3px solid #a7f3d0;
  background: #34d399;
  color: #064e3b;
  padding: 13px 32px;
  font-size: 24px;
  font-weight: 900;
  border-radius: 999px;
  box-shadow: 0 8px 0 #10b981;
  cursor: pointer;
}

.btn:active {
  transform: translateY(7px);
  box-shadow: 0 1px 0 #10b981;
}

@media (max-width: 700px) {
  :root {
    --keyboard-height: 156px;
  }

  #piano-wrap {
    padding: 8px 8px 10px;
  }

  .depth-character {
    font-size: clamp(54px, 15vw, 92px);
  }

  .hit-token {
    min-width: 50px;
    height: 50px;
    font-size: 28px;
  }

  .key-note {
    bottom: 7px;
    font-size: 11px;
  }

  .black-key .key-note {
    font-size: 9px;
  }
}
</style>
</head>

<body>
<div id="game">
  <div id="cloud-layer"></div>

  <div id="hud">
    <div class="hud-box">⭐ <span id="score">0</span></div>
    <div class="hud-box">🔥 Combo <span id="combo">0</span></div>
    <div class="hud-box">🎹 Free Play</div>
    <div class="hud-box">🧪 Testing Mode</div>
  </div>

  <div id="guide-panel">汉字从轨道深处靠近。按正确部件，把它推回去！</div>

  <div id="arena">
    <svg id="track-svg"></svg>
    <div id="horizon-dot"></div>
  </div>

  <div id="miss-line"></div>
  <div id="miss-label">MISS LINE</div>

  <div id="piano-wrap">
    <div id="piano"></div>
  </div>

  <div id="start-screen" class="overlay">
    <h1 id="start-title">题库加载中...</h1>
    <div class="version-label" id="version-label">Version v1.5.0</div>
    <p id="start-text">正在连接 Google Sheet [HYPY] 分页</p>
  </div>
</div>

<script>
const GAME_VERSION = "v1.5.0";

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";

const KEY_COUNT = 8;
const MAX_ACTIVE_CHARACTERS = 1;

const WHITE_KEYS = [
  { note: "C4", label: "C", freq: 261.63 },
  { note: "D4", label: "D", freq: 293.66 },
  { note: "E4", label: "E", freq: 329.63 },
  { note: "F4", label: "F", freq: 349.23 },
  { note: "G4", label: "G", freq: 392.00 },
  { note: "A4", label: "A", freq: 440.00 },
  { note: "B4", label: "B", freq: 493.88 },
  { note: "C5", label: "C", freq: 523.25 }
];

const BLACK_KEYS = [
  { afterWhite: 0, note: "C#4", label: "C#", freq: 277.18 },
  { afterWhite: 1, note: "D#4", label: "D#", freq: 311.13 },
  { afterWhite: 3, note: "F#4", label: "F#", freq: 369.99 },
  { afterWhite: 4, note: "G#4", label: "G#", freq: 415.30 },
  { afterWhite: 5, note: "A#4", label: "A#", freq: 466.16 }
];

const distractors = [
  "扌", "亻", "心", "忄", "月", "虫", "门", "广",
  "走", "雨", "艹", "口", "氵", "日", "木", "女",
  "讠", "辶", "土", "火", "宀", "贝", "王", "纟",
  "石", "禾", "目", "竹", "页", "刂"
];

const arena = document.getElementById("arena");
const trackSvg = document.getElementById("track-svg");
const horizonDot = document.getElementById("horizon-dot");
const piano = document.getElementById("piano");
const startScreen = document.getElementById("start-screen");

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");

let dictionary = [];
let score = 0;
let combo = 0;
let wrongStreak = 0;

let isPlaying = false;
let character = null;
let hitTokens = [];
let particles = [];

let keyboardSlots = [];
let keyCenters = [];
let trackGeometry = [];

let animationRef = null;
let spawnTimer = null;
let lastFrameTime = 0;
let idCounter = 1;

let audioCtx = null;
let slowMotionUntil = 0;
let timeScale = 1;

window.addEventListener("load", loadDictionary);
window.addEventListener("resize", handleResize);

function loadDictionary() {
  document.getElementById("version-label").textContent = `Version ${GAME_VERSION}`;

  Papa.parse(SHEET_URL + "&t=" + Date.now(), {
    download: true,
    header: true,
    skipEmptyLines: "greedy",
    transformHeader: h => normalizeHeader(h),
    complete: results => {
      dictionary = [];

      results.data.forEach(row => {
        const word =
          cleanCell(row["QUESTION"]) ||
          cleanCell(row["ANSWER"]) ||
          cleanCell(row["CORRECT ANSWER"]);

        const partsStr =
          cleanCell(row["PARTS"]) ||
          cleanCell(row["部件"]);

        if (!word || !partsStr) return;

        const parts = partsStr
          .split(/[,，、|/]/)
          .map(p => p.trim())
          .filter(Boolean);

        if (parts.length === 0) return;

        dictionary.push({ word, parts });
      });

      if (dictionary.length > 0) {
        showReadyScreen();
      } else {
        showLoadError("没有找到有效题目。请检查 Question / Parts 列。");
      }
    },
    error: err => {
      console.error(err);
      showLoadError("Google Sheet 加载失败，请检查网络或表格权限。");
    }
  });
}

function normalizeHeader(h) {
  return String(h || "")
    .replace(/^\uFEFF/, "")
    .trim()
    .toUpperCase();
}

function cleanCell(value) {
  return String(value || "").trim();
}

function showReadyScreen() {
  document.getElementById("start-title").textContent = "汉字连击 · 3D轨道钢琴版";
  document.getElementById("start-text").innerHTML =
    `已加载 <b>${dictionary.length}</b> 个汉字。<br><br>` +
    `Free Play Mode：已移除歌曲系统。<br>` +
    `汉字会从轨道深处向玩家靠近。<br>` +
    `每个钢琴白键对应一条轨道和一个部件。<br>` +
    `按正确部件，部件会沿轨道飞出并把汉字推回深处。<br><br>` +
    `测试模式：没有生命、没有 Game Over。`;

  const oldBtn = document.getElementById("start-btn");
  if (oldBtn) oldBtn.remove();

  const btn = document.createElement("button");
  btn.id = "start-btn";
  btn.className = "btn";
  btn.textContent = "开始测试 🚀";
  btn.addEventListener("click", startGame);
  startScreen.appendChild(btn);
}

function showLoadError(message) {
  document.getElementById("start-title").textContent = "数据加载失败";
  document.getElementById("start-text").textContent = message;
}

function startGame() {
  if (!dictionary.length) return;

  ensureAudio();
  clearTimers();
  clearScene();

  score = 0;
  combo = 0;
  wrongStreak = 0;

  isPlaying = true;
  lastFrameTime = performance.now();
  slowMotionUntil = 0;
  timeScale = 1;

  startScreen.style.display = "none";

  initKeyboardSlots();
  renderPiano();
  calculateKeyCenters();
  renderTracks();

  updateHUD();
  spawnCharacter();

  animationRef = requestAnimationFrame(gameLoop);
}

function clearTimers() {
  if (spawnTimer) clearTimeout(spawnTimer);
  if (animationRef) cancelAnimationFrame(animationRef);

  spawnTimer = null;
  animationRef = null;
}

function clearScene() {
  if (character && character.el) character.el.remove();

  hitTokens.forEach(t => t.el.remove());
  particles.forEach(p => p.el.remove());

  character = null;
  hitTokens = [];
  particles = [];
  keyboardSlots = [];
  keyCenters = [];
  trackGeometry = [];

  piano.innerHTML = "";
  trackSvg.innerHTML = "";
}

function initKeyboardSlots() {
  keyboardSlots = Array.from({ length: KEY_COUNT }, (_, i) => ({
    kind: "distractor",
    char: randomDistractorAvoiding([]),
    noteIndex: i
  }));
}

function spawnCharacter() {
  if (!isPlaying) return;
  if (character) return;

  const data = dictionary[Math.floor(Math.random() * dictionary.length)];
  if (!data || !data.word || !data.parts.length) {
    scheduleNextCharacter(800);
    return;
  }

  const el = document.createElement("div");
  el.className = "depth-character";

  const wordSpan = document.createElement("span");
  wordSpan.textContent = data.word;
  el.appendChild(wordSpan);

  const progress = document.createElement("div");
  progress.className = "progress";

  data.parts.forEach(() => {
    const dot = document.createElement("div");
    dot.className = "dot";
    progress.appendChild(dot);
  });

  el.appendChild(progress);
  arena.appendChild(el);

  character = {
    id: nextId(),
    el,
    word: data.word,
    parts: [...data.parts],
    hitParts: new Set(),

    laneIndex: Math.floor(Math.random() * KEY_COUNT),

    z: 0.96,
    zVelocity: -0.0024,

    laneOffset: randomBetween(-0.08, 0.08),
    sideWobble: randomBetween(0, Math.PI * 2),

    rotX: randomBetween(-18, 18),
    rotY: randomBetween(-18, 18),
    rotZ: randomBetween(-6, 6),
    rotVX: randomBetween(-0.08, 0.08),
    rotVY: randomBetween(-0.08, 0.08),
    rotVZ: randomBetween(-0.06, 0.06),

    scaleKick: 0,
    completed: false,
    dead: false,
    pushedBackUntil: 0
  };

  placePartsForCurrentCharacter();
  renderPiano();
  renderTracks();
  renderCharacter();
}

function scheduleNextCharacter(delay) {
  if (!isPlaying) return;
  clearTimeout(spawnTimer);

  spawnTimer = setTimeout(() => {
    if (!isPlaying) return;
    if (!character) spawnCharacter();
  }, delay);
}

function placePartsForCurrentCharacter() {
  if (!character) return;

  initKeyboardSlots();

  const parts = character.parts.slice(0, KEY_COUNT);
  const indices = Array.from({ length: KEY_COUNT }, (_, i) => i);
  shuffle(indices);

  for (let i = 0; i < parts.length; i++) {
    const slotIndex = indices[i];
    keyboardSlots[slotIndex] = {
      kind: "part",
      char: parts[i],
      partIndex: i,
      noteIndex: slotIndex
    };
  }

  for (let i = 0; i < KEY_COUNT; i++) {
    if (!keyboardSlots[i] || keyboardSlots[i].kind !== "part") {
      keyboardSlots[i] = {
        kind: "distractor",
        char: randomDistractorAvoiding(parts),
        noteIndex: i
      };
    }
  }
}

function refillUsedSlot(slotIndex) {
  const pending = findPendingPartNotOnKeyboard();

  if (pending) {
    keyboardSlots[slotIndex] = {
      kind: "part",
      char: pending.char,
      partIndex: pending.partIndex,
      noteIndex: slotIndex
    };
  } else {
    keyboardSlots[slotIndex] = {
      kind: "distractor",
      char: randomDistractorAvoiding(getRequiredCharsOnKeyboard()),
      noteIndex: slotIndex
    };
  }
}

function findPendingPartNotOnKeyboard() {
  if (!character || character.completed || character.dead) return null;

  for (let i = 0; i < character.parts.length; i++) {
    if (character.hitParts.has(i)) continue;

    const alreadyVisible = keyboardSlots.some(slot =>
      slot &&
      slot.kind === "part" &&
      slot.partIndex === i
    );

    if (!alreadyVisible) {
      return {
        partIndex: i,
        char: character.parts[i]
      };
    }
  }

  return null;
}

function getRequiredCharsOnKeyboard() {
  return keyboardSlots
    .filter(slot => slot && slot.kind === "part")
    .map(slot => slot.char);
}

function renderPiano() {
  piano.innerHTML = "";

  const whiteWidth = 100 / KEY_COUNT;

  keyboardSlots.forEach((slot, index) => {
    const keyInfo = WHITE_KEYS[index];

    const btn = document.createElement("button");
    btn.className = "white-key";

    if (slot.kind === "part") btn.classList.add("required");

    btn.style.left = `${index * whiteWidth}%`;
    btn.style.width = `${whiteWidth}%`;

    btn.dataset.index = String(index);

    const radicalSpan = document.createElement("div");
    radicalSpan.className = "key-radical";
    radicalSpan.textContent = slot.char || "";

    const noteSpan = document.createElement("div");
    noteSpan.className = "key-note";
    noteSpan.textContent = keyInfo.label;

    btn.appendChild(radicalSpan);
    btn.appendChild(noteSpan);

    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      handleWhiteKeyPress(index, btn);
    });

    piano.appendChild(btn);
  });

  BLACK_KEYS.forEach((black, blackIndex) => {
    const btn = document.createElement("button");
    btn.className = "black-key";

    const leftPercent = ((black.afterWhite + 1) * whiteWidth) - 3.75;
    btn.style.left = `${leftPercent}%`;

    const noteSpan = document.createElement("div");
    noteSpan.className = "key-note";
    noteSpan.textContent = black.label;
    btn.appendChild(noteSpan);

    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      pressVisual(btn);
      playTonePiano(black.freq, 0.55);
    });

    piano.appendChild(btn);
  });

  requestAnimationFrame(() => {
    calculateKeyCenters();
    renderTracks();
  });
}

function calculateKeyCenters() {
  keyCenters = [];

  const pianoRect = piano.getBoundingClientRect();
  const arenaRect = arena.getBoundingClientRect();
  const whiteKeys = piano.querySelectorAll(".white-key");

  whiteKeys.forEach(key => {
    const rect = key.getBoundingClientRect();

    keyCenters.push({
      x: rect.left + rect.width / 2 - arenaRect.left,
      y: arenaRect.height + 2,
      screenX: rect.left + rect.width / 2,
      screenY: rect.top + rect.height * 0.18
    });
  });
}

function getHorizon() {
  return {
    x: arena.clientWidth / 2,
    y: Math.max(110, arena.clientHeight * 0.22)
  };
}

function renderTracks() {
  if (!keyCenters.length) return;

  const horizon = getHorizon();

  horizonDot.style.left = `${horizon.x}px`;
  horizonDot.style.top = `${horizon.y}px`;

  trackSvg.innerHTML = "";
  trackSvg.setAttribute("viewBox", `0 0 ${arena.clientWidth} ${arena.clientHeight}`);

  trackGeometry = [];

  const requiredLanes = new Set(
    keyboardSlots
      .map((slot, i) => slot && slot.kind === "part" ? i : null)
      .filter(i => i !== null)
  );

  for (let i = 0; i < KEY_COUNT; i++) {
    const base = keyCenters[i];
    const nextBase = keyCenters[Math.min(KEY_COUNT - 1, i + 1)];
    const prevBase = keyCenters[Math.max(0, i - 1)];

    const laneWidthNear = Math.min(90, arena.clientWidth / KEY_COUNT * 0.78);
    const nearLeft = base.x - laneWidthNear / 2;
    const nearRight = base.x + laneWidthNear / 2;

    const farSpread = 14;
    const farLeft = horizon.x - farSpread + (i - (KEY_COUNT - 1) / 2) * 3;
    const farRight = horizon.x + farSpread + (i - (KEY_COUNT - 1) / 2) * 3;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute(
      "d",
      `M ${nearLeft} ${arena.clientHeight} L ${farLeft} ${horizon.y} L ${farRight} ${horizon.y} L ${nearRight} ${arena.clientHeight} Z`
    );
    path.setAttribute("class", "track-fill");
    trackSvg.appendChild(path);

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", base.x);
    line.setAttribute("y1", arena.clientHeight);
    line.setAttribute("x2", horizon.x + (i - (KEY_COUNT - 1) / 2) * 4);
    line.setAttribute("y2", horizon.y);

    line.setAttribute("class", requiredLanes.has(i) ? "track-line required-track" : "track-line");
    trackSvg.appendChild(line);

    trackGeometry[i] = {
      nearX: base.x,
      nearY: arena.clientHeight,
      farX: horizon.x + (i - (KEY_COUNT - 1) / 2) * 4,
      farY: horizon.y
    };
  }
}

function getPointOnLane(laneIndex, z, offset = 0) {
  const lane = trackGeometry[laneIndex] || trackGeometry[0];
  if (!lane) {
    return { x: arena.clientWidth / 2, y: arena.clientHeight / 2 };
  }

  const t = 1 - z;

  const x = lane.farX + (lane.nearX - lane.farX) * t;
  const y = lane.farY + (lane.nearY - lane.farY) * t;

  const laneWidth = 18 + t * 70;
  return {
    x: x + offset * laneWidth,
    y
  };
}

function renderCharacter() {
  if (!character || character.dead) return;

  const wobble = Math.sin(character.sideWobble) * 0.04;
  const point = getPointOnLane(character.laneIndex, character.z, character.laneOffset + wobble);

  const closeness = 1 - character.z;
  const scale = 0.32 + closeness * 1.55 + character.scaleKick;
  const opacity = 0.35 + closeness * 0.65;
  const fontSize = 72 + closeness * 52;

  character.el.style.left = `${point.x}px`;
  character.el.style.top = `${point.y}px`;
  character.el.style.opacity = opacity;
  character.el.style.fontSize = `${fontSize}px`;
  character.el.style.zIndex = String(30 + Math.floor(closeness * 45));

  character.el.style.transform =
    `translate(-50%, -50%) ` +
    `rotateX(${character.rotX}deg) ` +
    `rotateY(${character.rotY}deg) ` +
    `rotateZ(${character.rotZ}deg) ` +
    `scale(${scale})`;

  const dots = character.el.querySelectorAll(".dot");
  dots.forEach((dot, i) => {
    dot.classList.toggle("done", character.hitParts.has(i));
  });
}

function handleWhiteKeyPress(slotIndex, buttonElement) {
  if (!isPlaying) return;

  const slot = keyboardSlots[slotIndex];
  if (!slot) return;

  pressVisual(buttonElement);
  playPianoKey(slotIndex);

  if (!character || character.dead || character.completed || slot.kind !== "part") {
    handleWrongPress(buttonElement);
    return;
  }

  if (character.hitParts.has(slot.partIndex)) {
    handleWrongPress(buttonElement);
    return;
  }

  combo++;
  wrongStreak = 0;

  const gain = 100 + combo * 10;
  score += gain;

  const arenaRect = arena.getBoundingClientRect();
  const keyRect = buttonElement.getBoundingClientRect();

  const startX = keyRect.left + keyRect.width / 2 - arenaRect.left;
  const startY = arena.clientHeight + 2;

  launchHitToken(slot.char, startX, startY, character, slot.partIndex, slotIndex);

  keyboardSlots[slotIndex] = {
    kind: "empty",
    char: "",
    noteIndex: slotIndex
  };

  refillUsedSlot(slotIndex);
  renderPiano();

  showFloatingText(`+${gain}`, startX, arena.clientHeight - 20);
  showCenterMessage(`Combo ${combo}`, "good");
  triggerSlowMotion(130);

  updateHUD();
}

function handleWrongPress(buttonElement) {
  combo = 0;
  wrongStreak++;
  score = Math.max(0, score - 20);

  buttonElement.classList.add("wrong");
  setTimeout(() => buttonElement.classList.remove("wrong"), 220);

  showCenterMessage("-20", "bad");
  playBadTone();

  updateHUD();
}

function launchHitToken(char, x, y, target, partIndex, laneIndex) {
  const el = document.createElement("div");
  el.className = "hit-token";
  el.textContent = char;

  const token = {
    id: nextId(),
    el,
    char,
    partIndex,
    laneIndex,
    target,
    z: 0.02,
    x,
    y,
    rotation: 0,
    arrived: false,
    dead: false
  };

  arena.appendChild(el);
  hitTokens.push(token);
  renderHitToken(token);
}

function renderHitToken(t) {
  t.el.style.left = `${t.x}px`;
  t.el.style.top = `${t.y}px`;

  const scale = 1.05 - t.z * 0.45;

  t.el.style.transform =
    `translate(-50%, -50%) rotate(${t.rotation}deg) scale(${scale})`;
}

function gameLoop(now) {
  if (!isPlaying) return;

  const rawDelta = Math.min(32, now - lastFrameTime);
  lastFrameTime = now;

  timeScale = now < slowMotionUntil ? 0.55 : 1;
  const dt = (rawDelta / 16.67) * timeScale;

  updateCharacter(dt, now);
  updateHitTokens(dt);
  updateParticles(dt);
  cleanupDeadObjects();

  animationRef = requestAnimationFrame(gameLoop);
}

function updateCharacter(dt, now) {
  if (!character || character.dead || character.completed) return;

  character.z += character.zVelocity * dt;

  character.sideWobble += 0.018 * dt;

  character.rotX += character.rotVX * dt;
  character.rotY += character.rotVY * dt;
  character.rotZ += character.rotVZ * dt;

  character.rotVX *= Math.pow(0.993, dt);
  character.rotVY *= Math.pow(0.993, dt);
  character.rotVZ *= Math.pow(0.993, dt);

  character.scaleKick *= Math.pow(0.88, dt);

  if (character.z > 0.98) {
    character.z = 0.98;
    character.zVelocity = -Math.abs(character.zVelocity);
  }

  if (character.z <= 0.02) {
    missCharacter();
    return;
  }

  renderCharacter();
}

function missCharacter() {
  if (!character || character.dead) return;

  showCenterMessage("Miss", "bad");
  combo = 0;
  updateHUD();

  character.dead = true;
  character.el.style.transition = "opacity 0.25s, transform 0.25s";
  character.el.style.opacity = "0";

  clearKeyboardParts();

  setTimeout(() => {
    if (character && character.el) character.el.remove();
    character = null;
    renderPiano();
    renderTracks();
    scheduleNextCharacter(500);
  }, 260);
}

function clearKeyboardParts() {
  for (let i = 0; i < KEY_COUNT; i++) {
    keyboardSlots[i] = {
      kind: "distractor",
      char: randomDistractorAvoiding([]),
      noteIndex: i
    };
  }
}

function updateHitTokens(dt) {
  hitTokens.forEach(t => {
    if (t.dead || !t.target || t.target.dead || t.target.completed) {
      t.dead = true;
      return;
    }

    t.z += 0.045 * dt;

    if (t.z > t.target.z) {
      t.z = t.target.z;
    }

    const targetPoint = getPointOnLane(t.target.laneIndex, t.target.z, t.target.laneOffset);
    const lanePoint = getPointOnLane(t.laneIndex, t.z, 0);

    const blend = Math.min(1, t.z / Math.max(0.001, t.target.z));
    t.x = lanePoint.x + (targetPoint.x - lanePoint.x) * blend;
    t.y = lanePoint.y + (targetPoint.y - lanePoint.y) * blend;

    t.rotation += 18 * dt;

    const d = distance(t.x, t.y, targetPoint.x, targetPoint.y);

    if ((d < 34 || t.z >= t.target.z - 0.01) && !t.arrived) {
      t.arrived = true;
      tokenHitsCharacter(t, t.target);
    }

    renderHitToken(t);
  });
}

function tokenHitsCharacter(token, c) {
  token.dead = true;

  c.hitParts.add(token.partIndex);
  c.el.classList.add("hit");
  setTimeout(() => {
    if (c.el) c.el.classList.remove("hit");
  }, 150);

  c.z = Math.min(0.96, c.z + 0.18);
  c.zVelocity = -0.0021;

  const centerLane = (KEY_COUNT - 1) / 2;
  const lanePush = (centerLane - c.laneIndex) * 0.002;

  c.laneOffset += randomBetween(-0.05, 0.05) + lanePush;
  c.laneOffset = clamp(c.laneOffset, -0.35, 0.35);

  c.rotVX += randomBetween(-8, 8);
  c.rotVY += randomBetween(-12, 12);
  c.rotZ += randomBetween(-6, 6);
  c.scaleKick = 0.18;

  score += 50;

  const point = getPointOnLane(c.laneIndex, c.z, c.laneOffset);
  showFloatingText("+50", point.x, point.y - 50);
  particleBurst(point.x, point.y, 18);
  playBounceTone();

  if (c.hitParts.size >= c.parts.length) {
    completeCharacter(c);
  }

  renderCharacter();
  updateHUD();
}

function completeCharacter(c) {
  if (!c || c.completed) return;

  c.completed = true;

  const bonus = 300 + combo * 20;
  score += bonus;

  const point = getPointOnLane(c.laneIndex, c.z, c.laneOffset);

  showCenterMessage("完成！", "good");
  showFloatingText(`+${bonus}`, point.x, point.y - 70);
  particleBurst(point.x, point.y, 32);
  playCompleteSound();

  clearKeyboardParts();
  renderPiano();
  renderTracks();

  c.el.classList.add("complete");

  setTimeout(() => {
    if (character && character.el) character.el.remove();
    character = null;
    scheduleNextCharacter(650);
  }, 430);

  updateHUD();
}

function cleanupDeadObjects() {
  hitTokens = hitTokens.filter(t => {
    if (!t.dead) return true;
    t.el.remove();
    return false;
  });

  particles = particles.filter(p => {
    if (!p.dead) return true;
    p.el.remove();
    return false;
  });
}

function updateHUD() {
  scoreEl.textContent = score;
  comboEl.textContent = combo;
}

function particleBurst(x, y, count) {
  const icons = ["✨", "⭐", "💫", "✦"];

  for (let i = 0; i < count; i++) {
    const el = document.createElement("div");
    el.className = "particle";
    el.textContent = icons[Math.floor(Math.random() * icons.length)];

    const p = {
      el,
      x,
      y,
      vx: randomBetween(-5.5, 5.5),
      vy: randomBetween(-7, 3),
      gravity: randomBetween(0.18, 0.34),
      life: randomBetween(24, 42),
      age: 0,
      rotation: randomBetween(0, 360),
      rotationVelocity: randomBetween(-14, 14),
      dead: false
    };

    arena.appendChild(el);
    particles.push(p);
  }
}

function updateParticles(dt) {
  particles.forEach(p => {
    if (p.dead) return;

    p.age += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.rotation += p.rotationVelocity * dt;

    const opacity = Math.max(0, 1 - p.age / p.life);

    p.el.style.left = `${p.x}px`;
    p.el.style.top = `${p.y}px`;
    p.el.style.opacity = opacity;
    p.el.style.transform =
      `translate(-50%, -50%) rotate(${p.rotation}deg) scale(${0.8 + opacity * 0.6})`;

    if (p.age >= p.life) p.dead = true;
  });
}

function showFloatingText(text, x, y) {
  const el = document.createElement("div");
  el.className = "float-text";
  el.textContent = text;
  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
  arena.appendChild(el);
  setTimeout(() => el.remove(), 780);
}

function showCenterMessage(text, type) {
  const el = document.createElement("div");
  el.className = `center-msg ${type || ""}`;
  el.textContent = text;
  arena.appendChild(el);
  setTimeout(() => el.remove(), 780);
}

function triggerSlowMotion(ms) {
  slowMotionUntil = performance.now() + ms;
}

function pressVisual(buttonElement) {
  buttonElement.classList.add("pressed");
  setTimeout(() => buttonElement.classList.remove("pressed"), 120);
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume().catch(() => {});
  }
}

function playPianoKey(keyIndex) {
  ensureAudio();
  playTonePiano(WHITE_KEYS[keyIndex].freq, 0.75);
}

function playTonePiano(freq, duration) {
  ensureAudio();

  const now = audioCtx.currentTime;

  const harmonics = [
    { ratio: 1, amp: 0.42 },
    { ratio: 2, amp: 0.18 },
    { ratio: 3, amp: 0.08 },
    { ratio: 4, amp: 0.035 }
  ];

  harmonics.forEach(h => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(freq * h.ratio, now);

    gain.gain.setValueAtTime(0.001, now);
    gain.gain.linearRampToValueAtTime(h.amp * 0.18, now + 0.018);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + duration + 0.04);
  });
}

function playBadTone() {
  playSimpleTone(180, 0.18, 0.08, "sawtooth");
}

function playBounceTone() {
  playSimpleTone(392, 0.12, 0.08, "triangle");
}

function playCompleteSound() {
  const notes = [523.25, 659.25, 783.99];
  notes.forEach((freq, i) => {
    setTimeout(() => playSimpleTone(freq, 0.14, 0.08, "sine"), i * 70);
  });
}

function playSimpleTone(freq, duration, volume, wave) {
  ensureAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const now = audioCtx.currentTime;

  osc.type = wave || "sine";
  osc.frequency.setValueAtTime(freq, now);

  gain.gain.setValueAtTime(0.001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.018);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + duration + 0.03);
}

function handleResize() {
  if (!isPlaying) return;

  calculateKeyCenters();
  renderTracks();
  renderCharacter();
}

function randomDistractorAvoiding(avoidList) {
  const safe = distractors.filter(d => !avoidList.includes(d));
  const pool = safe.length ? safe : distractors;
  return pool[Math.floor(Math.random() * pool.length)];
}

function nextId() {
  return idCounter++;
}

function randomBetween(min, max) {
  return min + Math.random() * (max - min);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function distance(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
