<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汉字战车连击</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Nunito', "Chalkboard SE", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; height: 100vh; background: #1e293b; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; color: white; }
        
        #game-area { flex: 1; width: 100%; max-width: 600px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); border-bottom: 4px solid #334155; }

        /* 战车怪物主体 */
        .cart-monster { position: absolute; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
        
        /* 怪物提示与血条区 */
        .monster-body { background: #f8fafc; border: 4px solid #cbd5e1; border-radius: 20px; padding: 15px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative; z-index: 2; width: 220px; transition: transform 0.1s; }
        .monster-face { font-size: 40px; margin-bottom: 5px; }
        .hint-text { color: #64748b; font-size: 20px; font-weight: 900; margin-bottom: 10px; }
        
        /* 填空插槽区 */
        .slots-container { display: flex; justify-content: center; gap: 8px; }
        .slot { width: 40px; height: 40px; border: 3px dashed #94a3b8; border-radius: 8px; font-size: 24px; font-weight: 900; color: #0f172a; display: flex; align-items: center; justify-content: center; background: #e2e8f0; }
        .slot.filled { background: #34d399; border-style: solid; border-color: #10b981; color: white; transform: scale(1.1); transition: 0.2s; }

        /* 车轮区域 */
        .wheels-container { display: flex; justify-content: space-evenly; width: 100%; margin-top: -10px; z-index: 1; }
        .wheel { font-size: 35px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        /* 爆胎动画 */
        .wheel.blown { transform: translate(50px, -50px) rotate(360deg) scale(0); opacity: 0; }

        /* 整体爆炸动画 */
        .cart-monster.dead { transform: scale(1.5); opacity: 0; transition: all 0.3s ease-out; }

        /* 底部动态键盘 */
        #keyboard { width: 100%; max-width: 600px; background: #0f172a; padding: 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .key-btn { aspect-ratio: 1/1; border-radius: 16px; background: #38bdf8; color: white; font-size: 32px; font-weight: 900; border: none; border-bottom: 6px solid #0284c7; cursor: pointer; transition: 0.1s; outline: none; display: flex; align-items: center; justify-content: center; }
        .key-btn:active { transform: translateY(6px); border-bottom-width: 0; }
        .key-btn.wrong { background: #ef4444; border-color: #b91c1c; transform: translateX(5px); }

        /* 顶部通关提示 */
        #status { position: absolute; top: 20px; font-size: 24px; font-weight: 900; color: #facc15; }
    </style>
</head>
<body>

    <div id="status">Combo Defender 🚀</div>

    <div id="game-area">
        </div>

    <div id="keyboard">
        </div>

<script>
    // 题库设计：包含提示、整体汉字、以及【必须按顺序输入】的部件拆解
    const dictionary = [
        { word: "请", hint: "请客", parts: ["讠", "青"] },                 // 2轮车
        { word: "树", hint: "树木", parts: ["木", "又", "寸"] },            // 3轮车
        { word: "游", hint: "游泳", parts: ["氵", "方", "𠂉", "子"] },      // 4轮车 Boss
        { word: "照", hint: "照片", parts: ["日", "刀", "口", "灬"] },      // 4轮车 Boss
        { word: "跑", hint: "跑步", parts: ["足", "包"] }                  // 2轮车
    ];

    // 干扰项偏旁池
    const distractors = ["扌", "亻", "心", "月", "虫", "门", "广", "走", "雨"];

    let currentLevel = 0;
    let currentMonster = null;
    let currentPartIndex = 0; // 当前打到了第几个部件

    const gameArea = document.getElementById('game-area');
    const keyboard = document.getElementById('keyboard');

    // 简单的网页合成音效
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'hit') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'explode') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'wrong') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function loadLevel() {
        if (currentLevel >= dictionary.length) {
            gameArea.innerHTML = `<h1 style="color:#10b981; font-size:40px;">全部消灭！🎉</h1>`;
            keyboard.innerHTML = '';
            return;
        }

        currentMonster = dictionary[currentLevel];
        currentPartIndex = 0; // 重置连击进度

        renderMonster();
        renderKeyboard();
    }

    function renderMonster() {
        // 生成插槽 HTML
        let slotsHtml = currentMonster.parts.map((p, i) => `<div class="slot" id="slot-${i}"></div>`).join('');
        
        // 生成车轮 HTML（几个部件就几个轮子）
        let wheelsHtml = currentMonster.parts.map((p, i) => `<div class="wheel" id="wheel-${i}">🛞</div>`).join('');

        gameArea.innerHTML = `
            <div class="cart-monster" id="monster-obj">
                <div class="monster-body" id="monster-body">
                    <div class="monster-face">👾</div>
                    <div class="hint-text">(　) ➡️ ${currentMonster.hint}</div>
                    <div class="slots-container">
                        ${slotsHtml}
                    </div>
                </div>
                <div class="wheels-container">
                    ${wheelsHtml}
                </div>
            </div>
        `;
    }

    function renderKeyboard() {
        // 提取当前怪兽需要的正确部件
        let neededParts = [...currentMonster.parts];
        
        // 随机抽取干扰项，凑够 8 个按键
        let keys = [...neededParts];
        let availableDistractors = [...distractors].sort(() => 0.5 - Math.random());
        while (keys.length < 8) {
            keys.push(availableDistractors.pop());
        }

        // 打乱按键顺序
        keys.sort(() => 0.5 - Math.random());

        // 渲染键盘
        keyboard.innerHTML = keys.map(k => `
            <button class="key-btn" onclick="handleKeyPress('${k}', this)">${k}</button>
        `).join('');
    }

    function handleKeyPress(char, btnElement) {
        if (!currentMonster) return;

        let expectedChar = currentMonster.parts[currentPartIndex];

        if (char === expectedChar) {
            // ✅ 打对了！
            playSound('hit');

            // 1. 填满对应的插槽
            let slot = document.getElementById(`slot-${currentPartIndex}`);
            slot.innerText = char;
            slot.classList.add('filled');

            // 2. 爆掉一个车轮！
            let wheel = document.getElementById(`wheel-${currentPartIndex}`);
            wheel.classList.add('blown');

            // 3. 让车子往下沉一点（模拟战损）
            let body = document.getElementById('monster-body');
            body.style.transform = `translateY(${(currentPartIndex + 1) * 5}px) rotate(${(currentPartIndex % 2 === 0 ? 1 : -1) * 3}deg)`;

            currentPartIndex++;

            // 检查是否全部打完
            if (currentPartIndex >= currentMonster.parts.length) {
                setTimeout(killMonster, 300);
            }
        } else {
            // ❌ 打错了！
            playSound('wrong');
            btnElement.classList.add('wrong');
            setTimeout(() => btnElement.classList.remove('wrong'), 200);
            
            // 怪兽摇晃挑衅
            let body = document.getElementById('monster-body');
            body.style.transform = `translateX(10px)`;
            setTimeout(() => body.style.transform = `translateX(-10px)`, 100);
            setTimeout(() => body.style.transform = `translateX(0)`, 200);
        }
    }

    function killMonster() {
        playSound('explode');
        let obj = document.getElementById('monster-obj');
        
        // 把所有的部件合成最终的汉字，并变大爆炸
        obj.innerHTML = `<div style="font-size: 100px; font-weight: 900; color: #10b981; text-shadow: 0 0 30px #34d399;">${currentMonster.word}</div>`;
        obj.classList.add('dead');

        // 延迟进入下一关
        setTimeout(() => {
            currentLevel++;
            loadLevel();
        }, 1000);
    }

    // 初始化游戏
    window.onload = loadLevel;
</script>

</body>
</html>
