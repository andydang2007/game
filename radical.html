<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
:root{--vh:1vh;--keyboard-height:clamp(150px,28vh,230px);--cyan:#00f3ff;--pink:#ff00ff;--bg:#050510}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(ellipse at 50% 20%,rgba(56,189,248,.22),transparent 38%),radial-gradient(ellipse at 50% 44%,#1e1b4b,var(--bg) 78%)}
body{touch-action:manipulation}#game{position:relative;width:100vw;height:100dvh;min-height:calc(var(--vh)*100);overflow:hidden;perspective:1000px}
#hud{position:absolute;top:max(10px,env(safe-area-inset-top));left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));z-index:90;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.hud-box{background:rgba(15,23,42,.82);border:2px solid rgba(0,243,255,.42);backdrop-filter:blur(6px);border-radius:12px;padding:clamp(6px,1.5vh,10px) clamp(10px,2vw,20px);font-size:clamp(13px,2.5vw,24px);font-weight:900;color:#fff;text-shadow:0 0 5px rgba(0,243,255,.7);box-shadow:0 0 6px rgba(0,243,255,.16);white-space:nowrap}.timer-box{border-color:rgba(255,0,255,.38);text-shadow:0 0 5px rgba(255,0,255,.68)}
#arena{position:absolute;left:0;right:0;top:0;bottom:var(--keyboard-height);overflow:hidden;z-index:5}#depth-fog{position:absolute;inset:0;pointer-events:none;z-index:6;background-image:linear-gradient(rgba(0,243,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,243,255,.035) 1px,transparent 1px);background-size:50px 50px;opacity:.42}#track-svg{position:absolute;inset:0;width:100%;height:100%;z-index:8;pointer-events:none}.track-fill{fill:rgba(0,243,255,.02);stroke:rgba(255,255,255,.1);stroke-width:1}.track-line{stroke-width:3.5;stroke-linecap:round;opacity:.78}.track-edge{stroke:rgba(255,255,255,.14);stroke-width:1.1}.track-rung{stroke-width:1.7;stroke-linecap:round;opacity:.35}#game.replay-mode .track-line{stroke-width:4.5;opacity:.92}#game.replay-mode .track-rung{opacity:.58}
#miss-line{position:absolute;left:0;right:0;bottom:var(--keyboard-height);height:7px;z-index:70;background:linear-gradient(90deg,transparent,rgba(255,0,255,.78),transparent);box-shadow:0 0 8px rgba(255,0,255,.5);pointer-events:none}
.depth-character{position:absolute;z-index:40;background:transparent;color:#fff;font-weight:900;line-height:1;text-shadow:0 0 6px rgba(255,255,255,.68),0 0 12px rgba(0,243,255,.62);transform-origin:center center;will-change:left,top,transform,opacity,font-size;transition:filter .08s}.depth-character.correct{color:#a7f3d0;text-shadow:0 0 8px #4ade80,0 0 14px #22c55e;filter:brightness(1.18)}.depth-character.complete{animation:completeFade .22s ease-out forwards}@keyframes completeFade{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.25)}}
.progress{position:absolute;left:50%;bottom:-24px;transform:translateX(-50%);display:flex;gap:6px}.dot{width:clamp(7px,1.4vw,10px);height:clamp(7px,1.4vw,10px);border-radius:50%;background:rgba(0,0,0,.8);border:2px solid var(--cyan);box-shadow:0 0 4px rgba(0,243,255,.55)}.dot.done{background:#10b981;border-color:#a7f3d0;box-shadow:0 0 6px #10b981}.dot.next{background:#fef08a;border-color:#facc15;box-shadow:0 0 6px #facc15}
#piano-wrap{position:absolute;left:0;right:0;bottom:0;height:var(--keyboard-height);z-index:100;padding:clamp(6px,1.4vh,10px) max(8px,env(safe-area-inset-left)) max(8px,env(safe-area-inset-bottom));background:#07070f;border-top:3px solid var(--cyan);box-shadow:0 -6px 18px rgba(0,243,255,.10)}#piano{display:flex;width:100%;height:100%;gap:clamp(3px,.8vw,6px)}.white-key{flex:1;min-width:0;position:relative;border-radius:0 0 12px 12px;border:1px solid #333;border-bottom:clamp(7px,1.5vh,12px) solid #222;background:linear-gradient(180deg,#e2e8f0,#cbd5e1);cursor:pointer;transform-origin:top center;transition:transform .05s,background .05s,border-bottom-width .05s,box-shadow .08s;box-shadow:inset 0 -5px 10px rgba(0,0,0,.2);overflow:hidden}.white-key.pressed{transform:rotateX(10deg);border-bottom-width:2px;background:linear-gradient(180deg,#94a3b8,#64748b);box-shadow:inset 0 20px 20px rgba(0,0,0,.3)}.white-key.replay-flash{background:linear-gradient(180deg,#a7f3d0,#67e8f9);box-shadow:inset 0 -5px 10px rgba(0,0,0,.15),0 0 8px rgba(0,243,255,.32)}.key-radical{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);font-size:clamp(18px,4vw,48px);font-weight:900;color:#0f172a;pointer-events:none;line-height:1}.key-note{position:absolute;left:50%;bottom:clamp(4px,1vh,8px);transform:translateX(-50%);font-size:clamp(9px,1.5vw,14px);font-weight:bold;color:#64748b;pointer-events:none}.hide-radicals .key-radical{display:none}.used-key .key-radical{opacity:.18}
.replay-orb{position:absolute;z-index:82;width:16px;height:16px;border-radius:999px;pointer-events:none;background:radial-gradient(circle at 35% 35%,#fff 0%,#a7f3d0 24%,#00f3ff 58%,#ff00ff 100%);box-shadow:0 0 6px rgba(0,243,255,.55),0 0 10px rgba(255,0,255,.22);opacity:.9;will-change:left,top,transform,opacity}.impact-ring{position:absolute;z-index:86;width:28px;height:28px;border-radius:999px;border:3px solid rgba(0,243,255,.75);pointer-events:none;transform:translate(-50%,-50%) scale(.4);animation:ringFade .36s ease-out forwards}@keyframes ringFade{to{opacity:0;transform:translate(-50%,-50%) scale(2.3)}}
#audio-player-ui{display:none;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%,#0d0d1e,#05050b);border-radius:12px;border:1px solid rgba(0,243,255,.18);padding:15px}.player-title{color:#fff;font-size:clamp(13px,2.2vw,18px);font-weight:bold;letter-spacing:1px;margin-bottom:8px;text-shadow:0 0 6px var(--cyan)}.equalizer-box{display:flex;align-items:flex-end;gap:8px;height:44px;margin-bottom:10px}.eq-bar{width:6px;height:18px;background:linear-gradient(to top,var(--cyan),var(--pink));border-radius:3px;opacity:.75}.eq-bar.animating{animation:eqJumpSoft .9s ease-in-out infinite alternate}@keyframes eqJumpSoft{0%{height:14px}100%{height:38px}}.progress-track{width:80%;max-width:600px;height:6px;background:#1e1e2f;border-radius:3px;position:relative;overflow:hidden}.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink))}
.overlay{position:absolute;inset:0;z-index:300;background:rgba(5,5,16,.92);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}.overlay h1{margin:0 0 10px;color:#fff;font-size:clamp(34px,6vw,68px);text-shadow:0 0 12px var(--cyan)}.overlay p{margin:0 0 16px;color:#e2e8f0;font-size:clamp(16px,3vw,20px);font-weight:800}.version-label{margin:0 0 18px;color:#a7f3d0;font-size:18px;font-weight:900;text-shadow:0 0 6px #22c55e}.remix-switches{display:flex;gap:14px;justify-content:center;align-items:center;margin:8px 0 18px;flex-wrap:wrap}.icon-toggle{width:clamp(54px,9vw,74px);height:clamp(54px,9vw,74px);border-radius:999px;border:2px solid rgba(255,255,255,.22);background:rgba(15,23,42,.82);color:white;font-size:clamp(26px,5vw,38px);font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 8px rgba(0,243,255,.12)}.icon-toggle.active{border-color:rgba(34,197,94,.8);background:rgba(34,197,94,.18);box-shadow:0 0 10px rgba(34,197,94,.28)}.btn{border:none;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;padding:16px 40px;font-size:clamp(20px,4vw,26px);font-weight:900;border-radius:999px;cursor:pointer;box-shadow:0 0 12px rgba(99,102,241,.42);transition:transform .1s;margin:10px}.btn:active{transform:scale(.95)}.btn-pink{background:linear-gradient(135deg,#d946ef,#f43f5e);box-shadow:0 0 12px rgba(244,63,94,.42)}#replay-screen{display:none}@media (orientation:landscape) and (max-height:760px){:root{--keyboard-height:clamp(135px,32vh,190px)}#hud{top:8px}.hud-box{padding:6px 12px}.progress{bottom:-18px}.key-radical{font-size:clamp(18px,5vh,38px)}.equalizer-box{height:34px;margin-bottom:6px}.eq-bar.animating{animation:none}}@media (max-width:720px){:root{--keyboard-height:clamp(145px,30vh,210px)}#piano{gap:3px}.key-radical{font-size:clamp(16px,5vw,34px)}.key-note{font-size:clamp(8px,2vw,11px)}}@media (prefers-reduced-motion:reduce){.eq-bar.animating{animation:none!important}}
</style>
</head>
<body>
<div id="game">
  <div id="hud"><div class="hud-box">⭐ 得分: <span id="score">0</span></div><div class="hud-box timer-box">⏳ 时间: <span id="timer">60</span>s</div></div>
  <div id="arena"><div id="depth-fog"></div><svg id="track-svg"></svg></div>
  <div id="miss-line"></div>
  <div id="piano-wrap"><div id="piano"></div><div id="audio-player-ui"><div class="player-title">MAGIC REMIX</div><div class="equalizer-box"><div class="eq-bar" style="animation-delay:.1s"></div><div class="eq-bar" style="animation-delay:.3s"></div><div class="eq-bar" style="animation-delay:0s"></div><div class="eq-bar" style="animation-delay:.4s"></div><div class="eq-bar" style="animation-delay:.2s"></div><div class="eq-bar" style="animation-delay:.5s"></div></div><div class="progress-track"><div class="progress-fill" id="p-fill"></div></div></div></div>
  <div id="start-screen" class="overlay"><h1 id="start-title">题库加载中...</h1><div class="version-label" id="version-label">Version v1.14.1</div><p id="start-text">请稍候，正在获取云端题库</p></div>
  <div id="replay-screen" class="overlay"><h1>Remix</h1><div class="version-label">Version v1.14.1</div><div class="remix-switches"><button class="icon-toggle active" id="toggle-speed" aria-label="速度">🚶</button><button class="icon-toggle active" id="toggle-drum" aria-label="鼓点风格">🥁</button><button class="icon-toggle active" id="toggle-bass" aria-label="贝斯风格">🎸</button><button class="icon-toggle active" id="toggle-inst" aria-label="乐器">🎹</button></div><button class="btn btn-pink" id="btn-replay">▶️</button><button class="btn" onclick="location.reload()">🔄</button></div>
</div>
<script>
const GAME_VERSION="v1.14.1";
const SHEET_URL="https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";
const KEY_COUNT=12,MAX_ACTIVE_CHARS=1,GAME_TIME=60,SPEED_MULTIPLIER=2.2,MAX_GAP_MS=900,REMIX_BPM=112;
const PENTA_KEYS=[{label:"低5",freq:196},{label:"低6",freq:220},{label:"1",freq:261.63},{label:"2",freq:293.66},{label:"3",freq:329.63},{label:"5",freq:392},{label:"6",freq:440},{label:"高1",freq:523.25},{label:"高2",freq:587.33},{label:"高3",freq:659.25},{label:"高5",freq:783.99},{label:"高6",freq:880}];
const distractors=["扌","亻","心","忄","月","虫","门","广","走","雨","艹","口","氵","日","木","女","讠","辶","土","火","宀","贝","王","纟","石","禾","目","竹","页","刂"];
let dictionary=[],activeChars=[],keyboardSlots=Array(KEY_COUNT).fill(null),score=0,timeLeft=GAME_TIME,isPlaying=false,lastFrameTime=0,animationRef=null,clockTimer=null,beatTimer=null,idCounter=1,trackGeometry=[],audioCtx=null,activeNotes=new Map(),rawRecordedNotes=[],processedNotes=[],nextBeatTime=0,replayOrbs=[],replayVisualRef=null,remixSpeed="normal",remixDrumStyle="soft",remixBassStyle="warm",replayInstrument="piano";
const gameEl=document.getElementById("game"),arena=document.getElementById("arena"),trackSvg=document.getElementById("track-svg"),piano=document.getElementById("piano"),playerUI=document.getElementById("audio-player-ui");
window.addEventListener("load",()=>{setViewportHeight();initPianoDOM();initToggleButtons();loadDictionary()});window.addEventListener("resize",()=>{setViewportHeight();calculateTrack();activeChars.forEach(c=>renderCharacter(c))});window.addEventListener("orientationchange",()=>setTimeout(()=>{setViewportHeight();calculateTrack();activeChars.forEach(c=>renderCharacter(c))},300));document.addEventListener("pointerup",()=>{stopAllNotes();releaseAllKeys()});document.addEventListener("pointercancel",()=>{stopAllNotes();releaseAllKeys()});
function setViewportHeight(){document.documentElement.style.setProperty("--vh",`${window.innerHeight*.01}px`)}
function initToggleButtons(){const speed=document.getElementById("toggle-speed"),drum=document.getElementById("toggle-drum"),bass=document.getElementById("toggle-bass"),inst=document.getElementById("toggle-inst");speed.addEventListener("click",()=>{const order=["slow","normal","fast"],icons={slow:"🐢",normal:"🚶",fast:"⚡"};remixSpeed=order[(order.indexOf(remixSpeed)+1)%order.length];speed.textContent=icons[remixSpeed]});drum.addEventListener("click",()=>{const order=["soft","electro","clap"],icons={soft:"🥁",electro:"🤖",clap:"👏"};remixDrumStyle=order[(order.indexOf(remixDrumStyle)+1)%order.length];drum.textContent=icons[remixDrumStyle]});bass.addEventListener("click",()=>{const order=["warm","deep","bright"],icons={warm:"🎸",deep:"🐘",bright:"✨"};remixBassStyle=order[(order.indexOf(remixBassStyle)+1)%order.length];bass.textContent=icons[remixBassStyle]});inst.addEventListener("click",()=>{const order=["piano","bell","pluck","organ"],icons={piano:"🎹",bell:"🔔",pluck:"🪕",organ:"🎛️"};replayInstrument=order[(order.indexOf(replayInstrument)+1)%order.length];inst.textContent=icons[replayInstrument]})}
function loadDictionary(){document.getElementById("version-label").textContent=`Version ${GAME_VERSION}`;if(typeof Papa==="undefined"){document.getElementById("start-title").textContent="加载失败";document.getElementById("start-text").textContent="PapaParse 加载失败，请刷新页面。";return}Papa.parse(SHEET_URL+"&t="+Date.now(),{download:true,header:true,skipEmptyLines:"greedy",transformHeader:h=>String(h||"").replace(/^\uFEFF/,"").trim().toUpperCase(),complete:res=>{dictionary=res.data.filter(r=>r["QUESTION"]||r["ANSWER"]||r["CORRECT ANSWER"]).map(r=>{const word=String(r["QUESTION"]||r["ANSWER"]||r["CORRECT ANSWER"]||"").trim();const parts=String(r["PARTS"]||r["部件"]||"").split(/[,，、|/]/).map(p=>p.trim()).filter(Boolean);return word&&parts.length?{word,parts}:null}).filter(Boolean);if(dictionary.length){document.getElementById("start-title").textContent="汉字节奏大师";document.getElementById("start-text").innerHTML=`已加载 ${dictionary.length} 个汉字<br>顺序光圈版`;const old=document.getElementById("start-btn");if(old)old.remove();const btn=document.createElement("button");btn.id="start-btn";btn.className="btn";btn.textContent="🚀";btn.addEventListener("click",startGame);document.getElementById("start-screen").appendChild(btn)}else{document.getElementById("start-title").textContent="题库为空";document.getElementById("start-text").textContent="请检查 Question / Parts 列。"}},error:e=>{console.error(e);document.getElementById("start-title").textContent="加载失败";document.getElementById("start-text").textContent="Google Sheet 加载失败，请检查网络或权限。"}})}
function initPianoDOM(){piano.innerHTML="";for(let i=0;i<KEY_COUNT;i++){const btn=document.createElement("div");btn.className="white-key";btn.innerHTML=`<div class="key-radical"></div><div class="key-note">${PENTA_KEYS[i].label}</div>`;btn.addEventListener("pointerdown",e=>{e.preventDefault();handleKeyPress(i,btn)});["pointerup","pointercancel","pointerleave"].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault();btn.classList.remove("pressed");stopSustainNote(`key-${i}`)}));piano.appendChild(btn)}}
function startGame(){ensureAudio();document.getElementById("start-screen").style.display="none";piano.style.display="flex";piano.classList.remove("hide-radicals");playerUI.style.display="none";gameEl.classList.remove("replay-mode");score=0;timeLeft=GAME_TIME;isPlaying=true;activeChars=[];rawRecordedNotes=[];processedNotes=[];lastFrameTime=performance.now();document.getElementById("score").textContent=score;document.getElementById("timer").textContent=timeLeft;calculateTrack();initKeyboardSlotsFirstTime();nextBeatTime=audioCtx.currentTime+.1;scheduleAmbientMusic();clockTimer=setInterval(()=>{timeLeft--;document.getElementById("timer").textContent=timeLeft;if(timeLeft<=0)endGame()},1000);spawnCharacter();animationRef=requestAnimationFrame(gameLoop)}
function endGame(){isPlaying=false;clearInterval(clockTimer);cancelAnimationFrame(animationRef);if(beatTimer){cancelAnimationFrame(beatTimer);beatTimer=null}stopAllNotes();activeChars.forEach(c=>c.el.remove());activeChars=[];initKeyboardSlotsFirstTime();piano.classList.add("hide-radicals");document.getElementById("replay-screen").style.display="flex";document.getElementById("btn-replay").onclick=()=>playRecording()}
function gameLoop(now){if(!isPlaying)return;const dt=Math.min(32,now-lastFrameTime)/16.67;lastFrameTime=now;activeChars.forEach(c=>renderCharacter(c));animationRef=requestAnimationFrame(gameLoop)}
function spawnCharacter(){const data=dictionary[Math.floor(Math.random()*dictionary.length)];if(!data)return;const el=document.createElement("div");el.className="depth-character";const wordSpan=document.createElement("span");wordSpan.textContent=data.word;el.appendChild(wordSpan);const progress=document.createElement("div");progress.className="progress";data.parts.forEach(()=>{const dot=document.createElement("div");dot.className="dot";progress.appendChild(dot)});el.appendChild(progress);arena.appendChild(el);const c={id:idCounter++,el,word:data.word,parts:data.parts.map((char,idx)=>({partId:`${idCounter}-${idx}-${char}-${Math.random()}`,char,idx})),nextPartIndex:0,visualHitCount:0,dead:false};activeChars=[c];resetKeyboardForCharacter(c);renderCharacter(c)}
function resetKeyboardForCharacter(c){keyboardSlots=Array(KEY_COUNT).fill(null);const avoid=c.parts.map(p=>p.char);for(let i=0;i<KEY_COUNT;i++)keyboardSlots[i]={kind:"distractor",char:randomDistractorAvoiding(avoid)};const idxs=Array.from({length:KEY_COUNT},(_,i)=>i);shuffle(idxs);c.parts.slice(0,KEY_COUNT).forEach((p,idx)=>{keyboardSlots[idxs[idx]]={kind:"part",char:p.char,partId:p.partId,partIndex:p.idx,target:c,targetId:c.id}});renderKeyboardDOMText()}
function calculateTrack(){const rect=arena.getBoundingClientRect();if(!rect.width||!rect.height)return;trackSvg.innerHTML="";trackGeometry=[];trackSvg.setAttribute("viewBox",`0 0 ${rect.width} ${rect.height}`);const defs=document.createElementNS("http://www.w3.org/2000/svg","defs"),rainbow=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");rainbow.setAttribute("id","rainbowLine");rainbow.setAttribute("x1","0%");rainbow.setAttribute("y1","0%");rainbow.setAttribute("x2","100%");rainbow.setAttribute("y2","0%");[["0%","#ff00ff"],["18%","#00f3ff"],["36%","#22c55e"],["55%","#facc15"],["75%","#ff7a00"],["100%","#ff00ff"]].forEach(([o,c])=>{const s=document.createElementNS("http://www.w3.org/2000/svg","stop");s.setAttribute("offset",o);s.setAttribute("stop-color",c);rainbow.appendChild(s)});defs.appendChild(rainbow);trackSvg.appendChild(defs);const farY=rect.height*.1,centerX=rect.width/2,laneW=rect.width/KEY_COUNT;for(let i=0;i<KEY_COUNT;i++){const nearLeft=i*laneW,nearRight=(i+1)*laneW,nearCenterX=nearLeft+laneW/2,farCenterX=centerX+(i-(KEY_COUNT-1)/2)*5;const path=document.createElementNS("http://www.w3.org/2000/svg","path");path.setAttribute("d",`M ${nearLeft} ${rect.height} L ${farCenterX-5} ${farY} L ${farCenterX+5} ${farY} L ${nearRight} ${rect.height} Z`);path.setAttribute("class","track-fill");trackSvg.appendChild(path);[[nearLeft,farCenterX-5],[nearRight,farCenterX+5]].forEach(([x1,x2])=>{const e=document.createElementNS("http://www.w3.org/2000/svg","line");e.setAttribute("x1",x1);e.setAttribute("y1",rect.height);e.setAttribute("x2",x2);e.setAttribute("y2",farY);e.setAttribute("class","track-edge");trackSvg.appendChild(e)});const line=document.createElementNS("http://www.w3.org/2000/svg","line");line.setAttribute("x1",nearCenterX);line.setAttribute("y1",rect.height);line.setAttribute("x2",farCenterX);line.setAttribute("y2",farY);line.setAttribute("class","track-line");line.setAttribute("stroke","url(#rainbowLine)");trackSvg.appendChild(line);for(let r=1;r<=10;r++){const t=r/11,y=farY+(rect.height-farY)*t,width=10+laneW*t*.9,x=farCenterX+(nearCenterX-farCenterX)*t;const rung=document.createElementNS("http://www.w3.org/2000/svg","line");rung.setAttribute("x1",x-width/2);rung.setAttribute("y1",y);rung.setAttribute("x2",x+width/2);rung.setAttribute("y2",y);rung.setAttribute("class","track-rung");rung.setAttribute("stroke","url(#rainbowLine)");trackSvg.appendChild(rung)}trackGeometry.push({nearX:nearCenterX,nearY:rect.height,farX:farCenterX,farY})}}
function getTargetPoint(){const r=arena.getBoundingClientRect();return{x:r.width/2,y:r.height*.16}}function getKeyPoint(i){const k=piano.children[i],ar=arena.getBoundingClientRect(),kr=k.getBoundingClientRect();return{x:kr.left+kr.width/2-ar.left,y:ar.height+4}}
function renderCharacter(c){if(!c||c.dead)return;const p=getTargetPoint();c.el.style.left=`${p.x}px`;c.el.style.top=`${p.y}px`;c.el.style.fontSize=`clamp(50px,8vw,100px)`;c.el.style.opacity=1;c.el.style.transform=`translate(-50%,-50%) scale(1)`;c.el.querySelectorAll(".dot").forEach((dot,idx)=>{dot.className=idx<c.visualHitCount?"dot done":"dot next"})}
function initKeyboardSlotsFirstTime(){keyboardSlots=Array(KEY_COUNT).fill(null);for(let i=0;i<KEY_COUNT;i++)keyboardSlots[i]={kind:"distractor",char:distractors[Math.floor(Math.random()*distractors.length)]};renderKeyboardDOMText()}function renderKeyboardDOMText(){const keys=piano.children;for(let i=0;i<KEY_COUNT;i++){const el=keys[i]?.querySelector(".key-radical");if(el)el.textContent=keyboardSlots[i]?keyboardSlots[i].char:"";keys[i]?.classList.toggle("used-key",keyboardSlots[i]?.kind==="used")}}
function handleKeyPress(i,btn){if(!isPlaying)return;const slot=keyboardSlots[i];if(!slot)return;btn.classList.add("pressed");startSustainNote(`key-${i}`,PENTA_KEYS[i].freq);if(slot.kind==="part"){const c=slot.target;if(!c||c.dead)return;const expected=c.parts[c.nextPartIndex];if(!expected||slot.char!==expected.char)return;rawRecordedNotes.push({absTime:Date.now(),index:i,freq:PENTA_KEYS[i].freq});score+=50;document.getElementById("score").textContent=score;c.nextPartIndex++;c.visualHitCount++;c.el.classList.add("correct");setTimeout(()=>{if(c.el)c.el.classList.remove("correct")},150);shootGameOrb(i);keyboardSlots[i]={kind:"used",char:""};renderKeyboardDOMText();renderCharacter(c);if(c.nextPartIndex>=c.parts.length){score+=200;document.getElementById("score").textContent=score;c.dead=true;c.el.classList.add("complete");activeChars=[];initKeyboardSlotsFirstTime();setTimeout(()=>{if(c.el)c.el.remove()},220);setTimeout(()=>{if(isPlaying)spawnCharacter()},120)}}}
function shootGameOrb(i){const a=getKeyPoint(i),b=getTargetPoint(),el=document.createElement("div");el.className="replay-orb";arena.appendChild(el);let frame=0,total=24;function step(){frame++;const t=frame/total,e=1-Math.pow(1-t,3),x=a.x+(b.x-a.x)*e,y=a.y+(b.y-a.y)*e;el.style.left=`${x}px`;el.style.top=`${y}px`;el.style.transform=`translate(-50%,-50%) scale(${.75+e*.9})`;el.style.opacity=`${Math.max(0,1-t*.15)}`;if(frame<total)requestAnimationFrame(step);else{el.remove();const ring=document.createElement("div");ring.className="impact-ring";ring.style.left=`${b.x}px`;ring.style.top=`${b.y}px`;arena.appendChild(ring);setTimeout(()=>ring.remove(),420)}}step()}
function getRemixSettings(){const map={slow:{bpm:96,mult:1.7},normal:{bpm:112,mult:2.2},fast:{bpm:132,mult:2.8}},s=map[remixSpeed]||map.normal;return{drumStyle:remixDrumStyle,bassStyle:remixBassStyle,fx:true,bpm:s.bpm,speedMultiplier:s.mult,quantizeStepMs:(60000/s.bpm)/2,instrument:replayInstrument}}
function processRecordedNotesWithGapCut(s){if(!rawRecordedNotes.length){processedNotes=[];return}processedNotes=[];let cut=0,last=-s.quantizeStepMs;for(let i=0;i<rawRecordedNotes.length;i++){if(i>0){const gap=rawRecordedNotes[i].absTime-rawRecordedNotes[i-1].absTime;if(gap>MAX_GAP_MS)cut+=gap-MAX_GAP_MS}const compact=rawRecordedNotes[i].absTime-rawRecordedNotes[0].absTime-cut;let q=Math.round((compact/s.speedMultiplier)/s.quantizeStepMs)*s.quantizeStepMs;if(q<=last)q=last+s.quantizeStepMs;last=q;processedNotes.push({relTime:q,index:rawRecordedNotes[i].index,freq:rawRecordedNotes[i].freq})}if(processedNotes.length>=2)processedNotes.push({relTime:last+s.quantizeStepMs,index:7,freq:PENTA_KEYS[7].freq})}
function scheduleAmbientMusic(){if(!isPlaying||!audioCtx)return;const now=audioCtx.currentTime;if(now>=nextBeatTime-.05){[220,261.63,329.63].forEach((f,idx)=>{const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="sine";osc.frequency.value=f/2;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.018,now+1.5+idx*.2);g.gain.linearRampToValueAtTime(0,now+4);osc.connect(g);g.connect(audioCtx.destination);osc.start(now);osc.stop(now+4)});nextBeatTime=now+3.5}beatTimer=requestAnimationFrame(scheduleAmbientMusic)}
function ensureAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume().catch(()=>{})}
function startSustainNote(id,freq){ensureAudio();if(activeNotes.has(id))stopSustainNote(id);const now=audioCtx.currentTime,out=audioCtx.createGain();out.gain.setValueAtTime(0,now);out.gain.linearRampToValueAtTime(.25,now+.02);out.gain.exponentialRampToValueAtTime(.07,now+.3);out.connect(audioCtx.destination);const oscs=[];[{r:1,a:1,t:"sine"},{r:2,a:.3,t:"triangle"},{r:3,a:.1,t:"sine"}].forEach(h=>{const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type=h.t;osc.frequency.value=freq*h.r;g.gain.setValueAtTime(h.a,now);g.gain.exponentialRampToValueAtTime(.01,now+(h.r===1?.7:.2));osc.connect(g);g.connect(out);osc.start(now);oscs.push({osc,g})});activeNotes.set(id,{output:out,oscs})}function stopSustainNote(id){if(!audioCtx)return;const n=activeNotes.get(id);if(!n)return;const now=audioCtx.currentTime;try{n.output.gain.cancelScheduledValues(now);n.output.gain.setValueAtTime(n.output.gain.value||.06,now);n.output.gain.exponentialRampToValueAtTime(.001,now+.1);n.oscs.forEach(o=>o.osc.stop(now+.2));setTimeout(()=>{try{n.output.disconnect()}catch(e){}},300)}catch(e){}activeNotes.delete(id)}function stopAllNotes(){Array.from(activeNotes.keys()).forEach(k=>stopSustainNote(k))}function releaseAllKeys(){document.querySelectorAll(".white-key.pressed").forEach(k=>k.classList.remove("pressed"))}
function playRecording(){const s=getRemixSettings();processRecordedNotesWithGapCut(s);if(!processedNotes.length){alert("刚才没有击中汉字哦，重开一局吧！");return}ensureAudio();document.getElementById("replay-screen").style.display="none";piano.style.display="flex";piano.classList.add("hide-radicals");playerUI.style.display="flex";gameEl.classList.add("replay-mode");playerUI.querySelectorAll(".eq-bar").forEach(b=>b.classList.add("animating"));calculateTrack();startReplayVisualLoop();const total=processedNotes[processedNotes.length-1].relTime+1500,pFill=document.getElementById("p-fill"),start=Date.now();pFill.style.width="0%";const int=setInterval(()=>{const e=Date.now()-start;pFill.style.width=`${Math.min(100,e/total*100)}%`;if(e>=total)clearInterval(int)},40);const startAt=audioCtx.currentTime+.2;scheduleReplayBacking(startAt,total/1000,s);processedNotes.forEach(n=>{playInstrumentNoteAt(n.freq,startAt+n.relTime/1000,.3,.15,s.instrument);setTimeout(()=>{flashReplayKey(n.index);spawnReplayOrb(n.index)},n.relTime)});setTimeout(()=>{playerUI.querySelectorAll(".eq-bar").forEach(b=>b.classList.remove("animating"));gameEl.classList.remove("replay-mode");stopReplayVisualLoop();document.getElementById("replay-screen").style.display="flex"},total)}
function flashReplayKey(i){const key=piano.children[i];if(!key)return;key.classList.add("replay-flash");setTimeout(()=>key.classList.remove("replay-flash"),160)}function spawnReplayOrb(i){const el=document.createElement("div");el.className="replay-orb";arena.appendChild(el);replayOrbs.push({el,laneIndex:i,z:.04,life:0,duration:40})}function startReplayVisualLoop(){stopReplayVisualLoop();function loop(){replayOrbs.forEach(o=>{o.life++;o.z+=.024;const p=getPointOnLane(o.laneIndex,Math.min(.82,o.z)),sc=.8+o.z*1.05;o.el.style.left=`${p.x}px`;o.el.style.top=`${p.y}px`;o.el.style.transform=`translate(-50%,-50%) scale(${sc})`;o.el.style.opacity=Math.max(0,1-o.life/o.duration)});replayOrbs=replayOrbs.filter(o=>{if(o.life<o.duration)return true;o.el.remove();return false});replayVisualRef=requestAnimationFrame(loop)}replayVisualRef=requestAnimationFrame(loop)}function stopReplayVisualLoop(){if(replayVisualRef){cancelAnimationFrame(replayVisualRef);replayVisualRef=null}replayOrbs.forEach(o=>o.el.remove());replayOrbs=[]}
function getPointOnLane(i,z){const lane=trackGeometry[i];if(!lane)return{x:arena.clientWidth/2,y:arena.clientHeight/2};const t=1-z;return{x:lane.farX+(lane.nearX-lane.farX)*t,y:lane.farY+(lane.nearY-lane.farY)*t}}
function scheduleReplayBacking(startAt,totalSeconds,s){const beat=60/s.bpm;if(s.bassStyle){const progs={warm:[130.81,196,220,174.61],deep:[98,146.83,164.81,130.81],bright:[261.63,392,440,329.63]},prog=progs[s.bassStyle]||progs.warm;for(let t=0;t<totalSeconds+1;t+=beat){const bi=Math.floor(t/beat),f=prog[Math.floor(bi/4)%prog.length];if(bi%2===0)playBassAt(f,startAt+t,beat*1.55,s.bassStyle)}}if(s.drumStyle){for(let t=0;t<totalSeconds+1;t+=beat){const bi=Math.floor(t/beat);if(s.drumStyle==="soft"){if(bi%2===0)playHatAt(startAt+t)}else if(s.drumStyle==="clap"){if(bi%2===0)playClapAt(startAt+t);else playHatAt(startAt+t)}else{if(bi%4===0)playKickAt(startAt+t);else if(bi%4===2)playSnareAt(startAt+t);else playHatAt(startAt+t)}}}}
function playInstrumentNoteAt(freq,startAt,dur,vol,inst){if(inst==="bell")return playBellAt(freq,startAt,.8,vol*.7);if(inst==="pluck")return playPluckAt(freq,startAt,.38,vol);if(inst==="organ")return playOrganAt(freq,startAt,.42,vol*.75);return playPianoNoteAt(freq,startAt,dur,vol)}
function playPianoNoteAt(freq,startAt,dur,vol){[{ratio:1,amp:1},{ratio:2,amp:.32},{ratio:3,amp:.12}].forEach(h=>{const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="sine";osc.frequency.setValueAtTime(freq*h.ratio,startAt);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(vol*h.amp,startAt+.012);g.gain.exponentialRampToValueAtTime(.001,startAt+dur);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+dur+.04)})}function playBellAt(freq,startAt,dur,vol){[{r:1,a:1},{r:2.01,a:.45},{r:3.9,a:.18}].forEach(h=>{const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="sine";osc.frequency.setValueAtTime(freq*h.r,startAt);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(vol*h.a,startAt+.01);g.gain.exponentialRampToValueAtTime(.001,startAt+dur);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+dur+.05)})}function playPluckAt(freq,startAt,dur,vol){const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="triangle";osc.frequency.setValueAtTime(freq,startAt);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(vol,startAt+.008);g.gain.exponentialRampToValueAtTime(.001,startAt+dur);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+dur+.04)}function playOrganAt(freq,startAt,dur,vol){[1,2].forEach((r,i)=>{const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="square";osc.frequency.setValueAtTime(freq*r,startAt);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(vol*(i?.25:.55),startAt+.02);g.gain.exponentialRampToValueAtTime(.001,startAt+dur);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+dur+.04)})}
function playBassAt(freq,startAt,dur,style){const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type=style==="bright"?"sawtooth":"triangle";osc.frequency.setValueAtTime(freq,startAt);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(style==="deep"?.09:.065,startAt+.03);g.gain.exponentialRampToValueAtTime(.001,startAt+dur);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+dur+.04)}function playKickAt(startAt){const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="sine";osc.frequency.setValueAtTime(105,startAt);osc.frequency.exponentialRampToValueAtTime(48,startAt+.11);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(.09,startAt+.008);g.gain.exponentialRampToValueAtTime(.001,startAt+.16);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+.18)}function playSnareAt(startAt){const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="triangle";osc.frequency.setValueAtTime(220,startAt);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(.04,startAt+.01);g.gain.exponentialRampToValueAtTime(.001,startAt+.09);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+.1)}function playClapAt(startAt){playSnareAt(startAt);playSnareAt(startAt+.025)}function playHatAt(startAt){const osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type="square";osc.frequency.setValueAtTime(2200,startAt);g.gain.setValueAtTime(.001,startAt);g.gain.linearRampToValueAtTime(.012,startAt+.004);g.gain.exponentialRampToValueAtTime(.001,startAt+.035);osc.connect(g);g.connect(audioCtx.destination);osc.start(startAt);osc.stop(startAt+.045)}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}}function randomDistractorAvoiding(avoid){const safe=distractors.filter(d=>!avoid.includes(d));return safe.length?safe[Math.floor(Math.random()*safe.length)]:distractors[0]}
