<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSLE: 汉字连击快线 (HYPY版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Nunito', "Chalkboard SE", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-desert-top: #f59e0b; 
            --bg-desert-bottom: #ca8a04; 
            --key-bg: #92400e; 
            --key-border: #713f12; 
            --text-main: #fef3c7; 
            --defense-line: #f43f5e; 
        }

        body { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            background: linear-gradient(180deg, var(--bg-desert-top) 0%, var(--bg-desert-bottom) 100%); 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        @media (orientation: landscape) {
            /* 在横屏时，保持纵向排布，只是稍微缩小上下内边距，避免元素被挤出屏幕 */
            #header { padding: 10px 15px; }
            #keyboard { padding: 10px 15px 18px 15px; }
        }
        
        #sand-storm { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.3; background-image: radial-gradient(white 1px, transparent 1px); background-size: 50px 50px; animation: windScroll 15s linear infinite; }
        @keyframes windScroll { from { background-position: 0 0; } to { background-position: 500px 500px; } }

        #header { width: 100%; max-width: 800px; display: flex; justify-content: space-between; padding: 15px 25px; background: rgba(0,0,0,0.2); z-index: 10; border-bottom: 3px solid rgba(255,255,255,0.2); }
        .score-box { color: #facc15; }
        .lives-box { color: #f43f5e; font-size: 24px; letter-spacing: 2px; }

        #play-area { flex: 1 1 auto; width: 100%; max-width: 800px; margin: 0 auto; position: relative; overflow: hidden; z-index: 5; border-bottom: 4px solid var(--key-border); }
        #defense-wall { position: absolute; top: 0; right: 0; bottom: 0; width: 10px; background: var(--defense-line); box-shadow: -5px 0 15px rgba(244, 63, 94, 0.7); z-index: 6; }
        #play-area.hurt { animation: screenFlash 0.15s; }
        @keyframes screenFlash { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(244, 63, 94, 0.3); } }

        .tank-vehicle { position: absolute; left: -250px; transition: left 0.05s linear; z-index: 7; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .vehicle-wrapper { position: relative; display: inline-block; }
        .vehicle-img { height: 120px; object-fit: contain; transition: transform 0.1s; }
        .target-char { position: absolute; top: 15%; left: 0; width: 100%; text-align: center; font-size: 50px; color: #fff; font-weight: 900; text-shadow: 0px 4px 6px rgba(0,0,0,0.8), 0px 0px 10px rgba(255,0,0,0.5); }

        .vehicle-img.hurt { filter: drop-shadow(0 0 15px #f43f5e) brightness(1.5); animation: shakeTank 0.2s; }
        @keyframes shakeTank { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .tank-vehicle.exploded { animation: deadBlink 0.4s forwards; }
        @keyframes deadBlink { 
            0% { opacity: 1; transform: scale(1); filter: brightness(2); } 
            50% { opacity: 0; transform: scale(1.2); }
            100% { opacity: 0; } 
        }

        #keyboard { width: 100%; max-width: 800px; margin: 0 auto; background: rgba(0,0,0,0.5); padding: 15px 15px 25px 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; z-index: 5; flex: 0 0 auto; margin-top: auto; }
        .key-btn { aspect-ratio: 1/1; border-radius: 12px; background: var(--key-bg); color: var(--text-main); font-size: 36px; font-weight: 900; border: none; border-bottom: 6px solid var(--key-border); cursor: pointer; transition: all 0.1s; }
        .key-btn:active { transform: translateY(6px); border-bottom-width: 0; }
        .key-btn.wrong { background: #f43f5e; border-color: #be123c; animation: shakeBtn 0.2s; }
        @keyframes shakeBtn { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }

        .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center; }
        .overlay h1 { font-size: 50px; margin: 0 0 20px 0; color: #facc15; text-shadow: 0 6px 0 #ca8a04; }
        .overlay p { font-size: 20px; color: #cbd5e1; margin-bottom: 40px; font-weight: 900; }
        .btn-start { background: #3b82f6; color: white; font-size: 26px; font-weight: 900; padding: 15px 40px; border-radius: 30px; border: 4px solid #93c5fd; box-shadow: 0 8px 0 #2563eb; cursor: pointer; }
        .btn-start:active { transform: translateY(8px); box-shadow: 0 0 0 transparent; }
    </style>
</head>
<body>

<div id="sand-storm"></div>

<div id="header">
    <div class="score-box">⭐️ <span id="score">0</span></div>
    <div class="lives-box" id="lives">❤️❤️❤️</div>
</div>

<div id="play-area">
    <div id="defense-wall"></div>
</div>

<div id="keyboard"></div>

<div id="start-screen" class="overlay">
    <h1 id="loading-msg">题库加载中...</h1>
    <p>正在连接 Google Sheet [HYPY] 分页</p>
</div>

<div id="game-over-screen" class="overlay" style="display:none;">
    <h1>Game Over</h1>
    <p>防线失守！得分: <span id="final-score" style="color:#facc15; font-size:36px;">0</span></p>
    <button class="btn-start" style="background:#10b981; border-color:#6ee7b7; box-shadow: 0 8px 0 #059669;" onclick="startGame()">再来一局 🔄</button>
</div>

<script>
    // 🌟 GID 573238154 (HYPY分页)
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";

    let dictionary = [];
    const distractors = ["扌", "亻", "心", "月", "虫", "门", "广", "走", "雨", "艹", "口", "氵", "日"];

    let score = 0;
    let lives = 3;
    let isPlaying = false;
    let activeVehicles = []; 
    let spawnTimer = null;
    let gameLoopRef = null;
    let lastTime = 0;
    let keyboardNeedsUpdate = false;
    const KEY_POOL_SIZE = 8;
    // keyboardSlots[index] 固定对应某个格子的位置：部件在“未使用/未作废”前不换位置
    // slot: { kind: 'part'|'distractor', char: string, vehicleId?: number, partIndex?: number }
    let keyboardSlots = null;
    let spawnOrderCounter = 0;

    const playArea = document.getElementById('play-area');
    const keyboard = document.getElementById('keyboard');

    window.onload = function() {
        Papa.parse(SHEET_URL + "&t=" + Date.now(), {
            download: true, 
            header: true, 
            skipEmptyLines: 'greedy',
            transformHeader: h => h.replace(/^\uFEFF/, '').trim().toUpperCase(), 
            complete: function(results) {
                results.data.forEach(row => {
                    // 🌟 重点修改：优先读取 'QUESTION' (即表格里的 Question 列)
                    let targetWord = row['QUESTION'] || row['ANSWER'] || row['CORRECT ANSWER'] || ""; 
                    let partsStr = row['PARTS'] || row['部件'] || ""; 
                    
                    if (targetWord && partsStr) {
                        dictionary.push({
                            word: targetWord.trim(),
                            parts: partsStr.split(/[,，]/).map(p => p.trim())
                        });
                    }
                });

                const startScreen = document.getElementById('start-screen');
                if (dictionary.length > 0) {
                    startScreen.innerHTML = `
                        <h1>大漠狂沙特快</h1>
                        <p>已从 [HYPY] 加载 <b>${dictionary.length}</b> 个战车！<br><br>看准目标，按顺序打出偏旁部首。<br>爆胎会减速，守住防线！</p>
                        <button class="btn-start" onclick="startGame()">全军出击 🚀</button>
                    `;
                } else {
                    startScreen.innerHTML = `<h1>数据加载失败</h1><p>请检查表格 [HYPY] 中是否有 [Question] 和 [Parts] 列。</p>`;
                }
            }
        });
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'hit') {
            osc.type = 'square'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'explode') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-over-screen').style.display = 'none';
        playArea.innerHTML = '<div id="defense-wall"></div>';
        activeVehicles = [];
        spawnOrderCounter = 0;
        keyboardSlots = null;
        score = 0;
        lives = 3;
        updateUI();
        isPlaying = true;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        keyboardNeedsUpdate = true;
        // 先渲染一版干扰部件，保证格子位置稳定；后续部件插入/替换只在空位/干扰位发生
        renderKeyboardPool();
        keyboardNeedsUpdate = false;
        spawnTimer = setTimeout(spawnVehicleLoop, 1000); 
        lastTime = performance.now();
        gameLoopRef = requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = "❤️".repeat(lives) + "🖤".repeat(3-lives);
    }

    function spawnVehicleLoop() {
        if (!isPlaying) return;
        spawnVehicle();
        let interval = 2500 + Math.random() * 2000; 
        spawnTimer = setTimeout(spawnVehicleLoop, interval);
    }

    function getImagePath(totalParts, currentHits) {
        let stateNum = currentHits + 1;
        // Fixed typo: radicalfiles (was redicalfiles)
        return `radicalfiles/${totalParts}l${stateNum}.png`;
    }

        function spawnVehicle() {
        if (dictionary.length === 0) return;
        if (!keyboardSlots || keyboardSlots.length !== KEY_POOL_SIZE) {
            // 确保键盘格子状态存在
            renderKeyboardPool();
        }

        // 可用于放置“新汉字部件”的格子数量 = 当前键盘上不是部件格（干扰/空）的格子数
        const availableSlots = keyboardSlots.reduce((acc, slot) => {
            return acc + (!slot || slot.kind === 'distractor' ? 1 : 0);
        }, 0);

        // 汉字过多时：不增加新的汉字（坦克），直到有足够空位容纳全部未使用部件
        let wordData = null;
        for (let attempt = 0; attempt < 12; attempt++) {
            const candidate = dictionary[Math.floor(Math.random() * dictionary.length)];
            const candidatePartsCount = candidate.parts.length;
            if (candidatePartsCount <= availableSlots) {
                wordData = candidate;
                break;
            }
        }
        if (!wordData) return;

        const totalP = wordData.parts.length;
        // 部件数严格对应“车轮数/图片里的数字”
        const displayP = totalP;
        
        let lanePos = 20 + Math.random() * (playArea.clientHeight - 180); 

        const el = document.createElement('div');
        el.className = 'tank-vehicle';
        const initialImgSrc = getImagePath(displayP, 0);

        el.innerHTML = `
            <div class="vehicle-wrapper">
                <img src="${initialImgSrc}" class="vehicle-img" onerror="this.src=''; this.alt='[${displayP}L]'">
                <div class="target-char">${wordData.word}</div>
            </div>
        `;
        el.style.top = lanePos + 'px';
        playArea.appendChild(el);
        
        const base_speed_on_start = 1.3 + Math.random() * 0.7; 

        activeVehicles.push({
            id: Date.now(),
            spawnOrder: spawnOrderCounter++,
            el: el,
            imgEl: el.querySelector('.vehicle-img'),
            x: -200, 
            totalParts: totalP,
            displayParts: displayP, 
            targetParts: [...wordData.parts], 
            hits: 0,
            keyboardActive: false,
            baseSpeed: base_speed_on_start, 
            currentSpeed: base_speed_on_start 
        });

        keyboardNeedsUpdate = true;
    }

    function gameLoop(currentTime) {
        if (!isPlaying) return;
        let delta = (currentTime - lastTime) / 16.67; 
        lastTime = currentTime;
        let defenseWallX = playArea.clientWidth; 

        for (let i = activeVehicles.length - 1; i >= 0; i--) {
            let v = activeVehicles[i];
            let partsRemaining = v.totalParts - v.hits;
            v.currentSpeed = v.baseSpeed * (partsRemaining / v.totalParts);
            v.x += v.currentSpeed * delta;
            v.el.style.left = v.x + 'px';
            
            if (v.x >= defenseWallX - 120) { 
                v.el.remove();
                activeVehicles.splice(i, 1);
                lives--;
                updateUI();
                playArea.classList.add('hurt');
                setTimeout(() => playArea.classList.remove('hurt'), 150);
                if (lives <= 0) gameOver();
                keyboardNeedsUpdate = true;
            }
        }

        // Only update keyboard if needed
        if (keyboardNeedsUpdate) {
            renderKeyboardPool();
            keyboardNeedsUpdate = false;
        }

        gameLoopRef = requestAnimationFrame(gameLoop);
    }

    function handleKeyPress(char, btnElement) {
        if (!isPlaying) return;
        let targetVehicleIndex = -1;
        let maxX = -999;
        
        for (let i = 0; i < activeVehicles.length; i++) {
            let v = activeVehicles[i];
            if (v.targetParts[v.hits] === char) {
                if (v.x > maxX) {
                    maxX = v.x;
                    targetVehicleIndex = i;
                }
            }
        }
        
        if (targetVehicleIndex !== -1) {
            playSound('hit');
            let v = activeVehicles[targetVehicleIndex];
            v.hits++; 

            let newImgSrc = getImagePath(v.displayParts, v.hits);
            v.imgEl.src = newImgSrc;
            v.imgEl.classList.add('hurt');
            setTimeout(() => v.imgEl.classList.remove('hurt'), 150);
            
            score += 10;
            updateUI();
            
            // 无论是普通命中还是“最后一击”，都尽快刷新键盘池
            // （尤其是最后一击，避免在闪失效间隙仍显示已用完的部件）。
            keyboardNeedsUpdate = true;
            if (v.hits >= v.totalParts) {
                setTimeout(() => killVehicle(v.id), 200); 
            }
        } else {
            playSound('wrong');
            btnElement.classList.add('wrong');
            setTimeout(() => btnElement.classList.remove('wrong'), 200);
        }
    }

    function killVehicle(vehicleId) {
        let index = activeVehicles.findIndex(v => v.id === vehicleId);
        if(index === -1) return;
        let v = activeVehicles[index];
        playSound('explode');
        v.el.classList.add('exploded');
        activeVehicles.splice(index, 1);
            // 击毁后立即刷新键盘池（避免还显示已不需要的部件）
            keyboardNeedsUpdate = true;
        score += 20;
        updateUI();
        setTimeout(() => {
            v.el.remove();
        }, 400);
    }

    function renderKeyboardPool() {
        // 键盘固定 KEY_POOL_SIZE 个格子：
        // 1) 一个汉字出来时，把该汉字“全部未使用部件”放入格子（用干扰格替换）
        // 2) 部件被正确使用后该格消失（格子再被干扰部件/后续汉字替换）
        // 3) 汉字飞出屏幕后，该汉字剩余部件作废（对应格清空）
        // 4) 非部件格填充随机干扰部件

        const randDistractor = () => distractors[Math.floor(Math.random() * distractors.length)];

        if (!keyboardSlots || keyboardSlots.length !== KEY_POOL_SIZE) {
            keyboardSlots = Array.from({ length: KEY_POOL_SIZE }, () => ({
                kind: 'distractor',
                char: randDistractor(),
            }));
        }

        const vehicleById = new Map(activeVehicles.map(v => [v.id, v]));

        // 清理：把已作废/已使用的“部件格”移除，但不移动其它仍然有效的部件格
        for (let i = 0; i < keyboardSlots.length; i++) {
            const slot = keyboardSlots[i];
            if (!slot || slot.kind !== 'part') continue;
            const v = vehicleById.get(slot.vehicleId);
            if (!v) {
                keyboardSlots[i] = null;
                continue;
            }
            // partIndex < v.hits 表示已经被正确点击消耗掉了
            if (slot.partIndex < v.hits) {
                keyboardSlots[i] = null;
                continue;
            }
            // 防御性检查
            if (slot.partIndex >= v.totalParts || v.hits > v.totalParts) {
                keyboardSlots[i] = null;
            }
        }

        // 按出现顺序尝试把“新汉字”的部件插入键盘（必要时替换干扰格）
        const orderedVehicles = [...activeVehicles].sort((a, b) => (a.spawnOrder ?? 0) - (b.spawnOrder ?? 0));

        for (const v of orderedVehicles) {
            if (v.keyboardActive) continue; // 已经插入过完整部件集合（尚未作废/消耗时格位保持）
            const requiredCount = v.totalParts - v.hits; // 还没被使用掉的部件数量
            if (requiredCount <= 0) continue;

            // 可用于放置的格子：空格 or 干扰格（不会挤掉其它仍有效的部件格）
            const availableIndices = [];
            for (let i = 0; i < keyboardSlots.length; i++) {
                const slot = keyboardSlots[i];
                if (!slot || slot.kind === 'distractor') availableIndices.push(i);
            }

            if (availableIndices.length < requiredCount) continue; // 汉字过多：不增加新的汉字

            let cursor = 0;
            for (let partIndex = v.hits; partIndex < v.totalParts; partIndex++) {
                const slotIndex = availableIndices[cursor++];
                keyboardSlots[slotIndex] = {
                    kind: 'part',
                    char: v.targetParts[partIndex],
                    vehicleId: v.id,
                    partIndex,
                };
            }

            // 一次性插入“该汉字全部剩余部件”
            v.keyboardActive = true;
        }

        // 填充空格为干扰部件
        for (let i = 0; i < keyboardSlots.length; i++) {
            if (!keyboardSlots[i]) {
                keyboardSlots[i] = { kind: 'distractor', char: randDistractor() };
            }
        }

        keyboard.innerHTML = keyboardSlots.map(slot => {
            const char = slot.char;
            return `
                <button class="key-btn" onclick="handleKeyPress('${char}', this)">${char}</button>
            `;
        }).join('');
    }

    function gameOver() {
        isPlaying = false;
        clearTimeout(spawnTimer);
        cancelAnimationFrame(gameLoopRef);
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over-screen').style.display = 'flex';
    }
</script>
</body>
</html>
