<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PSLE 汉字节奏大师 · 编曲大师版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
:root {
  --neon-cyan: #00f3ff;
  --neon-pink: #ff00ff;
  --bg-dark: #050505;
  --keyboard-height: 280px;
}

* { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

body, html {
  margin: 0; width: 100%; height: 100%; overflow: hidden;
  background-color: var(--bg-dark);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* 3D 舞台容器 */
#stage {
  position: relative;
  width: 100vw;
  height: calc(100vh - var(--keyboard-height));
  perspective: 800px;
  overflow: hidden;
  background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
}

/* 霓虹网格地板 */
#grid {
  position: absolute;
  width: 200%; height: 200%;
  top: -50%; left: -50%;
  background-image: 
    linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
  background-size: 80px 80px;
  transform: rotateX(60deg);
  z-index: 1;
}

/* HUD 信息 */
#hud {
  position: absolute; top: 20px; left: 20px; z-index: 100; color: white;
  text-shadow: 0 0 10px var(--neon-cyan); font-weight: bold; font-size: 24px;
}

/* 掉落的汉字样式 */
.neon-char {
  position: absolute;
  color: white;
  font-weight: 900;
  text-align: center;
  transform-origin: center center;
  z-index: 10;
  pointer-events: none;
  text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-cyan);
  will-change: transform, opacity;
}

/* 辅助进度点 */
.dot-container {
  display: flex; justify-content: center; gap: 4px; margin-top: 5px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 1px solid var(--neon-cyan); }
.dot.active { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

/* iPad 键盘 */
#piano-wrap {
  height: var(--keyboard-height);
  background: #111;
  display: flex;
  padding: 10px 5px;
  gap: 5px;
  border-top: 2px solid var(--neon-cyan);
  box-shadow: 0 -10px 30px rgba(0, 243, 255, 0.2);
}

.key {
  flex: 1;
  background: linear-gradient(180deg, #eee 0%, #fff 100%);
  border-radius: 0 0 10px 12px;
  position: relative;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 20px;
  cursor: pointer;
  transition: all 0.05s;
}

.key.pressed {
  background: linear-gradient(180deg, #888 0%, #aaa 100%);
  transform: translateY(10px);
  box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
}

.key .radical {
  position: absolute; top: 30%;
  font-size: 40px; font-weight: bold; color: #333;
}

.key .note-label {
  font-size: 14px; color: #999; font-weight: bold;
}

/* 遮罩层 */
.overlay {
  position: absolute; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center;
}

.btn {
  padding: 15px 40px; font-size: 24px; border-radius: 50px;
  background: var(--neon-cyan); color: #000; border: none; cursor: pointer;
  font-weight: bold; margin-top: 20px; box-shadow: 0 0 20px var(--neon-cyan);
}

#replay-screen { display: none; }
</style>
</head>
<body>

<div id="hud">
  <div>Combo: <span id="combo">0</span></div>
  <div>Time: <span id="timer">180</span>s</div>
</div>

<div id="stage">
  <div id="grid"></div>
</div>

<div id="piano-wrap">
  </div>

<div id="start-screen" class="overlay">
  <h1 style="font-size: 60px; color: var(--neon-cyan);">汉字节奏大师</h1>
  <p style="font-size: 20px;">iPad 专用 · 12键编曲版</p>
  <p>同屏多字挑战，击中即刻作曲！</p>
  <button class="btn" onclick="initGame()">🚀 进入舞台</button>
</div>

<div id="replay-screen" class="overlay">
  <h1 style="font-size: 40px;">Valerie 的原创单曲</h1>
  <p>点击下方开始欣赏你的汉字乐章</p>
  <button class="btn" style="background: var(--neon-pink); box-shadow: 0 0 20px var(--neon-pink);" onclick="playRecording()">🎹 开始回放</button>
  <button class="btn" onclick="location.reload()">🔄 再玩一次</button>
</div>

<script>
// --- 配置区 ---
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";

// C大调五声音阶 (12个白键 iPad 专用)
const PENTATONIC_FREQS = ["G3", "A3", "C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5", "G5", "A5"];
const KEY_LABELS = ["低5", "低6", "1", "2", "3", "5", "6", "高1", "高2", "高3", "高5", "高6"];

const GAME_DURATION = 180; // 3分钟
const MAX_ACTIVE_CHARS = 4; // 同屏最多4个字
const SPAWN_INTERVAL = 1200; // 字出现的间隔

const distractors = ["扌", "亻", "心", "忄", "月", "虫", "门", "广", "走", "雨", "艹", "口", "氵", "日", "木", "女", "讠", "辶", "土", "火", "宀", "贝", "王", "纟", "石", "禾", "目", "竹", "页", "刂"];

// --- 变量区 ---
let dictionary = [];
let activeChars = [];
let recordedNotes = [];
let startTime = 0;
let isPlaying = false;
let synth;
let gameTimer;
let currentCombo = 0;

// --- 音频初始化 ---
function setupSynth() {
  // 使用 Tone.PolySynth 模拟高级电子钢琴/铃铛
  synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: "fatcustom", partials: [2, 1, 8, 5, 12], spread: 40, count: 3 },
    envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 }
  }).toDestination();
}

// --- 游戏逻辑 ---
async function initGame() {
  document.getElementById('start-screen').style.display = 'none';
  await Tone.start();
  setupSynth();
  loadData();
  
  startTime = Date.now();
  isPlaying = true;
  
  createKeyboard();
  startGameLoop();
  startTimer();
}

function loadData() {
  Papa.parse(SHEET_URL + "&t=" + Date.now(), {
    download: true, header: true, complete: results => {
      dictionary = results.data.map(row => {
        const word = (row["QUESTION"] || row["ANSWER"] || "").trim();
        const pStr = (row["PARTS"] || row["部件"] || "").trim();
        return word && pStr ? { word, parts: pStr.split(/[,，、|/]/).map(p => p.trim()) } : null;
      }).filter(Boolean);
    }
  });
}

function createKeyboard() {
  const wrap = document.getElementById('piano-wrap');
  wrap.innerHTML = '';
  for(let i=0; i<12; i++) {
    const key = document.createElement('div');
    key.className = 'key';
    key.dataset.index = i;
    key.innerHTML = `<div class="radical"></div><div class="note-label">${KEY_LABELS[i]}</div>`;
    key.onpointerdown = (e) => handleKeyPress(i, key);
    key.onpointerup = () => key.classList.remove('pressed');
    wrap.appendChild(key);
  }
}

function startGameLoop() {
  setInterval(() => {
    if (isPlaying && activeChars.length < MAX_ACTIVE_CHARS) {
      spawnChar();
    }
  }, SPAWN_INTERVAL);

  function animate() {
    if (!isPlaying) return;
    updateChars();
    requestAnimationFrame(animate);
  }
  animate();
}

function spawnChar() {
  if (dictionary.length === 0) return;
  const data = dictionary[Math.floor(Math.random() * dictionary.length)];
  
  const el = document.createElement('div');
  el.className = 'neon-char';
  el.innerHTML = `<span>${data.word}</span><div class="dot-container"></div>`;
  
  const dotWrap = el.querySelector('.dot-container');
  data.parts.forEach(() => {
    const d = document.createElement('div');
    d.className = 'dot';
    dotWrap.appendChild(d);
  });
  
  document.getElementById('stage').appendChild(el);
  
  const charObj = {
    el,
    word: data.word,
    parts: data.parts,
    nextPartIndex: 0,
    z: 0, // 0 = 极远, 1 = 消失点/底部
    speed: 0.0015 + (Math.random() * 0.001),
    lane: Math.random() * 80 - 40, // 左右分布
    isSlowed: false
  };
  
  activeChars.push(charObj);
  refreshKeyMapping();
}

function updateChars() {
  const stage = document.getElementById('stage');
  const h = stage.clientHeight;
  const w = stage.clientWidth;

  for (let i = activeChars.length - 1; i >= 0; i--) {
    const c = activeChars[i];
    
    // 如果击中过，速度降低
    const currentSpeed = c.isSlowed ? c.speed * 0.2 : c.speed;
    c.z += currentSpeed;

    if (c.z >= 1) {
      // 没按出来，漏掉了
      c.el.remove();
      activeChars.splice(i, 1);
      currentCombo = 0;
      updateHUD();
      refreshKeyMapping();
      continue;
    }

    // 3D 坐标计算：远小近大
    const scale = 0.1 + (c.z * 1.5); // 出来的瞬间很小，到面前很大
    const y = c.z * h;
    const x = (w / 2) + (c.lane * c.z * 10);
    const opacity = c.z < 0.2 ? c.z * 5 : 1;

    c.el.style.transform = `translate(-50%, -50%) translate3d(${x - (w/2)}px, ${y - (h/2)}px, 0) scale(${scale})`;
    c.el.style.opacity = opacity;

    // 更新进度小点
    const dots = c.el.querySelectorAll('.dot');
    dots.forEach((d, idx) => {
      d.className = idx < c.nextPartIndex ? 'dot active' : 'dot';
    });
  }
}

// 刷新按键上的偏旁显示：优先显示最靠近玩家的字的下一个部首
function refreshKeyMapping() {
  const keys = document.querySelectorAll('.key .radical');
  keys.forEach(k => k.innerText = '');

  // 对活跃的字按进度排序，最接近底部的优先占领按键
  const sorted = [...activeChars].sort((a, b) => b.z - a.z);
  
  const occupiedLanes = new Set();
  
  sorted.forEach(c => {
    const targetPart = c.parts[c.nextPartIndex];
    // 为这个部首随机分配一个没被占用的按键
    let lane = Math.floor(Math.random() * 12);
    while (occupiedLanes.has(lane)) { lane = (lane + 1) % 12; }
    
    const key = document.querySelector(`.key[data-index="${lane}"] .radical`);
    key.innerText = targetPart;
    key.dataset.charId = activeChars.indexOf(c);
    occupiedLanes.add(lane);
  });

  // 填充干扰项
  for(let i=0; i<12; i++) {
    if (!occupiedLanes.has(i)) {
      const key = document.querySelector(`.key[data-index="${i}"] .radical`);
      key.innerText = distractors[Math.floor(Math.random() * distractors.length)];
      key.dataset.charId = -1;
    }
  }
}

function handleKeyPress(index, el) {
  if (!isPlaying) return;
  
  el.classList.add('pressed');
  const freq = PENTATONIC_FREQS[index];
  synth.triggerAttackRelease(freq, "8n");

  // 记录音符
  recordedNotes.push({
    time: Date.now() - startTime,
    freq: freq,
    index: index
  });

  const radicalEl = el.querySelector('.radical');
  const charId = radicalEl.dataset.charId;

  if (charId !== "-1" && activeChars[charId]) {
    const c = activeChars[charId];
    c.nextPartIndex++;
    c.isSlowed = true; // 击中减速
    setTimeout(() => c.isSlowed = false, 1000);

    currentCombo++;
    
    // 如果这个字所有部件按完了
    if (c.nextPartIndex >= c.parts.length) {
      c.el.style.filter = 'brightness(5) blur(10px)';
      c.el.style.opacity = '0';
      setTimeout(() => {
        if(c.el.parentNode) c.el.remove();
        activeChars = activeChars.filter(item => item !== c);
        refreshKeyMapping();
      }, 200);
    } else {
      refreshKeyMapping();
    }
  } else {
    currentCombo = 0;
  }
  updateHUD();
}

function updateHUD() {
  document.getElementById('combo').innerText = currentCombo;
}

function startTimer() {
  let timeLeft = GAME_DURATION;
  gameTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').innerText = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  isPlaying = false;
  clearInterval(gameTimer);
  document.getElementById('replay-screen').style.display = 'flex';
}

// --- 回放编曲 ---
function playRecording() {
  if (recordedNotes.length === 0) return alert("没有记录到音符哦！");
  
  const now = Tone.now();
  
  // 增加一段简单的 Lo-Fi 节奏（模拟编曲大师）
  const player = new Tone.Player("https://tonejs.github.io/audio/drum-samples/loops/amen_break.mp3").toDestination();
  player.loop = true;
  player.volume.value = -15;
  player.start(now);

  recordedNotes.forEach(note => {
    synth.triggerAttackRelease(note.freq, "8n", now + (note.time / 1000));
    
    // 视觉同步回放
    setTimeout(() => {
      const key = document.querySelector(`.key[data-index="${note.index}"]`);
      if(key) {
        key.classList.add('pressed');
        setTimeout(() => key.classList.remove('pressed'), 100);
      }
    }, note.time);
  });

  setTimeout(() => player.stop(), recordedNotes[recordedNotes.length-1].time + 2000);
}
</script>
</body>
</html>
