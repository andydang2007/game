<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>汉字连击·天空版 Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  background: linear-gradient(#a5d8ff, #e0f7fa);
  font-family: "Microsoft YaHei", sans-serif;
}

#ui {
  position:absolute;
  top:10px;
  left:10px;
  font-size:20px;
  font-weight:bold;
}

.character {
  position:absolute;
  font-size:52px;
  font-weight:bold;
  transform:translate(-50%,-50%);
}

.radical {
  position:absolute;
  font-size:32px;
  cursor:pointer;
}

.particle {
  position:absolute;
  font-size:14px;
  pointer-events:none;
}

</style>
</head>

<body>

<div id="ui">
⭐ <span id="score">0</span> |
❤️ <span id="lives">3</span> |
🔥 <span id="combo">0</span>
</div>

<script>

/////////////////////////////
// 数据加载（保持你原来的）
/////////////////////////////

const SHEET_URL = "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";

let dictionary = [];
const distractors = ["氵","门","心","虫","口","广","艹","日","月"];

/////////////////////////////
// 游戏状态
/////////////////////////////

let score=0, lives=3, combo=0;

let radicals = [];
let characters = [];

let gravity = 0.3;
let gameSpeed = 1;

/////////////////////////////
// 载入题库
/////////////////////////////

Papa.parse(SHEET_URL, {
  download:true,
  header:true,
  complete: res=>{
    res.data.forEach(row=>{
      let word = row['QUESTION'] || "";
      let parts = row['PARTS'] || "";

      if(word && parts){
        dictionary.push({
          word,
          parts: parts.split(/[,，]/)
        });
      }
    });

    startGame();
  }
});

/////////////////////////////
// 创建汉字（多个）
/////////////////////////////

function spawnCharacter(){

  let d = dictionary[Math.floor(Math.random()*dictionary.length)];

  let el = document.createElement("div");
  el.className = "character";
  el.innerText = d.word;

  let obj = {
    el,
    word:d.word,
    parts:[...d.parts],
    hitParts:0,
    x: Math.random()*window.innerWidth,
    y: window.innerHeight*0.7,
    vy:0,
    rot:0,
    vr:0
  };

  el.style.left=obj.x+"px";
  el.style.top=obj.y+"px";

  document.body.appendChild(el);
  characters.push(obj);
}

/////////////////////////////
// 掉落部件
/////////////////////////////

function spawnRadical(){

  let randomChar = Math.random()<0.6 ?
    pickCorrectPart() :
    distractors[Math.floor(Math.random()*distractors.length)];

  let el = document.createElement("div");
  el.className="radical";
  el.innerText=randomChar;

  let r={
    el,
    char:randomChar,
    x:Math.random()*window.innerWidth,
    y:-30,
    vx:0,
    vy:2+Math.random()*2,
    target:null
  };

  el.onclick=()=>clickRadical(r);

  document.body.appendChild(el);
  radicals.push(r);
}

function pickCorrectPart(){
  let c = characters[Math.floor(Math.random()*characters.length)];
  return c.parts[Math.floor(Math.random()*c.parts.length)];
}

/////////////////////////////
// 点击逻辑
/////////////////////////////

function clickRadical(r){

  if(r.target) return;

  let target = characters.find(c=>c.parts.includes(r.char) && c.hitParts < c.parts.length);

  if(target){
    r.target = target;
    combo++;
    score += 100 + combo*10;

    slowMotion();

  }else{
    r.vy += 5;
    combo = 0;
    score = Math.max(0, score-20);
  }

  updateUI();
}

/////////////////////////////
// 命中效果
/////////////////////////////

function hitTarget(r,c){

  c.hitParts++;

  c.vy = -10;
  c.vr = 20;

  // 弹开
  r.vx = (Math.random()-0.5)*12;
  r.vy = -8;
  r.target = null;

  particleBurst(c.x, c.y);

  if(c.hitParts >= c.parts.length){
    score += 300;
    combo++;
    removeCharacter(c);
  }
}

function removeCharacter(c){
  c.el.remove();
  characters = characters.filter(x=>x!==c);
}

/////////////////////////////
// 粒子
/////////////////////////////

function particleBurst(x,y){
  for(let i=0;i<10;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.innerText="✨";

    let vx=(Math.random()-0.5)*6;
    let vy=(Math.random()-0.5)*6;

    document.body.appendChild(p);

    let t=0;
    function anim(){
      t++;
      p.style.left = x+vx*t+"px";
      p.style.top = y+vy*t+"px";
      if(t<20) requestAnimationFrame(anim);
      else p.remove();
    }
    anim();
  }
}

/////////////////////////////
// 慢动作
/////////////////////////////

function slowMotion(){
  gameSpeed = 0.5;
  setTimeout(()=>gameSpeed=1,200);
}

/////////////////////////////
// 主循环
/////////////////////////////

function loop(){

  // 更新汉字
  characters.forEach(c=>{
    c.y += c.vy*gameSpeed;
    c.vy += 0.5*gameSpeed;

    c.rot += c.vr;
    c.vr *= 0.9;

    if(c.y > window.innerHeight*0.7){
      c.y = window.innerHeight*0.7;
      c.vy = 0;
    }

    c.el.style.top=c.y+"px";
    c.el.style.transform=`translate(-50%,-50%) rotate(${c.rot}deg)`;
  });

  // 更新部件
  radicals.forEach((r,i)=>{

    if(r.target){

      r.x += (r.target.x-r.x)*0.2;
      r.y += (r.target.y-r.y)*0.2;

      if(Math.abs(r.x-r.target.x)<20){
        hitTarget(r,r.target);
      }

    }else{
      r.y += r.vy*gameSpeed;
      r.vy += gravity*gameSpeed;
    }

    r.x += r.vx;

    r.el.style.left=r.x+"px";
    r.el.style.top=r.y+"px";

    // 掉地
    if(r.y > window.innerHeight){
      lives--;
      r.el.remove();
      radicals.splice(i,1);
      combo=0;
      updateUI();
    }

  });

  // 难度提升
  if(score>1000) spawnRate=600;
  if(score>3000) spawnRate=400;

  requestAnimationFrame(loop);
}

/////////////////////////////
// UI
/////////////////////////////

function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("lives").innerText=lives;
  document.getElementById("combo").innerText=combo;

  if(lives<=0){
    alert("Game Over! Score:"+score);
    location.reload();
  }
}

/////////////////////////////
// 启动
/////////////////////////////

let spawnRate = 800;

function startGame(){

  for(let i=0;i<2;i++) spawnCharacter();

  setInterval(()=>{
    if(characters.length<3) spawnCharacter();
  },3000);

  setInterval(()=>{
    spawnRadical();
  },spawnRate);

  loop();
}

</script>

</body>
</html>
