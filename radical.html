<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PSLE 汉字连击快线 · 彩虹桥录音棚</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --vh: 1vh;
  --keyboard-height: clamp(150px, 28vh, 230px);
  --neon-cyan: #00f3ff;
  --neon-pink: #ff00ff;
  --neon-green: #22c55e;
  --neon-gold: #facc15;
  --bg-deep: #050510;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  background:
    radial-gradient(ellipse at 50% 20%, rgba(56,189,248,0.28) 0%, transparent 38%),
    radial-gradient(ellipse at 50% 44%, #1e1b4b 0%, var(--bg-deep) 78%);
}

body {
  touch-action: manipulation;
}

#game {
  position: relative;
  width: 100vw;
  height: 100dvh;
  min-height: calc(var(--vh) * 100);
  overflow: hidden;
  perspective: 1000px;
}

#hud {
  position: absolute;
  top: max(10px, env(safe-area-inset-top));
  left: max(10px, env(safe-area-inset-left));
  right: max(10px, env(safe-area-inset-right));
  z-index: 90;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  pointer-events: none;
}

.hud-box {
  background: rgba(15, 23, 42, 0.8);
  border: 2px solid rgba(0, 243, 255, 0.6);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: clamp(6px, 1.5vh, 10px) clamp(10px, 2vw, 20px);
  font-size: clamp(13px, 2.5vw, 24px);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 10px var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
  white-space: nowrap;
}

.timer-box {
  border-color: var(--neon-pink);
  text-shadow: 0 0 10px var(--neon-pink);
  box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
}

#arena {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: var(--keyboard-height);
  overflow: hidden;
  z-index: 5;
}

#depth-fog {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
  background-image:
    linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.55;
}

#track-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 8;
  pointer-events: none;
  filter:
    drop-shadow(0 0 10px rgba(0,243,255,0.36))
    drop-shadow(0 0 22px rgba(255,0,255,0.22));
}

.track-fill {
  fill: rgba(0, 243, 255, 0.025);
  stroke: rgba(255,255,255,0.12);
  stroke-width: 1;
}

.track-line {
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 16 18;
  animation: rainbowRun 1.1s linear infinite;
  opacity: 0.88;
}

.track-edge {
  stroke: rgba(255,255,255,0.18);
  stroke-width: 1.2;
}

.track-rung {
  stroke-width: 2;
  stroke-linecap: round;
  opacity: 0.55;
  animation: rungGlow 1.35s ease-in-out infinite alternate;
}

@keyframes rainbowRun {
  from { stroke-dashoffset: 0; }
  to { stroke-dashoffset: -68; }
}

@keyframes rungGlow {
  from { opacity: 0.24; }
  to { opacity: 0.86; }
}

#miss-line {
  position: absolute;
  left: 0;
  right: 0;
  bottom: var(--keyboard-height);
  height: 8px;
  z-index: 70;
  background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
  box-shadow: 0 0 25px var(--neon-pink);
  pointer-events: none;
}

.depth-character {
  position: absolute;
  z-index: 40;
  background: transparent;
  color: #fff;
  font-weight: 900;
  line-height: 1;
  text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 20px var(--neon-cyan);
  transform-origin: center center;
  will-change: left, top, transform, opacity, font-size;
  transition: filter 0.08s;
}

.depth-character.correct {
  color: #a7f3d0;
  text-shadow:
    0 0 15px #4ade80,
    0 0 30px #22c55e;
  filter: brightness(1.5);
}

.depth-character.complete {
  animation: completeFade 0.24s ease-out forwards;
}

@keyframes completeFade {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    filter: brightness(2);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.35);
    filter: brightness(3) blur(2px);
  }
}

.progress {
  position: absolute;
  left: 50%;
  bottom: -25px;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}

.dot {
  width: clamp(7px, 1.4vw, 10px);
  height: clamp(7px, 1.4vw, 10px);
  border-radius: 50%;
  background: rgba(0,0,0,0.8);
  border: 2px solid var(--neon-cyan);
  box-shadow: 0 0 5px var(--neon-cyan);
  transition: all 0.2s;
}

.dot.done {
  background: #10b981;
  border-color: #a7f3d0;
  box-shadow: 0 0 10px #10b981;
}

.dot.next {
  background: #fef08a;
  border-color: #facc15;
  box-shadow: 0 0 10px #facc15;
  animation: pulseDot 0.8s alternate infinite;
}

@keyframes pulseDot {
  from { transform: scale(1); }
  to { transform: scale(1.25); }
}

#piano-wrap {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--keyboard-height);
  z-index: 100;
  padding:
    clamp(6px, 1.4vh, 10px)
    max(8px, env(safe-area-inset-left))
    max(8px, env(safe-area-inset-bottom));
  background: #07070f;
  border-top: 3px solid var(--neon-cyan);
  box-shadow: 0 -10px 40px rgba(0,243,255,0.15);
}

#piano {
  display: flex;
  width: 100%;
  height: 100%;
  gap: clamp(3px, 0.8vw, 6px);
}

.white-key {
  flex: 1;
  min-width: 0;
  position: relative;
  border-radius: 0 0 12px 12px;
  border: 1px solid #333;
  border-bottom: clamp(7px, 1.5vh, 12px) solid #222;
  background: linear-gradient(180deg, #e2e8f0 0%, #cbd5e1 100%);
  cursor: pointer;
  transform-origin: top center;
  transition: transform 0.05s, background 0.05s, border-bottom-width 0.05s;
  box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2);
  overflow: hidden;
}

.white-key.pressed {
  transform: rotateX(10deg);
  border-bottom-width: 2px;
  background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%);
  box-shadow: inset 0 20px 20px rgba(0,0,0,0.3);
}

.key-radical {
  position: absolute;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  font-size: clamp(18px, 4vw, 48px);
  font-weight: 900;
  color: #0f172a;
  pointer-events: none;
  line-height: 1;
}

.key-note {
  position: absolute;
  left: 50%;
  bottom: clamp(4px, 1vh, 8px);
  transform: translateX(-50%);
  font-size: clamp(9px, 1.5vw, 14px);
  font-weight: bold;
  color: #64748b;
  pointer-events: none;
}

.hit-token {
  position: absolute;
  z-index: 95;
  min-width: 40px;
  height: 40px;
  padding: 0 8px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid var(--neon-cyan);
  color: #000;
  font-size: 24px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px var(--neon-cyan);
  pointer-events: none;
}

#audio-player-ui {
  display: none;
  width: 100%;
  height: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at 50% 50%, #0d0d1e 0%, #05050b 100%);
  border-radius: 12px;
  border: 1px solid rgba(0,243,255,0.2);
  padding: 15px;
}

.player-title {
  color: #fff;
  font-size: clamp(13px, 2.2vw, 18px);
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-shadow: 0 0 8px var(--neon-cyan);
}

.equalizer-box {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 50px;
  margin-bottom: 12px;
}

.eq-bar {
  width: 6px;
  height: 10px;
  background: linear-gradient(to top, var(--neon-cyan), var(--neon-pink));
  border-radius: 3px;
  transform-origin: bottom center;
}

.eq-bar.animating {
  animation: eqJump 0.4s ease-in-out infinite alternate;
}

@keyframes eqJump {
  0% { height: 8px; }
  100% { height: 48px; }
}

.progress-track {
  width: 80%;
  max-width: 600px;
  height: 6px;
  background: #1e1e2f;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}

.progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
  box-shadow: 0 0 10px var(--neon-pink);
}

.overlay {
  position: absolute;
  inset: 0;
  z-index: 300;
  background: rgba(5, 5, 16, 0.9);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

.overlay h1 {
  margin: 0 0 10px;
  color: #fff;
  font-size: clamp(34px, 6vw, 68px);
  text-shadow: 0 0 20px var(--neon-cyan);
}

.overlay p {
  margin: 0 0 30px;
  color: #e2e8f0;
  font-size: clamp(16px, 3vw, 20px);
  font-weight: 800;
}

.version-label {
  margin: 0 0 18px;
  color: #a7f3d0;
  font-size: 18px;
  font-weight: 900;
  text-shadow: 0 0 10px #22c55e;
}

.btn {
  border: none;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  color: #fff;
  padding: 16px 40px;
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 900;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
  transition: transform 0.1s;
  margin: 10px;
}

.btn:active {
  transform: scale(0.95);
}

.btn-pink {
  background: linear-gradient(135deg, #d946ef, #f43f5e);
  box-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
}

#replay-screen {
  display: none;
}

@media (orientation: landscape) and (max-height: 760px) {
  :root {
    --keyboard-height: clamp(135px, 32vh, 190px);
  }

  #hud {
    top: 8px;
  }

  .hud-box {
    padding: 6px 12px;
  }

  .progress {
    bottom: -18px;
  }

  .key-radical {
    font-size: clamp(18px, 5vh, 38px);
  }
}

@media (max-width: 720px) {
  :root {
    --keyboard-height: clamp(145px, 30vh, 210px);
  }

  #piano {
    gap: 3px;
  }

  .key-radical {
    font-size: clamp(16px, 5vw, 34px);
  }

  .key-note {
    font-size: clamp(8px, 2vw, 11px);
  }

  .hit-token {
    min-width: 34px;
    height: 34px;
    font-size: 20px;
  }
}
</style>
</head>

<body>
<div id="game">
  <div id="hud">
    <div class="hud-box">⭐ 得分: <span id="score">0</span></div>
    <div class="hud-box timer-box">⏳ 时间: <span id="timer">120</span>s</div>
  </div>

  <div id="arena">
    <div id="depth-fog"></div>
    <svg id="track-svg"></svg>
  </div>

  <div id="miss-line"></div>

  <div id="piano-wrap">
    <div id="piano"></div>

    <div id="audio-player-ui">
      <div class="player-title">VALERIE AUDIO STUDIO (3x SPEED & GAP CUT)</div>

      <div class="equalizer-box">
        <div class="eq-bar" style="animation-delay: 0.1s"></div>
        <div class="eq-bar" style="animation-delay: 0.3s"></div>
        <div class="eq-bar" style="animation-delay: 0.0s"></div>
        <div class="eq-bar" style="animation-delay: 0.4s"></div>
        <div class="eq-bar" style="animation-delay: 0.2s"></div>
        <div class="eq-bar" style="animation-delay: 0.5s"></div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="p-fill"></div>
      </div>
    </div>
  </div>

  <div id="start-screen" class="overlay">
    <h1 id="start-title">题库加载中...</h1>
    <div class="version-label" id="version-label">Version v1.10.3</div>
    <p id="start-text">请稍候，正在获取云端题库</p>
  </div>

  <div id="replay-screen" class="overlay">
    <h1>编曲挑战完成！</h1>
    <div class="version-label">Version v1.10.3</div>
    <p>空白等待时间已自动剪切压缩，3倍速丝滑回放</p>
    <button class="btn btn-pink" id="btn-replay">🎹 启动录音机回放</button>
    <button class="btn" onclick="location.reload()">🔄 再来一局</button>
  </div>
</div>

<script>
const GAME_VERSION = "v1.10.3";

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1MJHkk7HaKRJgY3LQ-Y3IeHemC-keJJWtH7zh-5K_eec/export?format=csv&gid=573238154";

const KEY_COUNT = 12;
const MAX_ACTIVE_CHARS = 1;
const GAME_TIME = 120;
const SPEED_MULTIPLIER = 3.0;
const MAX_GAP_MS = 1200;

const PENTA_KEYS = [
  { label: "低5", freq: 196.00 },
  { label: "低6", freq: 220.00 },
  { label: "1", freq: 261.63 },
  { label: "2", freq: 293.66 },
  { label: "3", freq: 329.63 },
  { label: "5", freq: 392.00 },
  { label: "6", freq: 440.00 },
  { label: "高1", freq: 523.25 },
  { label: "高2", freq: 587.33 },
  { label: "高3", freq: 659.25 },
  { label: "高5", freq: 783.99 },
  { label: "高6", freq: 880.00 }
];

const distractors = [
  "扌", "亻", "心", "忄", "月", "虫", "门", "广",
  "走", "雨", "艹", "口", "氵", "日", "木", "女",
  "讠", "辶", "土", "火", "宀", "贝", "王", "纟",
  "石", "禾", "目", "竹", "页", "刂"
];

let dictionary = [];
let activeChars = [];
let keyboardSlots = Array(KEY_COUNT).fill(null);
let score = 0;
let timeLeft = GAME_TIME;
let isPlaying = false;

let lastFrameTime = 0;
let lastSpawnTime = 0;
let animationRef = null;
let clockTimer = null;
let beatTimer = null;
let idCounter = 1;
let hitTokens = [];
let trackGeometry = [];

let audioCtx = null;
let activeNotes = new Map();
let rawRecordedNotes = [];
let processedNotes = [];

let nextBeatTime = 0;

const arena = document.getElementById("arena");
const trackSvg = document.getElementById("track-svg");
const piano = document.getElementById("piano");
const playerUI = document.getElementById("audio-player-ui");

window.addEventListener("load", () => {
  setViewportHeight();
  initPianoDOM();
  loadDictionary();
});

window.addEventListener("resize", () => {
  setViewportHeight();
  calculateTrack();
  activeChars.forEach(c => renderCharacter(c));
});

window.addEventListener("orientationchange", () => {
  setTimeout(() => {
    setViewportHeight();
    calculateTrack();
    activeChars.forEach(c => renderCharacter(c));
  }, 300);
});

document.addEventListener("pointerup", () => {
  stopAllNotes();
  releaseAllKeys();
});

document.addEventListener("pointercancel", () => {
  stopAllNotes();
  releaseAllKeys();
});

function setViewportHeight() {
  document.documentElement.style.setProperty("--vh", `${window.innerHeight * 0.01}px`);
}

function loadDictionary() {
  document.getElementById("version-label").textContent = `Version ${GAME_VERSION}`;

  if (typeof Papa === "undefined") {
    document.getElementById("start-title").textContent = "加载失败";
    document.getElementById("start-text").textContent = "PapaParse 加载失败，请刷新页面。";
    return;
  }

  Papa.parse(SHEET_URL + "&t=" + Date.now(), {
    download: true,
    header: true,
    skipEmptyLines: "greedy",
    transformHeader: h => String(h || "").replace(/^\uFEFF/, "").trim().toUpperCase(),
    complete: results => {
      dictionary = results.data
        .filter(row => row["QUESTION"] || row["ANSWER"] || row["CORRECT ANSWER"])
        .map(row => {
          const word = String(row["QUESTION"] || row["ANSWER"] || row["CORRECT ANSWER"] || "").trim();
          const parts = String(row["PARTS"] || row["部件"] || "")
            .split(/[,，、|/]/)
            .map(p => p.trim())
            .filter(Boolean);

          return word && parts.length ? { word, parts } : null;
        })
        .filter(Boolean);

      if (dictionary.length) {
        document.getElementById("start-title").textContent = "汉字节奏大师";
        document.getElementById("start-text").innerHTML =
          `已加载 ${dictionary.length} 个汉字<br>单字彩虹桥模式 · 响应式修正版`;

        const oldBtn = document.getElementById("start-btn");
        if (oldBtn) oldBtn.remove();

        const btn = document.createElement("button");
        btn.id = "start-btn";
        btn.className = "btn";
        btn.textContent = "🚀 启动";
        btn.addEventListener("click", startGame);
        document.getElementById("start-screen").appendChild(btn);
      } else {
        document.getElementById("start-title").textContent = "题库为空";
        document.getElementById("start-text").textContent = "请检查 Question / Parts 列。";
      }
    },
    error: err => {
      console.error(err);
      document.getElementById("start-title").textContent = "加载失败";
      document.getElementById("start-text").textContent = "Google Sheet 加载失败，请检查网络或权限。";
    }
  });
}

function initPianoDOM() {
  piano.innerHTML = "";

  for (let i = 0; i < KEY_COUNT; i++) {
    const btn = document.createElement("div");
    btn.className = "white-key";
    btn.innerHTML =
      `<div class="key-radical"></div><div class="key-note">${PENTA_KEYS[i].label}</div>`;

    btn.addEventListener("pointerdown", e => {
      e.preventDefault();
      handleKeyPress(i, btn);
    });

    btn.addEventListener("pointerup", e => {
      e.preventDefault();
      btn.classList.remove("pressed");
      stopSustainNote(`key-${i}`);
    });

    btn.addEventListener("pointercancel", e => {
      e.preventDefault();
      btn.classList.remove("pressed");
      stopSustainNote(`key-${i}`);
    });

    btn.addEventListener("pointerleave", e => {
      e.preventDefault();
      btn.classList.remove("pressed");
      stopSustainNote(`key-${i}`);
    });

    piano.appendChild(btn);
  }
}

function startGame() {
  ensureAudio();

  document.getElementById("start-screen").style.display = "none";

  piano.style.display = "flex";
  playerUI.style.display = "none";

  score = 0;
  timeLeft = GAME_TIME;
  isPlaying = true;
  activeChars = [];
  rawRecordedNotes = [];
  processedNotes = [];
  hitTokens = [];

  lastFrameTime = performance.now();
  lastSpawnTime = 0;

  document.getElementById("score").textContent = score;
  document.getElementById("timer").textContent = timeLeft;

  calculateTrack();
  initKeyboardSlotsFirstTime();

  nextBeatTime = audioCtx.currentTime + 0.1;
  scheduleAmbientMusic();

  clockTimer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);

  spawnCharacter();
  lastSpawnTime = performance.now();

  animationRef = requestAnimationFrame(gameLoop);
}

function endGame() {
  isPlaying = false;

  clearInterval(clockTimer);
  cancelAnimationFrame(animationRef);

  if (beatTimer) {
    cancelAnimationFrame(beatTimer);
    beatTimer = null;
  }

  stopAllNotes();

  activeChars.forEach(c => c.el.remove());
  activeChars = [];

  hitTokens.forEach(t => t.el.remove());
  hitTokens = [];

  processRecordedNotesWithGapCut();

  document.getElementById("replay-screen").style.display = "flex";
  document.getElementById("btn-replay").onclick = () => playRecording();
}

function gameLoop(now) {
  if (!isPlaying) return;

  const dt = Math.min(32, now - lastFrameTime) / 16.67;
  lastFrameTime = now;

  if (activeChars.length < MAX_ACTIVE_CHARS && now - lastSpawnTime > 80) {
    spawnCharacter();
    lastSpawnTime = now;
  }

  updateCharacters(dt);
  updateHitTokens(dt);

  animationRef = requestAnimationFrame(gameLoop);
}

function spawnCharacter() {
  if (activeChars.length >= MAX_ACTIVE_CHARS) return;

  const data = dictionary[Math.floor(Math.random() * dictionary.length)];
  if (!data) return;

  const el = document.createElement("div");
  el.className = "depth-character";

  const wordSpan = document.createElement("span");
  wordSpan.textContent = data.word;
  el.appendChild(wordSpan);

  const progress = document.createElement("div");
  progress.className = "progress";

  data.parts.forEach(() => {
    const dot = document.createElement("div");
    dot.className = "dot";
    progress.appendChild(dot);
  });

  el.appendChild(progress);
  arena.appendChild(el);

  const c = {
    id: idCounter++,
    el,
    word: data.word,
    parts: data.parts.map((char, idx) => ({
      partId: `${idCounter}-${idx}-${char}-${Math.random()}`,
      char,
      idx
    })),
    remainingParts: [],
    visualHitCount: 0,
    laneIndex: Math.floor(Math.random() * KEY_COUNT),

    z: 0.82,
    baseSpeed: -(0.00034 + Math.random() * 0.00008),
    slowUntil: 0,

    dead: false
  };

  c.remainingParts = [...c.parts];

  activeChars.push(c);

  resetKeyboardForCharacter(c);
  renderCharacter(c);
}

function resetKeyboardForCharacter(c) {
  keyboardSlots = Array(KEY_COUNT).fill(null);

  const avoidParts = c.parts.map(p => p.char);

  for (let i = 0; i < KEY_COUNT; i++) {
    keyboardSlots[i] = {
      kind: "distractor",
      char: randomDistractorAvoiding(avoidParts)
    };
  }

  const availableIndices = Array.from({ length: KEY_COUNT }, (_, i) => i);
  shuffle(availableIndices);

  const visibleParts = c.remainingParts.slice(0, KEY_COUNT);

  visibleParts.forEach((partObj, idx) => {
    const slotIndex = availableIndices[idx];

    keyboardSlots[slotIndex] = {
      kind: "part",
      char: partObj.char,
      partId: partObj.partId,
      target: c,
      targetId: c.id
    };
  });

  renderKeyboardDOMText();
}

function calculateTrack() {
  const rect = arena.getBoundingClientRect();

  if (!rect.width || !rect.height) return;

  trackSvg.innerHTML = "";
  trackGeometry = [];

  trackSvg.setAttribute("viewBox", `0 0 ${rect.width} ${rect.height}`);

  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

  const rainbow = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
  rainbow.setAttribute("id", "rainbowLine");
  rainbow.setAttribute("x1", "0%");
  rainbow.setAttribute("y1", "0%");
  rainbow.setAttribute("x2", "100%");
  rainbow.setAttribute("y2", "0%");

  [
    ["0%", "#ff00ff"],
    ["18%", "#00f3ff"],
    ["36%", "#22c55e"],
    ["55%", "#facc15"],
    ["75%", "#ff7a00"],
    ["100%", "#ff00ff"]
  ].forEach(([offset, color]) => {
    const stop = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    stop.setAttribute("offset", offset);
    stop.setAttribute("stop-color", color);
    rainbow.appendChild(stop);
  });

  defs.appendChild(rainbow);
  trackSvg.appendChild(defs);

  const farY = rect.height * 0.10;
  const centerX = rect.width / 2;
  const laneW = rect.width / KEY_COUNT;

  for (let i = 0; i < KEY_COUNT; i++) {
    const nearLeft = i * laneW;
    const nearRight = (i + 1) * laneW;
    const nearCenterX = nearLeft + laneW / 2;

    const farCenterX = centerX + (i - (KEY_COUNT - 1) / 2) * 5;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute(
      "d",
      `M ${nearLeft} ${rect.height}
       L ${farCenterX - 5} ${farY}
       L ${farCenterX + 5} ${farY}
       L ${nearRight} ${rect.height}
       Z`
    );
    path.setAttribute("class", "track-fill");
    trackSvg.appendChild(path);

    const edge1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    edge1.setAttribute("x1", nearLeft);
    edge1.setAttribute("y1", rect.height);
    edge1.setAttribute("x2", farCenterX - 5);
    edge1.setAttribute("y2", farY);
    edge1.setAttribute("class", "track-edge");
    trackSvg.appendChild(edge1);

    const edge2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
    edge2.setAttribute("x1", nearRight);
    edge2.setAttribute("y1", rect.height);
    edge2.setAttribute("x2", farCenterX + 5);
    edge2.setAttribute("y2", farY);
    edge2.setAttribute("class", "track-edge");
    trackSvg.appendChild(edge2);

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", nearCenterX);
    line.setAttribute("y1", rect.height);
    line.setAttribute("x2", farCenterX);
    line.setAttribute("y2", farY);
    line.setAttribute("class", "track-line");
    line.setAttribute("stroke", "url(#rainbowLine)");
    line.style.animationDelay = `${i * -0.08}s`;
    trackSvg.appendChild(line);

    for (let r = 1; r <= 10; r++) {
      const t = r / 11;
      const y = farY + (rect.height - farY) * t;
      const width = 10 + laneW * t * 0.9;
      const x = farCenterX + (nearCenterX - farCenterX) * t;

      const rung = document.createElementNS("http://www.w3.org/2000/svg", "line");
      rung.setAttribute("x1", x - width / 2);
      rung.setAttribute("y1", y);
      rung.setAttribute("x2", x + width / 2);
      rung.setAttribute("y2", y);
      rung.setAttribute("class", "track-rung");
      rung.setAttribute("stroke", "url(#rainbowLine)");
      rung.style.animationDelay = `${(r + i) * -0.09}s`;
      trackSvg.appendChild(rung);
    }

    trackGeometry.push({
      nearX: nearCenterX,
      nearY: rect.height,
      farX: farCenterX,
      farY
    });
  }
}

function getPointOnLane(laneIndex, z) {
  const lane = trackGeometry[laneIndex];

  if (!lane) {
    return {
      x: arena.clientWidth / 2,
      y: arena.clientHeight / 2
    };
  }

  const t = 1 - z;

  return {
    x: lane.farX + (lane.nearX - lane.farX) * t,
    y: lane.farY + (lane.nearY - lane.farY) * t
  };
}

function renderCharacter(c) {
  if (!c || c.dead) return;

  const pt = getPointOnLane(c.laneIndex, c.z);
  const closeness = 1 - c.z;

  c.el.style.left = `${pt.x}px`;
  c.el.style.top = `${pt.y}px`;
  c.el.style.fontSize = `${26 + closeness * 92}px`;
  c.el.style.opacity = Math.max(0.45, Math.min(1, 0.55 + closeness));
  c.el.style.transform = `translate(-50%, -50%) scale(${0.42 + closeness * 1.18})`;

  c.el.querySelectorAll(".dot").forEach((dot, idx) => {
    dot.className = idx < c.visualHitCount ? "dot done" : "dot next";
  });
}

function updateCharacters(dt) {
  for (let i = activeChars.length - 1; i >= 0; i--) {
    const c = activeChars[i];

    if (c.dead) {
      activeChars.splice(i, 1);
      continue;
    }

    const now = performance.now();
    const speed = now < c.slowUntil ? c.baseSpeed * 0.35 : c.baseSpeed;

    c.z += speed * dt;

    if (c.z <= 0.02) {
      c.dead = true;
      c.el.remove();
      activeChars.splice(i, 1);

      initKeyboardSlotsFirstTime();

      setTimeout(() => {
        if (isPlaying && activeChars.length < MAX_ACTIVE_CHARS) {
          spawnCharacter();
          lastSpawnTime = performance.now();
        }
      }, 80);

      continue;
    }

    renderCharacter(c);
  }
}

function initKeyboardSlotsFirstTime() {
  keyboardSlots = Array(KEY_COUNT).fill(null);

  for (let i = 0; i < KEY_COUNT; i++) {
    keyboardSlots[i] = {
      kind: "distractor",
      char: distractors[Math.floor(Math.random() * distractors.length)]
    };
  }

  renderKeyboardDOMText();
}

function renderKeyboardDOMText() {
  const keys = piano.children;

  for (let i = 0; i < KEY_COUNT; i++) {
    const radicalEl = keys[i]?.querySelector(".key-radical");
    if (!radicalEl) continue;

    radicalEl.textContent = keyboardSlots[i] ? keyboardSlots[i].char : "";
  }
}

function handleKeyPress(index, btnElement) {
  if (!isPlaying) return;

  const slot = keyboardSlots[index];
  if (!slot) return;

  btnElement.classList.add("pressed");
  startSustainNote(`key-${index}`, PENTA_KEYS[index].freq);

  rawRecordedNotes.push({
    absTime: Date.now(),
    index,
    freq: PENTA_KEYS[index].freq
  });

  if (slot.kind === "part") {
    const c = slot.target;

    if (!c || c.dead) return;

    const pIdx = c.remainingParts.findIndex(p => p.partId === slot.partId);

    if (pIdx > -1) {
      c.remainingParts.splice(pIdx, 1);

      score += 50;
      document.getElementById("score").textContent = score;

      c.visualHitCount++;
      c.slowUntil = performance.now() + 1800;

      c.el.classList.add("correct");
      setTimeout(() => {
        if (c.el) c.el.classList.remove("correct");
      }, 150);

      const rect = btnElement.getBoundingClientRect();
      const arenaRect = arena.getBoundingClientRect();

      launchHitToken(
        slot.char,
        rect.left + rect.width / 2 - arenaRect.left,
        arenaRect.height,
        c
      );

      if (c.visualHitCount >= c.parts.length) {
        score += 200;
        document.getElementById("score").textContent = score;

        c.dead = true;
        c.el.classList.add("complete");

        activeChars = activeChars.filter(item => item.id !== c.id);

        initKeyboardSlotsFirstTime();

        setTimeout(() => {
          if (c.el) c.el.remove();
        }, 220);

        setTimeout(() => {
          if (isPlaying && activeChars.length < MAX_ACTIVE_CHARS) {
            spawnCharacter();
            lastSpawnTime = performance.now();
          }
        }, 80);

        return;
      }

      keyboardSlots[index] = {
        kind: "distractor",
        char: randomDistractorAvoiding(c.remainingParts.map(p => p.char))
      };

      renderKeyboardDOMText();
    }
  }
}

function launchHitToken(char, x, y, targetChar) {
  const el = document.createElement("div");
  el.className = "hit-token";
  el.textContent = char;

  arena.appendChild(el);

  hitTokens.push({
    el,
    x,
    y,
    progress: 0,
    target: targetChar,
    dead: false
  });
}

function updateHitTokens(dt) {
  hitTokens.forEach(t => {
    if (t.dead || !t.target || t.target.dead) {
      t.dead = true;
      if (t.el) t.el.remove();
      return;
    }

    t.progress += 0.08 * dt;

    const targetPt = getPointOnLane(t.target.laneIndex, t.target.z);

    t.x += (targetPt.x - t.x) * 0.22;
    t.y += (targetPt.y - t.y) * 0.28;

    t.el.style.left = `${t.x}px`;
    t.el.style.top = `${t.y}px`;
    t.el.style.transform =
      `translate(-50%, -50%) scale(${Math.max(0.45, 1 - t.progress * 0.35)})`;

    if (t.progress >= 1 || Math.hypot(t.x - targetPt.x, t.y - targetPt.y) < 26) {
      t.dead = true;
      t.el.remove();
    }
  });

  hitTokens = hitTokens.filter(t => !t.dead);
}

function processRecordedNotesWithGapCut() {
  if (rawRecordedNotes.length === 0) {
    processedNotes = [];
    return;
  }

  processedNotes = [];

  let accumulatedCutTime = 0;

  processedNotes.push({
    relTime: 0,
    index: rawRecordedNotes[0].index,
    freq: rawRecordedNotes[0].freq
  });

  for (let i = 1; i < rawRecordedNotes.length; i++) {
    const rawGap = rawRecordedNotes[i].absTime - rawRecordedNotes[i - 1].absTime;

    if (rawGap > MAX_GAP_MS) {
      accumulatedCutTime += rawGap - MAX_GAP_MS;
    }

    const compactTime =
      rawRecordedNotes[i].absTime -
      rawRecordedNotes[0].absTime -
      accumulatedCutTime;

    processedNotes.push({
      relTime: compactTime / SPEED_MULTIPLIER,
      index: rawRecordedNotes[i].index,
      freq: rawRecordedNotes[i].freq
    });
  }
}

function scheduleAmbientMusic() {
  if (!isPlaying || !audioCtx) return;

  const now = audioCtx.currentTime;

  if (now >= nextBeatTime - 0.05) {
    const chords = [220.00, 261.63, 329.63];

    chords.forEach((f, idx) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.value = f / 2;

      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.04, now + 1.5 + idx * 0.2);
      g.gain.linearRampToValueAtTime(0, now + 4);

      osc.connect(g);
      g.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 4);
    });

    nextBeatTime = now + 3.5;
  }

  beatTimer = requestAnimationFrame(scheduleAmbientMusic);
}

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume().catch(() => {});
  }
}

function startSustainNote(noteId, freq) {
  ensureAudio();

  if (activeNotes.has(noteId)) {
    stopSustainNote(noteId);
  }

  const now = audioCtx.currentTime;
  const output = audioCtx.createGain();

  output.gain.setValueAtTime(0, now);
  output.gain.linearRampToValueAtTime(0.4, now + 0.02);
  output.gain.exponentialRampToValueAtTime(0.1, now + 0.3);
  output.connect(audioCtx.destination);

  const oscs = [];

  [
    { r: 1, a: 1, t: "sine" },
    { r: 2, a: 0.4, t: "triangle" },
    { r: 3, a: 0.15, t: "sine" }
  ].forEach(h => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    osc.type = h.t;
    osc.frequency.value = freq * h.r;

    g.gain.setValueAtTime(h.a, now);
    g.gain.exponentialRampToValueAtTime(0.01, now + (h.r === 1 ? 0.7 : 0.2));

    osc.connect(g);
    g.connect(output);

    osc.start(now);
    oscs.push({ osc, g });
  });

  activeNotes.set(noteId, { output, oscs });
}

function stopSustainNote(noteId) {
  if (!audioCtx) return;

  const note = activeNotes.get(noteId);
  if (!note) return;

  const now = audioCtx.currentTime;

  try {
    note.output.gain.cancelScheduledValues(now);
    note.output.gain.setValueAtTime(note.output.gain.value || 0.08, now);
    note.output.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

    note.oscs.forEach(o => {
      o.osc.stop(now + 0.2);
    });

    setTimeout(() => {
      try {
        note.output.disconnect();
      } catch (e) {}
    }, 300);
  } catch (e) {}

  activeNotes.delete(noteId);
}

function stopAllNotes() {
  Array.from(activeNotes.keys()).forEach(key => stopSustainNote(key));
}

function releaseAllKeys() {
  document.querySelectorAll(".white-key.pressed").forEach(key => {
    key.classList.remove("pressed");
  });
}

function playRecording() {
  if (processedNotes.length === 0) {
    alert("刚才没有击中汉字哦，重开一局吧！");
    return;
  }

  document.getElementById("replay-screen").style.display = "none";

  piano.style.display = "none";
  playerUI.style.display = "flex";

  const bars = playerUI.querySelectorAll(".eq-bar");
  bars.forEach(b => b.classList.add("animating"));

  const totalDurationMs = processedNotes[processedNotes.length - 1].relTime + 1200;

  const pFill = document.getElementById("p-fill");
  pFill.style.width = "0%";

  const progressStart = Date.now();

  const progressInterval = setInterval(() => {
    const elapsed = Date.now() - progressStart;
    const percent = Math.min(100, (elapsed / totalDurationMs) * 100);
    pFill.style.width = `${percent}%`;

    if (elapsed >= totalDurationMs) {
      clearInterval(progressInterval);
    }
  }, 30);

  processedNotes.forEach(note => {
    setTimeout(() => {
      startSustainNote(`replay-${note.relTime}`, note.freq);
      setTimeout(() => stopSustainNote(`replay-${note.relTime}`), 150);
    }, note.relTime);
  });

  setTimeout(() => {
    bars.forEach(b => b.classList.remove("animating"));
    document.getElementById("replay-screen").style.display = "flex";
  }, totalDurationMs);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function randomDistractorAvoiding(avoid) {
  const safe = distractors.filter(d => !avoid.includes(d));
  return safe.length ? safe[Math.floor(Math.random() * safe.length)] : distractors[0];
}
