<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Search</title>
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/paper-plane.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 容器拓宽，充分利用横向空间 */
        .container { width: 100%; max-width: 800px; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border: 4px solid #ffffff; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; margin-top: 2vh; }
        
        .header-tag { background: #ecfdf5; color: #059669; padding: 10px 25px; border-radius: 30px; font-weight: 900; font-size: 20px; border: 3px solid #a7f3d0; box-shadow: 0 3px 0 #6ee7b7; margin-bottom: 25px; }

        /* 游戏主体左右分栏布局 */
        .game-layout { display: flex; flex-direction: row; width: 100%; gap: 25px; align-items: flex-start; justify-content: center; margin-bottom: 25px; }

        /* 左侧：目标单词列表（竖排） */
        .word-list { display: flex; flex-direction: column; gap: 12px; width: 30%; min-width: 140px; }
        .word-item { background: #f1f5f9; color: #475569; padding: 12px 15px; border-radius: 15px; font-weight: 900; font-size: 18px; border: 2px dashed #cbd5e1; transition: 0.3s; text-align: center; }
        .word-item.found { background: #d1fae5; color: #059669; border-style: solid; border-color: #34d399; text-decoration: line-through; opacity: 0.7; }

        /* 右侧：字母矩阵容器 */
        #ws-grid { flex: 1; display: grid; gap: 6px; touch-action: none; background: #e2e8f0; padding: 8px; border-radius: 20px; max-width: 550px; }
        
        /* 字母格子：字号和点击区域大幅放大 */
        .ws-cell { background: white; border-radius: 12px; font-size: 30px; font-weight: 900; color: #1e293b; display: flex; align-items: center; justify-content: center; text-transform: uppercase; border: 2px solid #cbd5e1; box-shadow: 0 4px 0 #94a3b8; transition: 0.1s; cursor: pointer; aspect-ratio: 1/1; }
        
        /* 选中状态（黄色） */
        .ws-cell.highlight { background: #fef08a; border-color: #eab308; box-shadow: 0 4px 0 #ca8a04; color: #854d0e; transform: translateY(3px); }
        /* 找到单词状态（绿色） */
        .ws-cell.found { background: #34d399; border-color: #10b981; box-shadow: 0 4px 0 #059669; color: white; transform: translateY(3px); }

        .btn-action { width: 100%; border-radius: 20px; border: none; font-weight: 900; font-size: 20px; cursor: pointer; transition: 0.15s; padding: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-action:active { transform: translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,0.1) !important; }
        
        #loading { font-size: 20px; font-weight: 900; color: #3b82f6; padding: 50px; }
        #game-area { display: none; width: 100%; flex-direction: column; align-items: center; }

        /* 如果遇到屏幕很窄的手机，自动切换回上下排版防错位 */
        @media (max-width: 600px) {
            .game-layout { flex-direction: column-reverse; align-items: center; gap: 20px; }
            .word-list { flex-direction: row; flex-wrap: wrap; width: 100%; justify-content: center; }
            #ws-grid { width: 100%; }
            .ws-cell { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tag">🔍 Word Search</div>
    
    <div id="loading">📚 Loading words from library...</div>
    
    <div id="game-area">
        <div class="game-layout">
            <div class="word-list" id="word-list"></div>
            <div id="ws-grid"></div>
        </div>
        <button class="btn-action" style="background:#f1f5f9; color:#64748b; border: 4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1;" onclick="window.location.href='https://andydang2007.github.io/valerie-venessa-learn/index.html'">← Back to Hub</button>
    </div>
</div>

<script>
    const SYNC_API_URL = "https://script.google.com/macros/s/AKfycbzbNOgg7deW9uVVyfYGTfKGOtVgNs_9ZfUQ9J_9cYpG2Ufow9KLDICHgsinBXrPJlmz/exec";
    const SHEET_ID = "1vQlpdRHnR9ybEHHgX6fouRI-vXOh8KQNLSjsbt0TYh9R3No_9i7QNv_4ELwJZJGQpTe3oZVXaZijaW4";
    const ENG_GID = "1893311738"; // 英文题库

    const gridSize = 8; // 8x8的格子，最适合孩子
    let grid = [];
    let targetWords = [];
    let foundWordsCount = 0;
    
    let isDragging = false;
    let startCell = null;
    let currentHighlight = [];
    
    let curUser = localStorage.getItem('currentPlayer') || 'Valerie';
    let curGrade = localStorage.getItem('currentGrade') || 'P3';

    async function init() {
        Papa.parse(`https://docs.google.com/spreadsheets/d/e/2PACX-${SHEET_ID}/pub?gid=${ENG_GID}&single=true&output=csv&t=${Date.now()}`, {
            download: true, header: true, skipEmptyLines: 'greedy',
            complete: function(results) {
                let allWords = [];
                results.data.forEach(row => {
                    let grade = (row.Grade || row.GRADE || "").toUpperCase();
                    if (grade !== curGrade) return; // 只取当前年级的词

                    let ans = (row['Correct Answer'] || row['ANSWER'] || "").toString().trim().toUpperCase();
                    if (ans && /^[A-Z]{3,7}$/.test(ans)) allWords.push(ans);
                });
                
                // 去重并打乱
                allWords = [...new Set(allWords)].sort(() => 0.5 - Math.random());
                
                if (allWords.length < 5) {
                    allWords = ["APPLE", "BUS", "WHEEL", "SEAT", "HAPPY", "SCHOOL", "BOOK"];
                }
                
                targetWords = allWords.slice(0, 5);
                generateGrid();
                renderGame();
            },
            error: function() { document.getElementById('loading').innerText = "⚠️ Network Error!"; }
        });
    }

    function generateGrid() {
        grid = Array.from({ length: gridSize }, () => Array(gridSize).fill(''));
        
        targetWords.forEach(word => {
            let placed = false;
            let attempts = 0;
            while (!placed && attempts < 100) {
                let dir = Math.floor(Math.random() * 3); // 0:水平, 1:垂直, 2:对角线
                let r = Math.floor(Math.random() * gridSize);
                let c = Math.floor(Math.random() * gridSize);
                
                let dr = dir === 1 || dir === 2 ? 1 : 0;
                let dc = dir === 0 || dir === 2 ? 1 : 0;
                
                if (r + dr * word.length <= gridSize && c + dc * word.length <= gridSize) {
                    let canPlace = true;
                    for (let i = 0; i < word.length; i++) {
                        let existing = grid[r + i * dr][c + i * dc];
                        if (existing !== '' && existing !== word[i]) { canPlace = false; break; }
                    }
                    if (canPlace) {
                        for (let i = 0; i < word.length; i++) { grid[r + i * dr][c + i * dc] = word[i]; }
                        placed = true;
                    }
                }
                attempts++;
            }
        });

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                if (grid[r][c] === '') grid[r][c] = letters.charAt(Math.floor(Math.random() * letters.length));
            }
        }
    }

    function renderGame() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        
        // 渲染单词表
        const wl = document.getElementById('word-list');
        wl.innerHTML = targetWords.map(w => `<div class="word-item" id="word-${w}">${w}</div>`).join('');
        
        // 渲染字母网格
        const wsGrid = document.getElementById('ws-grid');
        wsGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
        wsGrid.innerHTML = '';
        
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                let cell = document.createElement('div');
                cell.className = 'ws-cell';
                cell.innerText = grid[r][c];
                cell.dataset.r = r;
                cell.dataset.c = c;
                wsGrid.appendChild(cell);
            }
        }

        wsGrid.addEventListener('mousedown', handleStart);
        wsGrid.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);
    }

    function getCellFromEvent(e) {
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let el = document.elementFromPoint(clientX, clientY);
        return el && el.classList.contains('ws-cell') ? el : null;
    }

    function handleStart(e) {
        let cell = getCellFromEvent(e);
        if (cell) {
            isDragging = true;
            startCell = { r: parseInt(cell.dataset.r), c: parseInt(cell.dataset.c), el: cell };
            clearHighlight();
            highlightCell(cell);
            currentHighlight = [cell];
            if(e.cancelable) e.preventDefault();
        }
    }

    function handleMove(e) {
        if (!isDragging || !startCell) return;
        let cell = getCellFromEvent(e);
        if (cell) {
            let r2 = parseInt(cell.dataset.r), c2 = parseInt(cell.dataset.c);
            let r1 = startCell.r, c1 = startCell.c;
            
            if (r1 === r2 || c1 === c2 || Math.abs(r1 - r2) === Math.abs(c1 - c2)) {
                clearHighlight();
                currentHighlight = [];
                let steps = Math.max(Math.abs(r1 - r2), Math.abs(c1 - c2));
                let dr = steps === 0 ? 0 : (r2 - r1) / steps;
                let dc = steps === 0 ? 0 : (c2 - c1) / steps;
                
                for (let i = 0; i <= steps; i++) {
                    let curR = Math.round(r1 + i * dr);
                    let curC = Math.round(c1 + i * dc);
                    let targetCell = document.querySelector(`.ws-cell[data-r="${curR}"][data-c="${curC}"]`);
                    if (targetCell) {
                        highlightCell(targetCell);
                        currentHighlight.push(targetCell);
                    }
                }
            }
        }
        if(e.cancelable) e.preventDefault();
    }

    function handleEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        
        let selectedWord = currentHighlight.map(cell => cell.innerText).join('');
        let reversedWord = selectedWord.split('').reverse().join(''); 

        if (targetWords.includes(selectedWord) || targetWords.includes(reversedWord)) {
            let actualWord = targetWords.includes(selectedWord) ? selectedWord : reversedWord;
            let badge = document.getElementById(`word-${actualWord}`);
            if (!badge.classList.contains('found')) {
                badge.classList.add('found');
                currentHighlight.forEach(cell => {
                    cell.classList.remove('highlight');
                    cell.classList.add('found');
                });
                foundWordsCount++;
                checkWin();
            }
        }
        
        clearHighlight();
        currentHighlight = [];
    }

    function highlightCell(cell) { if (!cell.classList.contains('found')) cell.classList.add('highlight'); }
    function clearHighlight() { document.querySelectorAll('.ws-cell.highlight').forEach(c => c.classList.remove('highlight')); }

    function checkWin() {
        if (foundWordsCount >= targetWords.length) {
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.5 } });
            
            // 仅在后台Log中记录，不发金币
            try {
                fetch(SYNC_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'badge', user: curUser, grade: curGrade, subject: 'English', icon: '🔍', title: '火眼金睛', desc: '完成找单词游戏' }) });
            } catch(e) {}

            setTimeout(() => {
                document.getElementById('game-area').innerHTML = `
                    <div style="font-size:100px; margin:20px 0;">🎉</div>
                    <h2 style="color:#0f172a; font-weight:900; font-size: 32px;">You found them all!</h2>
                    <p style="color:#64748b; font-weight:900; font-size:22px;">Great job!</p>
                    <div style="display:flex; gap: 15px; width: 100%; margin-top: 30px;">
                        <button class="btn-action" style="flex:1; background:#f1f5f9; color:#64748b; border: 4px solid #e2e8f0; box-shadow: 0 6px 0 #cbd5e1;" onclick="window.location.href='https://andydang2007.github.io/valerie-venessa-learn/index.html'">← Home</button>
                        <button class="btn-action" style="flex:1; background:#3b82f6; color:white; box-shadow: 0 6px 0 #2563eb;" onclick="window.location.reload()">Play Again 🔄</button>
                    </div>
                `;
            }, 1500);
        }
    }

    window.onload = init;
</script>

</body>
</html>
