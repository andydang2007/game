<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P.S.L.E. Pop - Leisure Entertainment</title>
    <style>
        * { box-sizing: border-box; font-family: 'Comic Sans MS', 'Nunito', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; overflow: hidden; background: linear-gradient(to bottom, #87CEEB, #E0F6FF); height: 100vh; color: #333; }
        
        /* HUD Top Status Bar */
        #hud { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 15px 30px; background: rgba(255, 255, 255, 0.9); box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; font-size: 20px; font-weight: 900; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .stat { display: flex; flex-direction: column; align-items: center; }
        .stat span { font-size: 14px; color: #666; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .highlight { color: #FF4500; font-size: 24px; }
        .time-warning { color: red !important; animation: pulse 1s infinite; }

        #game-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 10; }

        /* 🎈 Perfect Round Balloon & 3D Gloss */
        .balloon { position: absolute; border-radius: 50%; cursor: pointer; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-origin: bottom center; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.15), inset 5px 5px 15px rgba(255,255,255,0.4); display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.5); font-weight: bold; font-size: 20px; }
        
        /* Balloon Knot */
        .balloon::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 8px solid inherit; filter: brightness(0.8); }
        
        /* Balloon String */
        .balloon::before { content: ''; position: absolute; bottom: -46px; left: 50%; transform: translateX(-50%); width: 2px; height: 40px; background: rgba(255, 255, 255, 0.6); z-index: -1; border-radius: 2px; }

        .confetti { position: absolute; width: 8px; height: 15px; opacity: 1; border-radius: 2px; }
        .float-text { position: absolute; color: #FFD700; font-weight: 900; font-size: 28px; text-shadow: 2px 2px 0 #FF4500, -1px -1px 0 #FFF; pointer-events: none; z-index: 50; animation: floatUpText 0.8s forwards; }

        /* Modal Overlay */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 200; display: flex; justify-content: center; align-items: center; }
        .modal { background: white; padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: scale(0.8); animation: popIn 0.3s forwards; max-width: 90%; }
        .modal h1 { margin-top: 0; font-size: 36px; color: #FF4500; }
        .modal p { font-size: 20px; color: #555; font-weight: bold; line-height: 1.5; }
        .btn { padding: 15px 40px; font-size: 24px; font-weight: 900; color: white; background: #3b82f6; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 6px 0 #2563eb; transition: 0.1s; margin-top: 20px; }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }

        @keyframes floatUpText { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 50% { transform: translateY(-40px) scale(1.2); opacity: 1; } 100% { transform: translateY(-80px) scale(1); opacity: 0; } }
        @keyframes popIn { to { transform: scale(1); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat"><span>Level</span><div id="ui-level" class="highlight">P1</div></div>
        <div class="stat"><span>Time</span><div id="ui-time" class="highlight">30s</div></div>
        <div class="stat"><span>Coins</span><div class="highlight"><span id="ui-coins">0</span> / <span id="ui-target">300</span></div></div>
    </div>

    <div id="game-area"></div>

    <div id="overlay">
        <div class="modal" id="modal-box">
            <h1 id="modal-title">🎈 P.S.L.E. Pop 🎈</h1>
            <p id="modal-desc">Pressure Smashing Leisure Entertainment<br><br>Tap balloons 2~6 times to pop them.<br>Earn coins to clear levels from P1 to PSLE!</p>
            <button class="btn" id="modal-btn" onclick="startGame()">Start Game</button>
        </div>
    </div>

<script>
    const LEVELS = ['P1', 'P2', 'P3', 'P4', 'P5', 'P6', 'PSLE'];
    let state = {
        levelIndex: 0,
        coins: 0,
        target: 300, // 初始目标大降价，只要300！
        time: 30,
        isPlaying: false
    };

    let timerId, spawnId;
    const gameArea = document.getElementById('game-area');
    const colors = ['#FF3B30', '#FF9500', '#FFCC00', '#4CD964', '#5AC8FA', '#007AFF', '#5856D6', '#FF2D55'];

    function updateHUD() {
        document.getElementById('ui-level').innerText = LEVELS[state.levelIndex];
        document.getElementById('ui-time').innerText = state.time + 's';
        document.getElementById('ui-coins').innerText = state.coins;
        document.getElementById('ui-target').innerText = state.target;
        
        if (state.time <= 5) {
            document.getElementById('ui-time').classList.add('time-warning');
        } else {
            document.getElementById('ui-time').classList.remove('time-warning');
        }
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        state.coins = 0;
        state.time = 30;
        state.isPlaying = true;
        gameArea.innerHTML = ''; 
        updateHUD();

        // 稍微降低生成频率，配合慢速气球
        let currentSpawnRate = Math.max(400, 800 - (state.levelIndex * 50));

        timerId = setInterval(gameTick, 1000);
        spawnId = setInterval(spawnBalloon, currentSpawnRate);
    }

    function gameTick() {
        if (!state.isPlaying) return;
        state.time--;
        updateHUD();

        if (state.time <= 0) {
            endGame();
        } else if (state.coins >= state.target) {
            levelUp();
        }
    }

    function endGame() {
        state.isPlaying = false;
        clearInterval(timerId);
        clearInterval(spawnId);
        
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('modal-title').innerText = '😢 Game Over';
        document.getElementById('modal-title').style.color = '#555';
        document.getElementById('modal-desc').innerHTML = `Time's up!<br>You reached <strong>${LEVELS[state.levelIndex]}</strong><br>Earned ${state.coins} coins`;
        
        let btn = document.getElementById('modal-btn');
        btn.innerText = 'Restart P1';
        btn.style.background = '#f59e0b';
        btn.style.boxShadow = '0 6px 0 #d97706';
        btn.onclick = resetGame;
    }

    function levelUp() {
        state.isPlaying = false;
        clearInterval(timerId);
        clearInterval(spawnId);

        document.getElementById('overlay').style.display = 'flex';
        let btn = document.getElementById('modal-btn');

        if (state.levelIndex < LEVELS.length - 1) {
            document.getElementById('modal-title').innerText = '🎉 Level Cleared!';
            document.getElementById('modal-title').style.color = '#32CD32';
            document.getElementById('modal-desc').innerHTML = `You successfully passed <strong>${LEVELS[state.levelIndex]}</strong>!<br>Next target: ${state.target + 100} coins`;
            
            btn.innerText = 'Enter ' + LEVELS[state.levelIndex + 1];
            btn.style.background = '#10b981';
            btn.style.boxShadow = '0 6px 0 #059669';
            btn.onclick = () => {
                state.levelIndex++;
                state.target += 100; // 每一关只加100
                startGame();
            };
        } else {
            // 打通PSLE
            document.getElementById('modal-title').innerText = '🎓 Ultimate Victory 🎓';
            document.getElementById('modal-title').style.color = '#FFD700';
            document.getElementById('modal-desc').innerHTML = `Amazing! You smashed all the pressure!<br><strong>PSLE</strong> Conquered!<br>You are the best!`;
            
            btn.innerText = 'Play Again';
            btn.style.background = '#3b82f6';
            btn.style.boxShadow = '0 6px 0 #2563eb';
            btn.onclick = resetGame;
        }
    }

    function resetGame() {
        state.levelIndex = 0;
        state.target = 300;
        startGame();
    }

    function spawnBalloon() {
        if (!state.isPlaying) return;

        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        
        const sizeBase = Math.random() * 20 + 60; // 60-80px
        const color = colors[Math.floor(Math.random() * colors.length)];
        const leftPos = Math.random() * 80 + 10; 
        
        const targetClicks = Math.floor(Math.random() * 5) + 2; // 2-6下爆破
        let currentClicks = 0;
        let currentScale = 1;

        balloon.style.background = `radial-gradient(circle at 30% 30%, #ffffff 0%, ${color} 60%, #333333 100%)`;
        balloon.style.borderBottomColor = color; 
        balloon.style.width = sizeBase + 'px';
        balloon.style.height = sizeBase + 'px'; // 完美的正圆
        balloon.style.left = leftPos + '%';
        balloon.style.bottom = '-150px';

        // 速度调慢：气球飞行时间在 3秒 到 6秒 之间，十分解压
        const baseDuration = Math.random() * 3000 + 3000; 
        const floatDuration = Math.max(2000, baseDuration - (state.levelIndex * 150)); 
        const swayAmount = Math.random() * 60 - 30;
        
        const animation = balloon.animate([
            { bottom: '-150px', transform: `translateX(0) scale(${currentScale})` },
            { bottom: '110%', transform: `translateX(${swayAmount}px) scale(${currentScale})` }
        ], {
            duration: floatDuration,
            easing: 'linear',
            fill: 'forwards'
        });

        animation.onfinish = () => { if (balloon.parentNode) balloon.parentNode.removeChild(balloon); };

        balloon.onmousedown = (e) => {
            if (!state.isPlaying) return;
            currentClicks++;
            currentScale += 0.12; 
            
            animation.pause();
            balloon.style.transform = `scale(${currentScale})`;
            setTimeout(() => { if (balloon.parentNode) animation.play(); }, 50);

            if (currentClicks >= targetClicks) { 
                popBalloon(balloon, e.clientX, e.clientY);
            }
        };

        // 支持手机端触摸
        balloon.ontouchstart = (e) => { e.preventDefault(); balloon.onmousedown(e.touches[0]); };

        gameArea.appendChild(balloon);
    }

    function popBalloon(balloon, x, y) {
        if (balloon.parentNode) balloon.parentNode.removeChild(balloon);

        state.coins += 100;
        updateHUD();

        const text = document.createElement('div');
        text.className = 'float-text';
        text.innerText = '+100';
        text.style.left = (x - 20) + 'px';
        text.style.top = (y - 20) + 'px';
        gameArea.appendChild(text);
        setTimeout(() => { if (text.parentNode) text.parentNode.removeChild(text); }, 800);

        createConfetti(x, y);

        if (state.coins >= state.target && state.time > 0) {
            levelUp();
        }
    }

    function createConfetti(x, y) {
        for (let i = 0; i < 15; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = x + 'px';
            confetti.style.top = y + 'px';
            gameArea.appendChild(confetti);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 80 + 50;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity - 60; 
            const rot = Math.random() * 360;

            confetti.animate([
                { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) rotate(${rot}deg)`, opacity: 1, offset: 0.5 },
                { transform: `translate(${tx * 1.5}px, ${ty + 150}px) rotate(${rot * 2}deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 400 + 600,
                easing: 'cubic-bezier(.37,0,.23,1)'
            }).onfinish = () => { if (confetti.parentNode) confetti.parentNode.removeChild(confetti); };
        }
    }
</script>

</body>
</html>
