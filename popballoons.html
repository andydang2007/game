<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot, Smile, Learn, Enjoy!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; font-family: 'Comic Sans MS', 'Nunito', sans-serif;}
        body { margin: 0; overflow: hidden; background: #0f172a; height: 100dvh; }
        #game-canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .hud-box { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); padding: 8px 15px; border-radius: 20px; backdrop-filter: blur(10px); color: white; font-size: 18px; font-weight: 900; }
        #overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal { background: white; padding: 30px; border-radius: 35px; text-align: center; max-width: 95%; width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        
        /* 经典 PSLE 样式还原 - 强制在一行 */
        .modal h1 { margin-top: 0; margin-bottom: 15px; white-space: nowrap; font-size: clamp(18px, 5vw, 26px); color: #1e293b; }
        .sle { color: #f43f5e; font-size: 1.2em; font-weight: 900; text-shadow: 2px 2px 0 #fecdd3; }
        
        .btn { padding: 16px; font-size: 20px; font-weight: 900; color: white; background: #10b981; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 8px 0 #059669; width: 100%; margin-top: 15px; }
        .combo-text { position: absolute; font-size: 30px; font-weight: 900; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 50; }
        
        @keyframes floatUp { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; } 100% { transform: translate(-50%, -100px) scale(1.2); opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-15px,8px); } 75% { transform: translate(15px,-8px); } }
        .shake { animation: shake 0.2s infinite; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="hud-box">🏆 <span id="ui-level">P1</span></div>
        <div class="hud-box" id="ui-time">⏳ 30s</div>
        <div class="hud-box">⭐ <span id="ui-score">0</span>/<span id="ui-target">1000</span></div>
    </div>
    <canvas id="game-canvas"></canvas>
    
    <div id="overlay">
        <div class="modal">
            <div style="font-size: 60px;">🛸</div>
            <h1 id="modal-title"><span class="sle">P</span>ilot, <span class="sle">S</span>mile, <span class="sle">L</span>earn, <span class="sle">E</span>njoy!</h1>
            <p id="modal-desc" style="font-size: 18px; color: #475569; font-weight: 800;">拖动飞船接住星星，避开急速陨石！<br><span style="color:#ef4444;">接到炸弹直接结束！💣</span></p>
            <button class="btn" id="modal-btn" onclick="startOrNextLevel()">开始 P1 任务</button>
        </div>
    </div>

<script>
    // 1. 防作弊与回跳系统
    const urlParams = new URLSearchParams(window.location.search);
    const ticket = urlParams.get('ticket');
    const returnUrl = urlParams.get('returnUrl') || '../index.html';
    
    if (!ticket) { window.location.replace('../index.html'); }

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    const LEVELS = ['P1', 'P2', 'P3', 'P4', 'P5', 'P6', 'PSLE'];
    const TARGETS = [1000, 2000, 3000, 4000, 5000, 6000, 8000];
    
    const ITEMS_CFG = [
        { emoji: '⭐', points: 100, prob: 0.50, type: 'good' },
        { emoji: '💎', points: 500, prob: 0.15, type: 'good' },
        { emoji: '🪨', points: -100, prob: 0.20, type: 'bad' },
        { emoji: '💣', points: 0, prob: 0.15, type: 'fatal' } // 致命炸弹
    ];

    let state = { level: 0, score: 0, time: 30, active: false, x: 0, items: [], combo: 0 };
    let timer, animeReq;

    // 🌟 全局强制音频唤醒引擎
    let audioCtx = null;
    let isPlayingBgm = false;
    let nextNoteTime = 0;
    let noteIndex = 0;
    let bgmTimeout = null;
    const melody = [ 261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 349.23, 440.00, 523.25, 440.00, 349.23, 329.63 ];

    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }
    // 监听任意触摸和点击，第一时间激活声音
    window.addEventListener('touchstart', initAudio, { once: true });
    window.addEventListener('click', initAudio, { once: true });

    function playBGMNote() {
        if (!isPlayingBgm || !audioCtx) return;
        const noteLength = 0.15; 
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            let freq = melody[noteIndex % melody.length];
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.06, nextNoteTime); // 稍微调大了 BGM 音量
            gain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + noteLength - 0.02);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(nextNoteTime); osc.stop(nextNoteTime + noteLength);
            nextNoteTime += noteLength; noteIndex++;
        }
        bgmTimeout = setTimeout(playBGMNote, 25);
    }

    function startBGM() { if (!audioCtx || isPlayingBgm) return; isPlayingBgm = true; nextNoteTime = audioCtx.currentTime + 0.1; playBGMNote(); }
    function stopBGM() { isPlayingBgm = false; clearTimeout(bgmTimeout); }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'catch') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800 + state.combo * 50, now);
            osc.frequency.exponentialRampToValueAtTime(1200 + state.combo * 50, now + 0.1);
            gain.gain.setValueAtTime(0.5, now); // 调大了接到星星的音量
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'bomb') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
            gain.gain.setValueAtTime(1.0, now); // 爆炸声音调到最大
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        state.x = canvas.width / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    function startOrNextLevel() {
        initAudio(); // 点击按钮时再次确保声音唤醒
        startBGM();
        document.getElementById('overlay').style.display = 'none';
        state.score = 0; state.time = 30; state.active = true; state.items = []; state.combo = 0;
        updateHUD();
        timer = setInterval(() => {
            state.time--;
            updateHUD();
            if (state.time <= 0) endLevel(false, false);
        }, 1000);
        gameLoop();
    }

    function gameLoop() {
        if (!state.active) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 随机生成
        if (Math.random() < (0.03 + state.level * 0.005)) {
            let r = Math.random(), acc = 0, sel = ITEMS_CFG[0];
            for(let i of ITEMS_CFG){ acc += i.prob; if(r<acc){ sel=i; break; } }
            
            let speedMultiplier = 1;
            if (sel.emoji === '🪨') {
                speedMultiplier = 2.5; // 🌟 陨石极速坠落 2.5 倍
            } else if (sel.emoji === '💣') {
                speedMultiplier = 1.1; 
            }

            let baseSpeed = 1.5 + Math.random() * 2 + (state.level * 0.5);
            
            state.items.push({ 
                x: Math.random()*(canvas.width-40)+20, 
                y: -50, 
                ...sel, 
                s: baseSpeed * speedMultiplier 
            });
        }

        // 玩家飞船
        ctx.font = '60px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🛸', state.x, canvas.height - 80);

        // 物品移动与碰撞
        for (let i = state.items.length - 1; i >= 0; i--) {
            let o = state.items[i];
            o.y += o.s;
            ctx.font = '40px Arial';
            ctx.fillText(o.emoji, o.x, o.y);

            // 碰撞判断
            if (Math.abs(o.x - state.x) < 40 && Math.abs(o.y - (canvas.height-80)) < 40) {
                if (o.type === 'good') {
                    state.combo++;
                    let bonus = Math.floor(state.combo / 5) * 50;
                    let earned = o.points + bonus;
                    state.score += earned;
                    showText(o.x, o.y, `+${earned}`, '#fde047');
                    playSound('catch');
                } else if (o.type === 'fatal') {
                    // 🌟 致命炸弹：一触即死！
                    playSound('bomb');
                    state.items.splice(i, 1);
                    updateHUD();
                    document.body.classList.add('shake');
                    setTimeout(()=>document.body.classList.remove('shake'), 400);
                    endLevel(false, true); // true 表示死于炸弹
                    return;
                } else {
                    // 🪨 石头
                    state.combo = 0;
                    state.score = Math.max(0, state.score + o.points); 
                    showText(o.x, o.y, o.points, '#ef4444');
                    playSound('bomb');
                    document.body.classList.add('shake');
                    setTimeout(()=>document.body.classList.remove('shake'), 200);
                }
                state.items.splice(i, 1);
                updateHUD();
                if (state.score >= TARGETS[state.level]) { endLevel(true, false); return; }
                continue;
            }
            if (o.y > canvas.height) state.items.splice(i, 1);
        }
        animeReq = requestAnimationFrame(gameLoop);
    }

    function showText(x, y, txt, color) {
        const div = document.createElement('div');
        div.className = 'combo-text';
        div.innerText = txt;
        div.style.left = x + 'px'; div.style.top = y + 'px';
        div.style.color = color;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function updateHUD() {
        document.getElementById('ui-level').innerText = LEVELS[state.level];
        document.getElementById('ui-score').innerText = state.score;
        document.getElementById('ui-target').innerText = TARGETS[state.level];
        document.getElementById('ui-time').innerText = `⏳ ${state.time}s`;
    }

    function endLevel(win = false, isBomb = false) {
        state.active = false;
        clearInterval(timer);
        cancelAnimationFrame(animeReq);
        stopBGM();
        document.getElementById('overlay').style.display = 'flex';
        const btn = document.getElementById('modal-btn');
        
        if (win) {
            if (state.level < 6) {
                document.getElementById('modal-title').innerText = `任务成功！`;
                document.getElementById('modal-desc').innerText = `${LEVELS[state.level]} 挑战完成，准备好下一关了吗？`;
                state.level++;
                btn.style.display = 'inline-block';
                btn.innerText = `进入 ${LEVELS[state.level]}`;
            } else {
                document.getElementById('modal-title').innerHTML = `Congratulations!<br><span style="font-size:20px; color:#475569; display:block; margin-top:10px;">You passed PSLE and graduated!</span>`;
                document.getElementById('modal-desc').innerHTML = '<span style="font-size:16px;">正在带着荣誉返回...</span>'; 
                btn.style.display = 'none';
                setTimeout(() => window.location.replace(returnUrl), 4500);
            }
        } else {
            document.getElementById('modal-title').innerText = '😢 Game Over';
            if (isBomb) {
                document.getElementById('modal-desc').innerHTML = `踩到炸弹啦！💥<br>你止步于 <strong>${LEVELS[state.level]}</strong><br>最终得分: ⭐ ${state.score}<br><br><span style="font-size:16px;">正在返回...</span>`;
            } else {
                document.getElementById('modal-desc').innerHTML = `时间到了！<br>你止步于 <strong>${LEVELS[state.level]}</strong><br>最终得分: ⭐ ${state.score}<br><br><span style="font-size:16px;">正在返回...</span>`;
            }
            btn.style.display = 'none';
            setTimeout(() => window.location.replace(returnUrl), 3500);
        }
    }

    canvas.addEventListener('touchmove', e => { e.preventDefault(); state.x = e.touches[0].clientX; }, {passive:false});
    canvas.addEventListener('mousemove', e => state.x = e.clientX);
</script>
</body>
</html>
